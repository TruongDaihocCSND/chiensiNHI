              <div className="space-y-3">
                <div className="flex items-center gap-2 text-white font-black">
                  <Shield />
                  <span className="font-black uppercase tracking-wider text-[11px] md:text-sm">Học Làm Chiến Sĩ Công An</span>
                </div>
                <p className="leading-relaxed text-slate-500 font-semibold text-[10px] md:text-[11px]">
                  Chương trình “Học Làm Chiến Sĩ Công An” năm 2026 chính thức mở đăng ký, hứa hẹn mang đến môi trường rèn luyện kỷ luật, kỹ năng sống cùng nhiều hoạt động trải nghiệm thực tế hấp dẫn dành cho các em thiếu nhi.
                </p>
              </div>
              <div className="space-y-2 text-[10px] md:text-[11px] font-semibold">
                <h4 className="text-white font-bold uppercase tracking-wide">Đường Dây Nóng Hỗ Trợ</h4>
                <div className="space-y-1 text-slate-500">
                  <p>📞 Điện thoại hỗ trợ: 0911.099.798 ( đ/c Hoài Nam)</p>
                  <p>📧 Email liên hệ: doanthanhnien@dhcsnd.bocongan.gov.vn</p>
                  <p>📍 Địa điểm: Trường Đại học CSND, 36 Nguyễn Hữu Thọ, Phường Tân Hưng, Thành phố Hồ Chí Minh.</p>
                </div>
              </div>
            </div>
            <div className="max-w-7xl mx-auto px-4 mt-8 pt-6 border-t border-slate-800 text-center text-slate-600 font-bold text-[9px] md:text-xs">
              <p>© 2026 Chương Trình Trải Nghiệm "Học Làm Chiến Sĩ Công An". Được xây dựng bởi Đoàn Thanh niên Trường Đại học Cảnh sát Nhân dân.</p>
            </div>
          </footer>

          {/* ===================== MODAL XEM CHI TIẾT HỌC VIÊN CỦA BCH TỔNG ===================== */}
          {}
          {viewingStudent && activeCourse && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4 animate-fadeIn">
              <div className="absolute inset-0" onClick={() => setViewingStudent(null)}></div>
              
              <div className="relative bg-slate-50 rounded-2xl md:rounded-3xl max-w-4xl w-full max-h-[90vh] flex flex-col shadow-2xl z-10 animate-scaleIn overflow-hidden border border-slate-200">
                {/* Header Modal */}
                <div className="bg-gradient-to-r from-green-900 to-green-950 p-4 md:p-5 flex justify-between items-center shrink-0 border-b-4 border-custom-accent">
                   <div className="flex items-center gap-3 md:gap-4">
                     <div className="w-12 h-12 md:w-16 md:h-16 rounded-full border-2 border-white/20 overflow-hidden shadow-inner flex items-center justify-center bg-white/10 shrink-0">
                       <RenderAvatar avatar={viewingStudent.avatar} className="w-full h-full object-cover" />
                     </div>
                     <div className="text-white">
                        <span className="bg-custom-accent text-green-950 text-[8px] md:text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-wider">Hồ Sơ Rèn Luyện</span>
                        <h3 className="text-base md:text-xl font-black mt-1 leading-tight">{viewingStudent.name}</h3>
                        <p className="text-[10px] md:text-xs text-emerald-200 font-medium">Mã: {viewingStudent.id} • {viewingStudent.squad ? `Tiểu Đội ${viewingStudent.squad}` : 'Chờ phân tiểu đội ⚠️'}</p>
                     </div>
                   </div>
                   <button 
                     onClick={() => setViewingStudent(null)}
                     className="w-8 h-8 md:w-10 md:h-10 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white transition-colors active-scale"
                   >
                     <span className="text-xl font-bold leading-none">&times;</span>
                   </button>
                </div>

                {/* Body Modal - Danh sách nhật ký */}
                <div className="p-4 md:p-6 overflow-y-auto flex-1 space-y-4">
                  {(() => {
                    const studentReports = reports.filter(r => 
                      r.studentId === viewingStudent.id || 
                      (r.studentId === 'COMMON' && viewingStudent.squad && r.squad === viewingStudent.squad) ||
                      r.studentId === 'GLOBAL_COMMON' // Xem cả thông báo toàn khóa
                    );

                    if (studentReports.length === 0) {
                       return (
                         <div className="bg-white rounded-2xl p-8 text-center border border-slate-100 shadow-sm">
                           <div className="text-4xl mb-3">📭</div>
                           <h4 className="font-bold text-slate-700 text-sm">Chưa có dữ liệu rèn luyện</h4>
                           <p className="text-xs text-slate-400 mt-1">Chiến sĩ này chưa được ghi nhận hoạt động nào.</p>
                         </div>
                       );
                    }

                    return (
                      <div className="grid sm:grid-cols-2 gap-4 animate-fadeIn">
                        {studentReports.map((report) => {
                          const isCommon = report.studentId === 'COMMON';
                          const isGlobal = report.studentId === 'GLOBAL_COMMON';
                          return (
                            <div key={report.id} className={`bg-white rounded-xl border p-4 shadow-sm flex flex-col justify-between space-y-3 ${isGlobal ? 'border-red-200 ring-1 ring-red-100' : isCommon ? 'border-amber-200 ring-1 ring-amber-100' : 'border-slate-200'}`}>
                              <div className="space-y-2">
                                <div className="flex justify-between items-start">
                                  <span className={`text-[9px] font-black px-2 py-1 rounded-md border flex items-center gap-1 ${
                                    isGlobal ? 'bg-red-100 text-red-800 border-red-200' : isCommon ? 'bg-amber-100 text-amber-800 border-amber-200' : 'bg-green-100 text-green-800 border-green-200'
                                  }`}>
                                    <Calendar />
                                    <span>{report.date}</span>
                                  </span>
                                  {isGlobal ? (
                                    <span className="bg-red-600 text-white text-[8px] font-bold px-1.5 py-0.5 rounded shadow-sm">BCH TỔNG</span>
                                  ) : isCommon ? (
                                    <span className="bg-amber-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded shadow-sm">CHUNG TĐ {report.squad}</span>
                                  ) : (
                                    <span className="bg-slate-100 text-slate-500 text-[8px] font-bold px-1.5 py-0.5 rounded border border-slate-200">CÁ NHÂN</span>
                                  )}
                                </div>
                                
                                <div className="text-xs font-bold text-slate-800">📌 {report.activity}</div>
                                <p className="text-[11px] text-slate-600 font-medium italic">"{report.comment}"</p>
                              </div>

                              {report.image && (
                                <div className="relative rounded-lg overflow-hidden h-32 border border-slate-100 bg-slate-50 group">
                                  <img 
                                    src={parseAndConvertDriveUrl(report.image)} 
                                    alt="Ảnh dã ngoại" 
                                    className="w-full h-full object-cover cursor-zoom-in group-hover:scale-105 transition-transform"
                                    onClick={() => setZoomedImage({
                                      url: parseAndConvertDriveUrl(report.image),
                                      title: isGlobal 
                                        ? `[THÔNG BÁO TỔNG] - ${report.activity} (${report.date})`
                                        : isCommon 
                                        ? `[CHUNG TĐ ${report.squad}] - ${report.activity} (${report.date})`
                                        : `${viewingStudent.name} - ${report.activity} (${report.date})`
                                    })}
                                  />
                                </div>
                              )}

                              {!isCommon && !isGlobal && (
                                <div className="flex gap-1 pt-2 border-t border-slate-100">
                                  <span className="bg-emerald-50 text-emerald-700 text-[9px] font-bold px-2 py-0.5 rounded border border-emerald-100">Nền nếp: {report.behaviorRating}</span>
                                  <span className="bg-blue-50 text-blue-700 text-[9px] font-bold px-2 py-0.5 rounded border border-blue-100">Thể lực: {report.physicalRating}</span>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </div>
              </div>
            </div>
          )}

          {/* ===================== MODAL CHỈNH SỬA & TẠO THÔNG BÁO CHO BCH TỔNG ===================== */}
          {role === 'general' && selectedStudent && activeCourse && (editingReportId || selectedStudent.id === 'GLOBAL_COMMON') && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/85 p-4 animate-fadeIn">
              <div className="absolute inset-0" onClick={() => {
                setEditingReportId(null);
                setSelectedStudent(null);
                setNewActivity('');
                setNewComment('');
              }}></div>

              <div className="relative bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl z-10 animate-scaleIn overflow-hidden border border-amber-500/30">
                
                {/* Header Modal */}
                <div className="bg-gradient-to-r from-amber-600 to-amber-700 p-4 md:p-5 flex justify-between items-center shrink-0 text-white">
                  <div>
                    <span className="bg-amber-900/50 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-wider border border-amber-500/30">
                      Đặc quyền Ban Chỉ Huy Tổng
                    </span>
                    <h3 className="text-sm md:text-base font-black mt-1 flex items-center gap-2">
                      <span>{editingReportId ? '✏️ Chỉnh Sửa Dữ Liệu:' : '📢 Đăng Thông Báo Mới:'}</span>
                      <span className="text-amber-100">{selectedStudent.name}</span>
                    </h3>
                  </div>
                  <button
                    onClick={() => {
                      setEditingReportId(null);
                      setSelectedStudent(null);
                      setNewActivity('');
                      setNewComment('');
                    }}
                    className="w-8 h-8 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white transition-colors"
                  >
                    <span className="text-xl font-bold">&times;</span>
                  </button>
                </div>

                {/* Form Body */}
                <div className="p-4 md:p-6 overflow-y-auto">
                  <form onSubmit={handleAddNewReport} className="space-y-4">
                    <div className="grid sm:grid-cols-2 gap-3.5">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-700 uppercase mb-1">Ngày Đánh Giá</label>
                        <input 
                          type="date" 
                          className="w-full p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-amber-500 text-xs bg-slate-50 outline-none" 
                          value={newReportDate} 
                          onChange={(e) => setNewReportDate(e.target.value)} 
                        />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-700 uppercase mb-1">Hoạt động / Chuyên đề</label>
                        <input 
                          type="text" 
                          required 
                          placeholder={selectedStudent.id === 'GLOBAL_COMMON' ? 'Nhập tiêu đề thông báo...' : ''}
                          className="w-full p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-amber-500 text-xs outline-none" 
                          value={newActivity} 
                          onChange={(e) => setNewActivity(e.target.value)} 
                        />
                      </div>
                    </div>

                    {selectedStudent.id !== 'COMMON' && selectedStudent.id !== 'GLOBAL_COMMON' && (
                      <div className="grid sm:grid-cols-2 gap-3.5">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-700 uppercase mb-1">Nền nếp tác phong</label>
                          <select 
                            className="w-full p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-amber-500 text-xs bg-slate-50 outline-none" 
                            value={newBehaviorRating} 
                            onChange={(e) => setNewBehaviorRating(e.target.value)}
                          >
                            <option value="Xuất Sắc">Xuất Sắc 🎖️</option>
                            <option value="Tốt">Tốt 👍</option>
                            <option value="Khá">Khá 👌</option>
                            <option value="Đạt">Trung bình / Đạt</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-slate-700 uppercase mb-1">Sức khỏe & Thể chất</label>
                          <select 
                            className="w-full p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-amber-500 text-xs bg-slate-50 outline-none" 
                            value={newPhysicalRating} 
                            onChange={(e) => setNewPhysicalRating(e.target.value)}
                          >
                            <option value="Xuất Sắc">Xuất Sắc 🎖️</option>
                            <option value="Tốt">Tốt 👍</option>
                            <option value="Khá">Khá 👌</option>
                            <option value="Đạt">Trung bình / Đạt</option>
                          </select>
                        </div>
                      </div>
                    )}

                    <div className="space-y-2">
                      <label className="block text-[10px] font-bold text-slate-700 uppercase">Đường dẫn ảnh hoạt động (Google Drive hoặc URL trực tiếp)</label>
                      <input 
                        type="text" 
                        className="w-full p-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-amber-500 text-xs outline-none bg-slate-50 font-semibold" 
                        value={newImage} 
                        onChange={(e) => setNewImage(e.target.value)} 
                      />
                      {newImage.trim() && (
                        <div className="space-y-1.5">
                          <span className="block text-[9px] font-bold text-slate-400 uppercase">Xem trước hình hiển thị trên giao diện phụ huynh:</span>
                          <div className="relative rounded-xl overflow-hidden border border-slate-200 bg-slate-50 max-h-36 flex flex-col items-center justify-center p-1">
                            <img 
                              src={parseAndConvertDriveUrl(newImage)} 
                              alt="Ảnh xem trước" 
                              className="max-h-32 w-auto object-contain rounded"
                              onError={(e) => {
                                e.target.style.display = 'none';
                                const parent = e.target.parentNode;
                                if (parent) {
                                  const errLabel = parent.querySelector('.modal-preview-error');
                                  if (errLabel) errLabel.classList.remove('hidden');
                                }
                              }}
                            />
                            <div className="modal-preview-error hidden text-red-500 text-[10px] font-bold">
                              ⚠️ Lỗi tải ảnh! Vui lòng kiểm tra quyền chia sẻ Drive!
                            </div>
                          </div>
                        </div>
                      )}
                    </div>

                    <div>
                      <label className="block text-[10px] font-bold text-slate-700 uppercase mb-1">Nội dung {selectedStudent.id === 'GLOBAL_COMMON' ? 'thông báo' : 'nhận xét'}</label>
                      <textarea 
                        rows="3" 
                        placeholder={selectedStudent.id === 'GLOBAL_COMMON' ? 'Ví dụ: Ban Chỉ Huy Tổng xin trân trọng thông báo đến toàn thể phụ huynh...' : ''}
                        className="w-full p-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-amber-500 text-xs outline-none" 
                        value={newComment} 
                        onChange={(e) => setNewComment(e.target.value)}
                      ></textarea>
                    </div>

                    <div className="flex gap-2 pt-2">
                      <button 
                        type="submit" 
                        disabled={isUploadingToDrive} 
                        className="flex-1 bg-amber-600 hover:bg-amber-700 text-white font-extrabold py-3 px-4 rounded-xl shadow-md text-xs active-scale transition-colors"
                      >
                        {editingReportId ? 'Lưu Thay Đổi Dữ Liệu' : 'Phát Hành Thông Báo'}
                      </button>
                      <button 
                        type="button" 
                        onClick={() => { 
                          setEditingReportId(null); 
                          setSelectedStudent(null); 
                          setNewActivity('');
                          setNewComment('');
                        }} 
                        className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 rounded-xl text-xs font-bold border border-slate-300 active-scale transition-colors"
                      >
                        Hủy
                      </button>
                    </div>
                  </form>
                </div>

              </div>
            </div>
          )}

          {/* ===================== DIALOG XÁC NHẬN AN TOÀN TRƯỚC KHI XÓA ===================== */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black/75 p-4 animate-fadeIn">
              <div className="absolute inset-0" onClick={() => setConfirmModal({ isOpen: false, type: '', id: '', message: '' })}></div>
              
              <div className="relative bg-white rounded-2xl p-6 max-w-sm w-full space-y-4 shadow-2xl border border-slate-200 z-10 animate-scaleIn">
                <div className="flex items-center gap-2 text-red-600 border-b border-slate-100 pb-3">
                  <span className="text-xl">⚠️</span>
                  <h4 className="font-extrabold text-xs md:text-sm uppercase tracking-wider">Cảnh Báo Hệ Thống</h4>
                </div>
                
                <p className="text-xs text-slate-600 leading-relaxed font-semibold py-1">
                  {confirmModal.message}
                </p>
                
                <div className="flex gap-2.5 pt-2 border-t border-slate-100">
                  <button
                    onClick={() => {
                      if (confirmModal.type === 'student') {
                        executeDeleteStudent(confirmModal.id);
                      } else if (confirmModal.type === 'report') {
                        executeDeleteReport(confirmModal.id);
                      }
                      setConfirmModal({ isOpen: false, type: '', id: '', message: '' });
                    }}
                    className="flex-1 bg-red-600 hover:bg-red-700 text-white font-extrabold py-2.5 px-4 rounded-xl text-xs transition-colors shadow active-scale"
                  >
                    Xác Nhận Xóa
                  </button>
                  <button
                    onClick={() => setConfirmModal({ isOpen: false, type: '', id: '', message: '' })}
                    className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 px-4 rounded-xl text-xs border border-slate-300 transition-colors active-scale"
                  >
                    Hủy Bỏ
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ===================== MODAL PHÓNG TO VÀ DOWNLOAD TẢI ẢNH ===================== */}
          {zoomedImage && (
            <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/95 p-3 animate-fadeIn">
              <div className="absolute inset-0 cursor-zoom-out" onClick={() => setZoomedImage(null)}></div>
              
              <div className="relative max-w-3xl w-full flex flex-col items-center space-y-3 z-10 animate-scaleIn">
                
                <div className="bg-slate-900 rounded-2xl overflow-hidden shadow-2xl max-h-[70vh] border border-white/10 flex items-center justify-center">
                  <img 
                    src={zoomedImage.url} 
                    alt="Phóng to ảnh dã ngoại" 
                    className="max-h-[70vh] w-auto max-w-full object-contain"
                  />
                </div>

                <div className="bg-slate-900/90 text-white p-4 rounded-2xl border border-white/10 w-full flex flex-col sm:flex-row justify-between items-center gap-3 backdrop-blur-md">
                  <div className="text-left">
                    <span className="text-[8px] bg-custom-accent text-green-950 px-2 py-0.5 rounded font-black uppercase">Ảnh thực tế</span>
                    <p className="text-[11px] font-semibold text-slate-200 mt-1 leading-relaxed">
                      {zoomedImage.title}
                    </p>
                  </div>

                  <div className="flex gap-2 flex-shrink-0 w-full sm:w-auto">
                    <a 
                      href={zoomedImage.url} 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="flex-1 sm:flex-initial bg-custom-primary hover:bg-custom-primary-light text-white px-4 py-2 rounded-xl text-xs font-extrabold flex items-center justify-center gap-1.5 transition-colors shadow-lg active-scale"
                    >
                      <Camera className="w-3.5 h-3.5 text-custom-accent" />
                      <span>Xem link ảnh gốc</span>
                    </a>
                    <button
                      onClick={() => setZoomedImage(null)}
                      className="flex-1 sm:flex-initial bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-xl text-xs font-extrabold transition-colors border border-slate-700 active-scale"
                    >
                      Đóng
                    </button>
                  </div>
                </div>

                <p className="text-[9px] text-slate-500 font-medium">
                  💡 *Mẹo: Trên điện thoại, bạn có thể nhấn và giữ ảnh để lưu nhanh về thư viện.*
                </p>

              </div>
            </div>
          )}

        </div>
      );
    }

    // ============================================================================
    // BỘ NẠP MODULE FIREBASE (APP LOADER)
    // ============================================================================
    function AppLoader() {
      const [firebaseLoaded, setFirebaseLoaded] = React.useState(!!window.fb);
      const [loadError, setLoadError] = React.useState(null);

      React.useEffect(() => {
        const handleLoad = () => {
          setFirebaseLoaded(true);
        };

        if (window.fb) {
          handleLoad();
        } else {
          window.addEventListener('firebase-loaded', handleLoad);
          return () => window.removeEventListener('firebase-loaded', handleLoad);
        }
      }, []);

      if (loadError) return <div className="text-red-500 p-10 text-center font-bold">Lỗi tải hệ thống Firebase: {loadError}</div>;
      if (!firebaseLoaded) return (
        <div className="min-h-screen flex items-center justify-center bg-slate-50">
           <div className="text-center space-y-4">
              <div className="w-14 h-14 border-4 border-green-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
              <p className="text-green-800 font-extrabold tracking-wider animate-pulse text-sm">ĐANG KHỞI TẠO HỆ THỐNG TRUYỀN TẢI...</p>
           </div>
        </div>
      );

      return <App />;
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<AppLoader />);

  </script>
</body>
</html>
