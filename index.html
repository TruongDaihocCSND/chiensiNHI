                              <div>
                                {hasReportToday ? (
                                  <span className="bg-emerald-100 text-emerald-800 text-[8px] font-bold px-2 py-0.5 rounded-full uppercase border border-emerald-200">
                                    Đã ghi ngày
                                  </span>
                                ) : (
                                  <span className="bg-slate-100 text-slate-500 text-[8px] font-medium px-2 py-0.5 rounded-full border border-slate-200">
                                    Trống
                                  </span>
                                )}
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  {/* BIỂU MẪU VIẾT NHẬN XẾT HOẠT ĐỘNG MỚI */}
                  <div className="lg:col-span-7 order-2">
                    {selectedStudent ? (
                      <form id="report-form" onSubmit={handleAddNewReport} className="bg-white rounded-2xl shadow p-5 md:p-6 border border-slate-100 space-y-4 animate-fadeIn">
                        
                        <div className="flex justify-between items-center pb-3 border-b border-slate-100">
                          <div>
                            <span className="text-[8px] md:text-[10px] text-emerald-600 uppercase tracking-widest font-black block">
                              {editingReportId ? 'CHỈNH SỬA DỮ LIỆU ĐĂNG TẢI' : 'GHI NHẬT KÝ MỚI'}
                            </span>
                            <h3 className="text-sm md:text-base font-black text-slate-800 flex items-center gap-1.5">
                              {selectedStudent.id === 'COMMON' ? (
                                <span className="text-amber-600 flex items-center gap-1">
                                  📢 Nhận xét Chung toàn Tiểu Đội {loggedInSquad}
                                </span>
                              ) : (
                                <span>Chiến sĩ: {selectedStudent.name}</span>
                              )}
                            </h3>
                          </div>
                          <span className="font-bold text-[10px] px-2.5 py-1 rounded-lg bg-yellow-100 text-yellow-950">
                            Mã: {selectedStudent.id}
                          </span>
                        </div>

                        {/* Hướng dẫn hiển thị */}
                        {selectedStudent.id === 'COMMON' && (
                          <div className="bg-amber-50 border border-amber-200 p-3 rounded-xl text-[10px] text-amber-800 font-semibold leading-relaxed">
                            💡 <strong>Tin đăng chung:</strong> Mọi phụ huynh có con em thuộc <strong>Tiểu Đội {loggedInSquad}</strong> đều sẽ nhìn thấy nội dung nhận xét và hình ảnh này!
                          </div>
                        )}

                        <div className="grid sm:grid-cols-2 gap-3.5">
                          {/* Chọn Ngày hoạt động */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Ngày Đánh Giá</label>
                            <input
                              type="date"
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium bg-slate-50"
                              value={newReportDate}
                              onChange={(e) => setNewReportDate(e.target.value)}
                            />
                          </div>

                          {/* Nhập Tên chuyên đề */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Hoạt động / Chuyên đề huấn luyện</label>
                            <input
                              type="text"
                              required
                              placeholder="Ví dụ: Huấn luyện điều lệnh đội ngũ, vượt rào..."
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium"
                              value={newActivity}
                              onChange={(e) => setNewActivity(e.target.value)}
                            />
                          </div>
                        </div>

                        {/* Không cần đánh giá điểm số nếu là tin nhắn chung */}
                        {selectedStudent.id !== 'COMMON' && (
                          <div className="grid sm:grid-cols-2 gap-3.5">
                            {/* Đánh giá Nền nếp tác phong */}
                            <div>
                              <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Nền nếp tác phong</label>
                              <select
                                className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium bg-slate-50"
                                value={newBehaviorRating}
                                onChange={(e) => setNewBehaviorRating(e.target.value)}
                              >
                                <option value="Xuất Sắc">Xuất Sắc 🎖️</option>
                                <option value="Tốt">Tốt 👍</option>
                                <option value="Khá">Khá 👌</option>
                                <option value="Đạt">Trung bình / Đạt</option>
                              </select>
                            </div>

                            {/* Đánh giá Thể chất sức khỏe */}
                            <div>
                              <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Sức khỏe & Thể chất</label>
                              <select
                                className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium bg-slate-50"
                                value={newPhysicalRating}
                                onChange={(e) => setNewPhysicalRating(e.target.value)}
                              >
                                <option value="Xuất Sắc">Xuất Sắc 🎖️</option>
                                <option value="Tốt">Tốt 👍</option>
                                <option value="Khá">Khá 👌</option>
                                <option value="Đạt">Trung bình / Đạt</option>
                              </select>
                            </div>
                          </div>
                        )}

                        {/* Link ảnh dán công công khai có live preview */}
                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-4">
                          <div className="space-y-2">
                            <label className="block text-[10px] font-black text-custom-primary uppercase flex items-center gap-1.5">
                              <ImageIcon className="w-3.5 h-3.5 text-custom-primary" />
                              <span>Nhập link ảnh công khai Google Drive (hoặc URL trực tiếp)</span>
                              <span className="bg-yellow-400 text-slate-900 text-[8px] font-extrabold px-1.5 py-0.5 rounded uppercase">Dán Link</span>
                            </label>
                            <input
                              type="text"
                              placeholder="Dán liên kết ảnh Google Drive chia sẻ công khai hoặc URL liên kết trực tiếp..."
                              className="w-full p-3 bg-white border border-slate-300 rounded-xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800 transition-all shadow-sm"
                              value={newImage}
                              onChange={(e) => {
                                setNewImage(e.target.value);
                                setCustomImageFile(null);
                              }}
                            />
                            <p className="text-[9px] text-slate-400 leading-relaxed font-semibold">
                              💡 <strong>LƯU Ý:</strong> Hệ thống tự động phân tích và kết xuất trực tiếp các link Google Drive dạng chia sẻ sang định dạng ảnh tương ứng.
                            </p>
                          </div>

                          {/* Bộ chuyển đổi liên kết sang hình ảnh hiển thị trực quan trực tiếp */}
                          {newImage.trim() && (
                            <div className="space-y-2 pt-3 border-t border-slate-200">
                              <span className="block text-[9px] font-black text-slate-500 uppercase tracking-wider">
                                🖼️ Bộ Chuyển Đổi Ảnh Hiển Thị Thẻ &lt;img&gt; Xem Trước:
                              </span>
                              {(() => {
                                const convertedUrl = parseAndConvertDriveUrl(newImage);
                                return (
                                  <div className="relative rounded-xl overflow-hidden border border-slate-300 bg-white max-h-48 flex flex-col items-center justify-center p-2 shadow-inner">
                                    <img 
                                      src={convertedUrl} 
                                      alt="Ảnh hoạt động xem trước" 
                                      className="max-h-40 w-auto object-contain rounded-lg"
                                      onError={(e) => {
                                        e.target.style.display = 'none';
                                        const parent = e.target.parentNode;
                                        if (parent) {
                                          const errBox = parent.querySelector('.preview-error-box');
                                          if (errBox) errBox.classList.remove('hidden');
                                        }
                                      }}
                                    />
                                    <div className="preview-error-box hidden p-4 text-center text-red-500 text-[10px] font-bold">
                                      ⚠️ Không thể tải hình ảnh thực tế! Vui lòng kiểm tra lại liên kết hoặc quyền chia sẻ công khai của ảnh trên Google Drive!
                                    </div>
                                  </div>
                                );
                              })()}
                            </div>
                          )}
                        </div>

                        {/* Văn bản Nhận xét */}
                        <div>
                          <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">
                            {selectedStudent.id === 'COMMON' ? 'Nội dung thông báo chung' : 'Nội dung nhận xét chi tiết của chiến sĩ nhí'}
                          </label>
                          <textarea
                            rows="3"
                            placeholder={selectedStudent.id === 'COMMON' 
                              ? 'Ví dụ: Hôm nay toàn Tiểu Đội 1 đã hoàn thành xuất sắc bài huấn luyện cứu hộ, cứu nạn tại rừng dã chiến...'
                              : 'Nhập biểu hiện, tác phong rèn luyện cụ thể của cháu...'
                            }
                            className="w-full p-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-semibold text-slate-800"
                            value={newComment}
                            onChange={(e) => setNewComment(e.target.value)}
                          ></textarea>
                        </div>

                        {/* Các nút Tác vụ */}
                        <div className="flex gap-2 pt-2">
                          <button
                            type="submit"
                            disabled={isUploadingToDrive}
                            className="flex-1 bg-custom-primary hover:bg-custom-primary-light text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all text-xs disabled:opacity-50 flex items-center justify-center gap-1.5 active-scale"
                          >
                            <CheckCircle className="w-4 h-4" />
                            <span>{editingReportId ? 'Lưu cập nhật' : 'Gửi nhận xét'}</span>
                          </button>
                          <button
                            type="button"
                            onClick={() => {
                              setSelectedStudent(null);
                              setNewActivity('');
                              setNewComment('');
                              setEditingReportId(null);
                            }}
                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 rounded-xl text-xs font-semibold border border-slate-300 transition-colors active-scale"
                          >
                            Hủy
                          </button>
                        </div>

                      </form>
                    ) : (
                      <div className="bg-white rounded-2xl p-8 md:p-12 text-center border-2 border-dashed border-slate-200 shadow-inner flex flex-col items-center justify-center space-y-3.5">
                        <div className="w-14 h-14 rounded-full bg-slate-50 flex items-center justify-center text-3xl shadow">
                          👮‍♂️
                        </div>
                        <div>
                          <h3 className="font-bold text-slate-700 text-xs md:text-sm">Chưa lựa chọn đối tượng nhận xét</h3>
                          <p className="text-[11px] text-slate-400 max-w-xs mt-1 leading-relaxed">
                            Hãy chọn tên học sinh bất kỳ hoặc bấm nút <strong>"Nhận Xét Chung Tiểu Đội"</strong> ở danh sách phía trên để tiến hành đăng tin.
                          </p>
                        </div>
                      </div>
                    )}
                  </div>

                </div>

                {/* DANH SÁCH NHẬT KÝ ĐÃ GHI CỦA TIỂU ĐỘI (Bao gồm Thông báo Global) */}
                <div className="bg-white rounded-2xl shadow p-4 md:p-5 border border-slate-100 space-y-4 mt-6">
                  <h3 className="text-xs md:text-sm font-black text-slate-800 flex items-center gap-1.5 uppercase">
                    <ImageIcon className="w-5 h-5 text-custom-primary" />
                    <span>Bảng Tin Tiểu Đội {loggedInSquad} & Chỉ Đạo Cấp Trên</span>
                  </h3>
                  
                  {reports.filter(r => r.squad === loggedInSquad || r.studentId === 'GLOBAL_COMMON').length === 0 ? (
                    <div className="p-8 text-center text-slate-400 border border-dashed border-slate-200 rounded-xl space-y-1">
                      <div className="text-2xl">📭</div>
                      <p className="text-xs">Chưa có nhật ký hoạt động hay thông báo nào.</p>
                    </div>
                  ) : (
                    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                      {reports.filter(r => r.squad === loggedInSquad || r.studentId === 'GLOBAL_COMMON').map(report => {
                        const isCommon = report.studentId === 'COMMON';
                        const isGlobal = report.studentId === 'GLOBAL_COMMON';
                        const student = isGlobal 
                          ? { name: `📢 THÔNG BÁO TỪ BCH TỔNG` }
                          : isCommon
                          ? { name: `Nhận xét Chung Toàn Tiểu Đội ${report.squad}` } 
                          : (students.find(s => s.id === report.studentId) || { name: `Chiến sĩ (${report.studentId})` });
                        
                        return (
                          <div 
                            key={report.id} 
                            className={`rounded-xl p-4 border space-y-3 flex flex-col justify-between hover:shadow-sm transition-all duration-300 ${
                              isGlobal ? 'bg-red-50 border-red-300 ring-1 ring-red-100' :
                              isCommon ? 'bg-amber-50 border-amber-300' : 'bg-slate-50 border-slate-200'
                            }`}
                          >
                            <div className="space-y-2">
                              <div className="flex justify-between items-center border-b border-slate-200/50 pb-2">
                                <span className={`font-extrabold text-xs ${isGlobal ? 'text-red-700' : isCommon ? 'text-amber-800' : 'text-emerald-950'}`}>
                                  {student ? student.name : 'Chiến sĩ dã chiến'}
                                </span>
                                <span className="text-[10px] text-slate-400 font-mono">
                                  {isGlobal ? 'TOÀN KHÓA' : isCommon ? 'CHUNG TĐ' : `ID: ${report.studentId}`}
                                </span>
                              </div>
                              <div className="text-[11px] font-bold text-slate-700">📌 Chuyên đề: {report.activity}</div>
                              <p className="text-[11px] text-slate-500 line-clamp-3 italic font-medium">"{report.comment}"</p>
                            </div>

                            {report.image && (
                              <div className="relative group overflow-hidden rounded-lg border border-slate-200 h-24">
                                <img 
                                  src={parseAndConvertDriveUrl(report.image)} 
                                  alt="Review" 
                                  className="w-full h-full object-cover cursor-zoom-in hover:opacity-90 transition-all" 
                                  onClick={() => setZoomedImage({
                                    url: parseAndConvertDriveUrl(report.image),
                                    title: isGlobal
                                      ? `[THÔNG BÁO TỔNG KHÓA] - Hoạt động: ${report.activity} (${report.date})`
                                      : isCommon
                                      ? `[HÌNH CHUNG TIỂU ĐỘI ${report.squad}] - Hoạt động: ${report.activity} (${report.date})`
                                      : `${student ? student.name : 'Chiến sĩ'} - Hoạt động: ${report.activity} (${report.date})`
                                  })}
                                />
                              </div>
                            )}

                            <div className="space-y-2 pt-2 border-t border-slate-200/50">
                              <div className="flex justify-between items-center text-[9px]">
                                <span className="text-slate-400 font-semibold">{report.date}</span>
                                {!isCommon && !isGlobal && (
                                  <div className="flex gap-1">
                                    <span className="bg-green-100 text-green-800 px-1 py-0.5 rounded text-[8px] font-bold">Tác phong: {report.behaviorRating}</span>
                                    <span className="bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-[8px] font-bold">Thể chất: {report.physicalRating}</span>
                                  </div>
                                )}
                              </div>

                              {/* Commander không thể sửa/xóa thông báo của BCH Tổng */}
                              {!isGlobal && (
                                <div className="flex gap-2 pt-1.5 border-t border-slate-200/30">
                                  <button
                                    type="button"
                                    onClick={() => handleStartEditReport(report)}
                                    className="flex-1 bg-amber-50 hover:bg-amber-100 text-amber-800 font-bold py-1.5 px-2 rounded-lg text-[10px] border border-amber-200 transition-colors flex items-center justify-center gap-1 active-scale shadow-sm"
                                  >
                                    ✏️ Sửa
                                  </button>
                                  <button
                                    type="button"
                                    onClick={() => {
                                      setConfirmModal({
                                        isOpen: true,
                                        type: 'report',
                                        id: report.id,
                                        message: `Bạn có chắc muốn xóa báo cáo ngày ${report.date} này của ${isCommon ? 'tiểu đội' : 'học sinh'} khỏi đám mây?`
                                      });
                                    }}
                                    className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-1.5 px-2 rounded-lg text-[10px] border border-red-200 transition-colors flex items-center justify-center gap-1 active-scale shadow-sm"
                                  >
                                    🗑️ Xóa
                                  </button>
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* ===================== 4. GIAO DIỆN CHỈ HUY TỔNG RESPONSIVE ===================== */}
            {}
            {currentView === 'general_dashboard' && activeCourse && (
              <div className="space-y-5 md:space-y-6 animate-fadeIn">
                
                {/* Header Tổng quan */}
                <div className="bg-gradient-to-r from-green-950 to-green-900 rounded-2xl p-5 md:p-6 text-white shadow-md border-b-4 border-custom-accent flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <div>
                    <span className="text-[10px] bg-custom-accent text-green-950 font-black px-2.5 py-1 rounded uppercase tracking-wider">
                      Cơ Quan Chỉ Huy Tối Cao (BCH Tổng)
                    </span>
                    <h2 className="text-xl md:text-2xl font-black mt-1 text-custom-accent">
                      Bảng Điều Hành: {activeCourse.name}
                    </h2>
                    <p className="text-xs text-emerald-200 mt-1 font-medium leading-relaxed">
                      Quản lý danh sách học viên, thêm mới, chỉ định biên chế Tiểu đội và đồng bộ giám sát toàn khoá học.
                    </p>
                  </div>

                  <div className="flex gap-2 flex-wrap w-full md:w-auto">
                    <span className="bg-black/30 px-3 py-2 rounded-xl text-[10px] md:text-xs border border-white/5 font-semibold">
                      Tổng số: <strong className="text-custom-accent">{students.length} chiến sĩ nhí</strong>
                    </span>
                    <span className="bg-black/30 px-3 py-2 rounded-xl text-[10px] md:text-xs border border-white/5 font-semibold">
                      Báo cáo: <strong className="text-custom-accent">{reports.length} Nhật ký</strong>
                    </span>
                    <span className="bg-black/30 px-3 py-2 rounded-xl text-[10px] md:text-xs border border-white/5 font-semibold">
                      Quy mô: <strong className="text-custom-accent">{squadCount} Đơn vị</strong>
                    </span>
                  </div>
                </div>

                {/* BẢNG CẤU HÌNH LIÊN KẾT GOOGLE DRIVE DÀNH CHO BCH TỔNG */}
                <div className="bg-white rounded-2xl p-4 md:p-5 shadow border border-slate-100">
                  <form onSubmit={handleSaveDriveConfig} className="space-y-3.5">
                    <div className="flex items-center gap-2 border-b pb-2">
                      <span className="text-xl">⚙️</span>
                      <div>
                        <h3 className="text-xs md:text-sm font-black text-slate-800">Cấu hình kết nối Google Drive (BCH Tổng)</h3>
                        <p className="text-[10px] text-slate-400">Thiết lập "Cầu nối" để các tiểu đội tải ảnh lên đám mây trực tiếp.</p>
                      </div>
                    </div>
                    
                    <div className="flex flex-col md:flex-row gap-3 items-end">
                      <div className="flex-1 w-full">
                        <label className="block text-[10px] font-bold text-slate-600 mb-1">Đường dẫn Google Apps Script Web App URL của bạn</label>
                        <input
                          type="text"
                          required
                          placeholder="Ví dụ: https://script.google.com/macros/s/AKfycb.../exec"
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-600 bg-slate-50"
                          value={inputScriptUrl}
                          onChange={(e) => setInputScriptUrl(e.target.value)}
                        />
                      </div>
                      <button
                        type="submit"
                        className="w-full md:w-auto bg-custom-primary hover:bg-custom-primary-light text-white font-extrabold text-xs py-3.5 px-5 rounded-xl transition-all shadow-md shrink-0 flex items-center justify-center gap-2 active-scale"
                      >
                        <span>🔄 Đồng bộ cổng lưu trữ</span>
                      </button>
                    </div>

                    {driveScriptUrl ? (
                      <div className="p-3 bg-emerald-50 rounded-xl border border-emerald-200 text-[10px] text-emerald-800 font-semibold">
                         ✅ Cổng kết nối đang hoạt động. Các tiểu đội có thể tải ảnh lên tự động thành công!
                      </div>
                    ) : (
                      <div className="p-3 bg-amber-50 rounded-xl border border-amber-200 text-[10px] text-amber-800 font-semibold leading-relaxed">
                         ⚠️ Hiện tại bạn chưa thiết lập cổng lưu trữ Google Drive dã ngoại.
                      </div>
                    )}
                  </form>
                </div>

                {/* KHÓA BẢO MẬT CẤP 2 CHO CÀI ĐẶT HỆ THỐNG */}
                {!isSettingsUnlocked ? (
                  <div className="bg-slate-800 text-white rounded-2xl p-6 md:p-8 shadow-lg border border-slate-700 text-center space-y-4">
                    <div className="text-4xl">🔒</div>
                    <h3 className="text-sm md:text-base font-black uppercase tracking-wider text-custom-accent">Khu Vực Cấu Hình Bảo Mật Hệ Thống</h3>
                    <p className="text-[10px] md:text-xs text-slate-300 max-w-md mx-auto leading-relaxed">
                      Vui lòng nhập mã bảo mật cấp cao để thay đổi mật khẩu các tiểu đội và quy mô đơn vị huấn luyện.
                    </p>
                    <form onSubmit={handleUnlockSettings} className="flex justify-center max-w-sm mx-auto mt-4 gap-2">
                      <input 
                        type="password"
                        placeholder="Nhập mã bảo mật"
                        className="w-full p-2.5 rounded-xl border border-slate-600 bg-slate-900 text-white text-center text-xs font-mono font-bold focus:outline-none focus:ring-2 focus:ring-yellow-500"
                        value={masterPassInput}
                        onChange={(e) => setMasterPassInput(e.target.value)}
                      />
                      <button type="submit" className="bg-custom-accent hover:bg-yellow-400 text-green-950 font-extrabold px-5 py-2.5 rounded-xl text-xs whitespace-nowrap active-scale shadow-sm">
                        Mở Khóa
                      </button>
                    </form>
                  </div>
                ) : (
                  <>
                    <div className="flex justify-end animate-fadeIn">
                      <button 
                        onClick={() => {
                          setIsSettingsUnlocked(false);
                          setMasterPassInput('');
                        }}
                        className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-sm transition-colors flex items-center gap-1 active-scale"
                      >
                        🔒 Đóng khóa bảo mật
                      </button>
                    </div>

                {/* THIẾT LẬP MẬT KHẨU THỦ CÔNG CHO CÁC TIỂU ĐỘI & BCH TỔNG */}
                <div className="bg-white rounded-2xl p-4 md:p-5 shadow border border-slate-100 space-y-4 animate-fadeIn">
                  <div className="flex items-center gap-2 border-b pb-2">
                    <span className="text-xl">🔑</span>
                    <div>
                      <h3 className="text-xs md:text-sm font-black text-slate-800">Quản Lý Mật Khẩu Đăng Nhập Hệ Thống</h3>
                      <p className="text-[10px] text-slate-400">Thiết lập mật khẩu riêng cho tài khoản Tổng và từng đơn vị phụ trách viết nhật ký rèn luyện.</p>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
                    
                    {/* KHỐI ĐỔI MẬT KHẨU CHO RIÊNG BAN CHỈ HUY TỔNG */}
                    <div className="bg-yellow-50 p-3 rounded-xl border border-yellow-300 space-y-1.5 flex flex-col justify-between shadow-sm">
                      <div className="text-[10px] font-extrabold text-yellow-800">⭐️ Mật Khẩu BCH Tổng</div>
                      <input 
                        type="text" 
                        defaultValue={squadPasswords['BCHTONG_PASS'] || 'BCHTONG_2026'}
                        onBlur={(e) => handleSaveSquadPasswords('BCHTONG_PASS', e.target.value)}
                        placeholder="Mật khẩu tạm: BCHTONG_2026"
                        className="w-full p-2 bg-white border border-yellow-300 rounded-lg text-xs font-mono font-bold text-center text-yellow-900 focus:ring-2 focus:ring-yellow-500 outline-none"
                      />
                      <div className="text-[7px] text-yellow-600 text-center uppercase tracking-wider font-extrabold">Nhấn ra ngoài để tự lưu</div>
                    </div>

                    {/* MẬT KHẨU CÁC TIỂU ĐỘI */}
                    {Array.from({ length: squadCount }, (_, i) => i + 1).map((num) => {
                      const code = `TD${String(num).padStart(2, '0')}`;
                      const currentPass = squadPasswords[code] || '';
                      return (
                        <div key={num} className="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-1.5 flex flex-col justify-between">
                          <div className="text-[10px] font-bold text-slate-700">Tiểu Đội {num} ({code})</div>
                          <input 
                            type="text" 
                            defaultValue={currentPass}
                            onBlur={(e) => handleSaveSquadPasswords(code, e.target.value)}
                            placeholder="Chưa thiết lập"
                            className="w-full p-2 bg-white border border-slate-300 rounded-lg text-xs font-mono font-bold text-center focus:ring-2 focus:ring-green-500 outline-none"
                          />
                          <div className="text-[7px] text-slate-400 text-center uppercase tracking-wider font-extrabold">Nhấn ra ngoài để lưu</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* KHU VỰC THIẾT LẬP SỐ LƯỢNG TIỂU ĐỘI CHO BCH TỔNG */}
                <div className="bg-white rounded-2xl p-4 md:p-5 shadow border border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-3">
                  <div className="space-y-0.5 text-center sm:text-left">
                    <span className="inline-block bg-green-100 text-green-800 text-[8px] md:text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">
                      Đặc quyền BCH Tổng
                    </span>
                    <h3 className="text-xs md:text-sm font-black text-slate-800">Cấu hình Quy mô Đơn vị Huấn luyện</h3>
                    <p className="text-[10px] text-slate-400">Bạn có thể tự tăng giảm số lượng tiểu đội theo quân số thực tế.</p>
                  </div>

                  <div className="flex items-center gap-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                    <span className="text-[11px] font-bold text-slate-600 px-1.5">Số Tiểu Đội:</span>
                    <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-lg p-0.5 shadow-inner">
                      <button 
                        type="button" 
                        onClick={() => setSquadCount(prev => Math.max(1, prev - 1))}
                        className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 text-slate-800 font-extrabold text-xs transition-colors flex items-center justify-center active-scale"
                      >
                        -
                      </button>
                      <span className="w-8 text-center font-black text-xs text-custom-primary-dark">
                        {squadCount}
                      </span>
                      <button 
                        type="button" 
                        onClick={() => setSquadCount(prev => prev + 1)}
                        className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 text-slate-800 font-extrabold text-xs transition-colors flex items-center justify-center active-scale"
                      >
                        +
                      </button>
                    </div>
                  </div>
                </div>

                {/* KHU VỰC TẠO KHÓA HỌC MỚI */}
                <div className="bg-white rounded-2xl p-4 md:p-5 shadow border border-slate-100 space-y-4 animate-fadeIn mt-4">
                  <div className="flex items-center gap-2 border-b pb-2">
                    <span className="text-xl">🆕</span>
                    <div>
                      <h3 className="text-xs md:text-sm font-black text-slate-800">Khởi Tạo Khóa Huấn Luyện Mới</h3>
                      <p className="text-[10px] text-slate-400">Tạo không gian lưu trữ dữ liệu độc lập cho một khóa học mới.</p>
                    </div>
                  </div>
                  <form onSubmit={handleCreateCourse} className="flex flex-col sm:flex-row gap-3">
                    <input
                      type="text"
                      required
                      placeholder="Tên Khóa Mới (VD: Khóa 2 - Trải Nghiệm Hè 2026)"
                      value={newCourseName}
                      onChange={e => setNewCourseName(e.target.value)}
                      className="flex-1 p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:ring-2 focus:ring-green-500 outline-none bg-slate-50"
                    />
                    <button type="submit" className="bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-6 rounded-xl text-xs transition-colors active-scale whitespace-nowrap">
                      Tạo Khóa Mới
                    </button>
                  </form>
                </div>
                  </>
                )}

                {/* Grid dã chiến quản lý học viên */}
                <div className="grid lg:grid-cols-12 gap-5 md:gap-6 animate-fadeIn">
                  
                  {/* BIỂU MẪU THÊM MỚI CHIẾN SĨ VÀ CHỈ ĐỊNH TIỂU ĐỘI */}
                  <div className="lg:col-span-4">
                    <form id="student-form" onSubmit={handleAddStudentByGeneral} className="bg-white rounded-2xl shadow p-4 md:p-5 border border-slate-100 space-y-3.5">
                      <div className="border-b border-slate-100 pb-2">
                        <span className="text-[9px] text-green-700 font-black uppercase tracking-wider block">
                          {editingStudentId ? 'CẬP NHẬT THÔNG TIN HỌC VIÊN' : 'THÊM MỚI CHIẾN SĨ'}
                        </span>
                        <h3 className="text-xs md:text-sm font-black text-slate-800">
                          {editingStudentId ? `Sửa Học Viên: ${editingStudentId}` : 'Nhập Thông Tin Chiến Sĩ Nhí'}
                        </h3>
                      </div>

                      {/* Họ Tên học viên */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Họ và Tên Chiến Sĩ Nhí</label>
                        <input
                          type="text"
                          required
                          placeholder="Ví dụ: Nguyễn Hữu Đạt..."
                          value={newStudentName}
                          onChange={(e) => setNewStudentName(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800 bg-slate-50"
                        />
                      </div>

                      <div className="grid grid-cols-1 gap-3">
                        {/* Chọn Giới Tính */}
                        <div>
                          <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Giới tính (Ảnh Đại Diện)</label>
                          <select
                            value={newStudentAvatar}
                            onChange={(e) => setNewStudentAvatar(e.target.value)}
                            className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800 bg-slate-50"
                          >
                            <option value="nam.png">Nam (nam.png)</option>
                            <option value="nu.png">Nữ (nu.png)</option>
                          </select>
                        </div>
                      </div>

                      {/* SĐT Phụ Huynh để đăng nhập */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Số điện thoại Phụ huynh</label>
                        <input
                          type="text"
                          placeholder="Ví dụ: 0987654321"
                          value={newStudentPhoneState}
                          onChange={(e) => setNewStudentPhone(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800 bg-slate-50"
                        />
                      </div>

                      {/* Email Phụ Huynh */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Email Phụ huynh</label>
                        <input
                          type="email"
                          placeholder="Ví dụ: phuhuynh@gmail.com (Nếu có)"
                          value={newStudentEmail}
                          onChange={(e) => setNewStudentEmail(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800 bg-slate-50"
                        />
                      </div>

                      <div className="bg-emerald-50 p-2.5 rounded-xl border border-emerald-200 text-[9px] text-emerald-800 font-semibold space-y-1">
                        <div>🔒 <strong>Mật khẩu đăng nhập phụ huynh:</strong></div>
                        <div className="font-mono bg-white p-1 rounded text-center border font-extrabold text-custom-primary text-[10px]">
                          {(() => {
                            const currentPhone = newStudentPhoneState.trim();
                            const currentEmail = newStudentEmail.trim().toLowerCase();
                            
                            if (!currentPhone && !currentEmail) {
                              return 'Nhập SĐT để xem trước';
                            }

                            // Dò tìm tài khoản anh/chị/em dựa vào một trong hai trường có dữ liệu
                            const sibling = students.find(s => {
                              const isNotSelf = editingStudentId ? s.id !== editingStudentId : true;
                              const matchPhone = currentPhone && s.parentPhone && s.parentPhone === currentPhone;
                              const matchEmail = currentEmail && s.parentEmail && s.parentEmail.toLowerCase() === currentEmail;
                              return isNotSelf && (matchPhone || matchEmail);
                            });

                            if (sibling && sibling.parentPassword) {
                              return `${sibling.parentPassword} (Dùng chung với chiến sĩ nhí ${sibling.name})`;
                            }
                            
                            return createParentPasswordByLogic(currentPhone || '1234', editingStudentId || '(Mã số ID)');
                          })()}
                        </div>
                      </div>

                      <div className="flex gap-2">
                        <button
                          type="submit"
                          className="flex-1 bg-custom-primary hover:bg-custom-primary-light text-white font-black py-3 px-4 rounded-xl text-xs uppercase tracking-wider shadow transition-all flex items-center justify-center gap-1.5 active-scale"
                        >
                          {editingStudentId ? <CheckCircle className="w-4 h-4" /> : <Plus />}
                          <span>{editingStudentId ? 'Lưu Thay Đổi' : 'Đăng Ký Học Viên'}</span>
                        </button>
                        {editingStudentId && (
                          <button
                            type="button"
                            onClick={handleCancelEditStudent}
                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 rounded-xl text-xs font-bold border border-slate-300 active-scale"
                          >
                            Hủy
                          </button>
                        )}
                      </div>

                    </form>
                  </div>

                  {/* DANH SÁCH HỌC VIÊN CỦA KHÓA HỌC */}
                  {}
                  <div className="lg:col-span-8">
                    <div className="bg-white rounded-2xl shadow p-4 md:p-5 border border-slate-100 space-y-4">
                      <div className="flex justify-between items-center border-b border-slate-100 pb-2">
                        <h3 className="text-xs font-black text-slate-700 tracking-wider uppercase">Danh Sách Học Viên Khóa Này</h3>
                        <span className="text-[10px] text-slate-400 font-bold hidden sm:inline">Phân chia tiểu đội nhanh tại bảng</span>
                      </div>

                      {/* Thanh tìm kiếm & bộ lọc Tiểu Đội */}
                      <div className="flex flex-col sm:flex-row gap-3">
                        <div className="relative flex-1">
                          <span className="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                          </span>
                          <input
                            type="text"
                            placeholder="Tìm kiếm tên chiến sĩ nhí, mã số, SĐT phụ huynh..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full pl-9 pr-8 py-2.5 bg-slate-50 border border-slate-300 rounded-xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition-all h-10"
                          />
                          {searchTerm && (
                            <button
                              type="button"
                              onClick={() => setSearchTerm('')}
                              className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 text-lg font-bold"
                            >
                              &times;
                            </button>
                          )}
                        </div>

                        {/* Bộ lọc Tiểu Đội */}
                        <div className="w-full sm:w-52 shrink-0">
                          <select
                            value={squadFilter}
                            onChange={(e) => setSquadFilter(e.target.value)}
                            className="w-full px-3 py-2.5 bg-slate-50 border border-slate-300 rounded-xl text-xs font-extrabold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-700 h-10 shadow-sm"
                          >
                            <option value="ALL">🔍 Tất cả Tiểu Đội</option>
                            <option value="0">⚠️ Chờ phân tiểu đội</option>
                            {Array.from({ length: squadCount }, (_, i) => i + 1).map((num) => (
                              <option key={num} value={num}>🎖️ Tiểu Đội {num}</option>
                            ))}
                          </select>
                        </div>
                      </div>

                      {/* HIỂN THỊ TRÊN MOBILE: Chuyển Table thành các thẻ Profile gọn gàng */}
                      <div className="block md:hidden space-y-3">
                        {filteredStudents.length === 0 ? (
                          <div className="p-6 text-center text-slate-400 font-semibold italic text-xs">
                            Không tìm thấy học viên nào phù hợp!
                          </div>
                        ) : (
                          filteredStudents.map((student) => {
                            const studentPassword = student.parentPassword || createParentPasswordByLogic(student.parentPhone || '1234', student.id);
                            return (
                              <div key={student.id} className="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-3">
                                <div className="flex items-center justify-between">
                                  <div 
                                    onClick={() => setViewingStudent(student)}
                                    className="flex items-center gap-2 cursor-pointer group"
                                  >
                                    <span className="w-10 h-10 rounded-full overflow-hidden bg-slate-100 shrink-0 border border-slate-200">
                                      <RenderAvatar avatar={student.avatar} className="w-full h-full object-cover" />
                                    </span>
                                    <div>
                                      <h4 className="font-extrabold text-slate-800 text-xs group-hover:text-custom-primary transition-colors">{student.name}</h4>
                                      <span className="text-[10px] text-slate-400 font-mono">Mã: {student.id}</span>
                                    </div>
                                  </div>
                                  <div className="flex gap-1">
                                    <button
                                      onClick={() => handleStartEditStudent(student)}
                                      className="bg-amber-50 hover:bg-amber-100 text-amber-700 p-1.5 rounded-lg border border-amber-200 active-scale text-xs"
                                    >
                                      ✏️
                                    </button>
                                    <button
                                      onClick={() => handleDeleteStudent(student.id)}
                                      className="bg-red-50 hover:bg-red-100 text-red-600 p-1.5 rounded-lg border border-red-200 active-scale text-xs"
                                    >
                                      <Trash />
                                    </button>
                                  </div>
                                </div>
                                <div className="grid grid-cols-2 gap-2 pt-2 border-t border-slate-200/50 text-[11px]">
                                  <div>
                                    <span className="text-slate-400 block text-[9px] uppercase font-bold">Xếp Tiểu Đội</span>
                                    <select
                                      value={student.squad || 0}
                                      onChange={(e) => handleUpdateStudentSquad(student.id, e.target.value)}
                                      className="w-full p-1.5 mt-1 bg-white border border-slate-300 rounded-lg text-xs font-semibold focus:outline-none focus:ring-1 focus:ring-green-500"
                                    >
                                      <option value={0}>⚠️ Chờ phân tiểu đội</option>
                                      {Array.from({ length: squadCount }, (_, i) => i + 1).map((num) => (
                                        <option key={num} value={num}>Tiểu Đội {num}</option>
                                      ))}
                                    </select>
                                  </div>
                                  <div>
                                    <span className="text-slate-400 block text-[9px] uppercase font-bold">Liên hệ phụ huynh</span>
                                    <span className="block text-[10px] font-semibold text-slate-700 mt-1 truncate">📞 {student.parentPhone || 'Trống'}</span>
                                    <span className="block text-[10px] text-slate-500 truncate">{student.parentEmail || '📧 Trống'}</span>
                                  </div>
                                </div>
                                <div className="bg-emerald-50/70 p-2 rounded-lg border border-emerald-100 text-[10px] font-mono text-center text-custom-primary">
                                  Mật khẩu: <strong>{studentPassword}</strong>
                                </div>
                              </div>
                            );
                          })
                        )}
                      </div>

                      {/* HIỂN THỊ TRÊN PC: Giữ bảng Table trực quan */}
                      <div className="hidden md:block overflow-x-auto">
                        <table className="min-w-full divide-y divide-slate-100 text-xs">
                          <thead>
                            <tr className="bg-slate-50 text-[9px] md:text-[10px] text-slate-400 font-black uppercase text-left">
                              <th className="p-3">Học viên</th>
                              <th className="p-3">Mã số</th>
                              <th className="p-3">Xếp Tiểu Đội</th>
                              <th className="p-3">Đăng nhập Phụ Huynh</th>
                              <th className="p-3 text-center">Tác vụ</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 font-semibold text-slate-700">
                            {filteredStudents.length === 0 ? (
                              <tr>
                                <td colSpan="5" className="p-8 text-center text-slate-400 font-semibold italic">
                                  Không tìm thấy học viên nào phù hợp!
                                </td>
                              </tr>
                            ) : (
                              filteredStudents.map((student) => {
                                const studentPassword = student.parentPassword || createParentPasswordByLogic(student.parentPhone || '1234', student.id);
                                return (
                                  <tr key={student.id} className="hover:bg-slate-50/50">
                                    <td className="p-3">
                                      <div 
                                        onClick={() => setViewingStudent(student)}
                                        className="flex items-center gap-2 cursor-pointer group hover:bg-slate-100 p-1.5 -ml-1.5 rounded-lg transition-colors w-max"
                                        title="Nhấn để xem toàn bộ nhật ký rèn luyện"
                                      >
                                        <span className="w-10 h-10 rounded-full overflow-hidden bg-slate-100 shrink-0 shadow-sm border border-transparent group-hover:border-custom-primary transition-colors">
                                          <RenderAvatar avatar={student.avatar} className="w-full h-full object-cover group-hover:scale-110 transition-transform" />
                                        </span>
                                        <div className="flex flex-col">
                                          <span className="font-extrabold text-slate-800 text-[11px] sm:text-xs group-hover:text-custom-primary transition-colors">{student.name}</span>
                                          <span className="text-[9px] text-custom-primary font-bold opacity-0 group-hover:opacity-100 transition-opacity">👁️ Xem hồ sơ</span>
                                        </div>
                                      </div>
                                    </td>
                                    <td className="p-3 font-mono font-bold text-slate-400">{student.id}</td>
                                    <td className="p-3">
                                      <select
                                        value={student.squad || 0}
                                        onChange={(e) => handleUpdateStudentSquad(student.id, e.target.value)}
                                        className="p-2 bg-slate-50 border border-slate-300 rounded-xl text-[11px] font-extrabold text-slate-700 focus:outline-none focus:ring-2 focus:ring-green-600 focus:bg-white transition-all shadow-sm"
                                      >
                                        <option value={0} className="text-red-500 font-semibold">⚠️ Chờ phân tiểu đội</option>
                                        {Array.from({ length: squadCount }, (_, i) => i + 1).map((num) => (
                                          <option key={num} value={num}>Tiểu Đội {num}</option>
                                        ))}
                                      </select>
                                    </td>
                                    <td className="p-3 text-[10px] text-slate-500 space-y-0.5">
                                      {student.parentPhone && <div>📞 {student.parentPhone}</div>}
                                      {student.parentEmail && <div className="text-slate-400 break-all">📧 {student.parentEmail}</div>}
                                      <div className="mt-1 font-mono font-bold text-custom-primary bg-emerald-50/70 px-1.5 py-0.5 rounded w-max border border-emerald-100 text-[8px] md:text-[9px]">
                                        🔑 MK: {studentPassword}
                                      </div>
                                    </td>
                                    <td className="p-3 text-center">
                                      <div className="flex gap-1.5 justify-center">
                                        <button
                                          onClick={() => handleStartEditStudent(student)}
                                          className="bg-amber-50 hover:bg-amber-100 text-amber-700 p-2 rounded-xl transition-colors border border-amber-200 inline-flex items-center justify-center active-scale"
                                          title="Sửa thông-tin học viên"
                                        >
                                          ✏️
                                        </button>
                                        <button
                                          onClick={() => handleDeleteStudent(student.id)}
                                          className="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded-xl transition-colors border border-red-200/50 inline-flex items-center justify-center active-scale"
                                          title="Xóa học viên vĩnh viễn"
                                        >
                                          <Trash />
                                        </button>
                                      </div>
                                    </td>
                                  </tr>
                                );
                              })
                            )}
                          </tbody>
                        </table>
                      </div>

                    </div>
                  </div>

                </div>

               {/* GIÁM SÁT TOÀN BỘ BÁO CÁO CỦA CÁC TIỂU ĐỘI */}
                <div className="bg-white rounded-2xl shadow p-4 md:p-5 border border-slate-100 space-y-4">
                  <div className="border-b border-slate-100 pb-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                    <h3 className="text-xs md:text-sm font-black text-slate-700 tracking-wider uppercase flex items-center gap-1.5">
                      <img src="AVATAR.png" alt="Icon" className="w-5 h-5 object-cover rounded-full" />
                      <span>Giám Sát Báo Cáo Khóa Học Này</span>
                    </h3>
                    
                    {/* BỘ NÚT CHỨC NĂNG CỦA GIÁM SÁT TỔNG */}
                    <div className="flex flex-wrap items-center gap-2 w-full sm:w-auto mt-2 sm:mt-0">
                        <button
                            onClick={() => {
                                setSelectedStudent({ id: 'GLOBAL_COMMON', name: 'Nhận xét Chung Tất Cả Tiểu Đội', squad: 'ALL' });
                                setEditingReportId(null);
                                setNewReportDate(new Date().toISOString().split('T')[0]);
                                setNewActivity('');
                                setNewComment('');
                                setNewImage('');
                                setNewBehaviorRating('Tốt');
                                setNewPhysicalRating('Tốt');
                            }}
                            className="flex-1 sm:flex-initial bg-amber-500 hover:bg-amber-600 text-white text-[10px] md:text-xs font-extrabold px-3 py-1.5 rounded-lg flex items-center justify-center gap-1.5 transition-colors shadow-sm active-scale border border-amber-600"
                        >
                            📢 <span>Viết Thông Báo Toàn Khóa</span>
                        </button>

                        <button
                            onClick={handleDownloadAllImages}
                            disabled={isDownloadingAll}
                            className="flex-1 sm:flex-initial bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] md:text-xs font-bold px-3 py-1.5 rounded-lg flex items-center justify-center gap-1.5 transition-colors shadow-sm disabled:opacity-50 active-scale"
                        >
                            {isDownloadingAll ? (
                               <span className="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                            ) : (
                               <DownloadIcon className="w-4 h-4" />
                            )}
                            <span>{isDownloadingAll ? 'Đang nén ZIP...' : 'Tải ảnh khóa này'}</span>
                        </button>
                    </div>
                  </div>
                  
                  {reports.length === 0 ? (
                    <div className="p-8 text-center text-slate-400 font-semibold italic text-xs">
                      Hệ thống trống! Chưa ghi nhận nhận xét nào cho khóa này.
                    </div>
                  ) : (
                    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                      {reports.map((report) => {
                        const isCommon = report.studentId === 'COMMON';
                        const isGlobal = report.studentId === 'GLOBAL_COMMON';
                        const student = isGlobal
                          ? { name: `📢 THÔNG BÁO TỪ BCH TỔNG` }
                          : isCommon 
                          ? { name: `Nhận xét Chung Toàn Tiểu Đội ${report.squad}` } 
                          : (students.find(s => s.id === report.studentId) || { name: `Chiến sĩ (${report.studentId})` });
                        return (
                          <div 
                            key={report.id} 
                            className={`rounded-xl p-4 border space-y-3 flex flex-col justify-between hover:shadow-sm ${
                              isGlobal ? 'bg-red-50 border-red-300 ring-1 ring-red-100' :
                              isCommon ? 'bg-amber-50 border-amber-300' : 'bg-slate-50 border-slate-200'
                            }`}
                          >
                            <div className="space-y-2">
                              <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                                <span className={`font-extrabold text-xs ${isGlobal ? 'text-red-700' : isCommon ? 'text-amber-800' : 'text-custom-primary'}`}>
                                  {student.name}
                                </span>
                                <span className="text-[8px] bg-custom-accent text-green-950 font-black px-1.5 py-0.5 rounded-md uppercase tracking-wider shrink-0 ml-2">
                                  {isGlobal ? 'TOÀN KHÓA' : `TĐ ${report.squad}`}
                                </span>
                              </div>
                              <div className="text-[10px] font-bold text-slate-700">📌 Chuyên đề: {report.activity}</div>
                              <p className="text-[10px] text-slate-500 font-medium line-clamp-3">"{report.comment}"</p>
                            </div>

                            {report.image && (
                              <img src={parseAndConvertDriveUrl(report.image)} alt="Báo cáo" className="w-full h-24 object-cover rounded-lg border border-slate-300 cursor-zoom-in" onClick={() => setZoomedImage({ url: parseAndConvertDriveUrl(report.image), title: isGlobal ? `[THÔNG BÁO TỔNG] - ${report.activity}` : `Báo cáo giám sát TĐ ${report.squad}` })} />
                            )}

                            <div className="pt-2 border-t border-slate-200/50 flex justify-between items-center text-[9px] font-bold">
                              <span className="text-slate-400">{report.date}</span>
                              <div className="flex gap-1.5">
                                <button
                                  onClick={() => handleStartEditReport(report)}
                                  className="text-amber-800 bg-amber-50 hover:bg-amber-100 border border-amber-200 px-2.5 py-1 rounded-lg active-scale animate-pulse"
                                >
                                  ✏️ Sửa
                                </button>
                                <button
                                  onClick={() => {
                                    setConfirmModal({
                                      isOpen: true,
                                      type: 'report',
                                      id: report.id,
                                      message: `Bạn có chắc muốn xóa báo cáo ngày ${report.date} này của ${isCommon ? 'tiểu đội' : 'học sinh'}?`
                                    });
                                  }}
                                  className="text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 px-2.5 py-1 rounded-lg active-scale"
                                >
                                  🗑️ Xóa
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

          </main>

          {/* ===================== CHÂN TRANG THƯƠNG HIỆU NGUYÊN BẢN 100% ===================== */}
          <footer className="bg-slate-900 text-slate-400 text-xs py-8 mt-16 border-t-4 border-custom-primary-dark">
