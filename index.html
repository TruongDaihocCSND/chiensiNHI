                              value={newActivity}
                              onChange={(e) => setNewActivity(e.target.value)}
                            />
                          </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-4">
                          {/* Đánh giá Nền nếp tác phong */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1.5">Nền nếp tác phong</label>
                            <select
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium"
                              value={newBehaviorRating}
                              onChange={(e) => setNewBehaviorRating(e.target.value)}
                            >
                              <option value="Xuất Sắc">Xuất Sắc 🎖️</option>
                              <option value="Tốt">Tốt 👍</option>
                              <option value="Khá">Khá 👌</option>
                              <option value="Đạt">Trung bình / Đạt</option>
                            </select>
                          </div>

                          {/* Đánh giá Thể chất sức khỏe */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1.5">Sức khỏe & Thể chất</label>
                            <select
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium"
                              value={newPhysicalRating}
                              onChange={(e) => setNewPhysicalRating(e.target.value)}
                            >
                              <option value="Xuất Sắc">Xuất Sắc 🎖️</option>
                              <option value="Tốt">Tốt 👍</option>
                              <option value="Khá">Khá 👌</option>
                              <option value="Đạt">Trung bình / Đạt</option>
                            </select>
                          </div>
                        </div>

                        {/* Tải tệp ảnh hoặc chọn link mẫu nhanh */}
                        <div className="grid md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1.5">Ảnh dã ngoại chụp nhanh (Kho mẫu)</label>
                            <select
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium"
                              value={newImage}
                              onChange={(e) => {
                                setNewImage(e.target.value);
                                setCustomImageFile(null);
                              }}
                            >
                              <option value="">Chọn một ảnh dã ngoại có sẵn...</option>
                              <option value={APP_CONFIG.defaultImages.squad1}>Huấn luyện điều lệnh đội ngũ 👮‍♂️</option>
                              <option value={APP_CONFIG.defaultImages.squad2}>Tập huấn kỹ năng dã ngoại sơ cứu 🩹</option>
                              <option value={APP_CONFIG.defaultImages.squad3}>Lớp học chuyên đề an ninh xã hội 🏫</option>
                              <option value={APP_CONFIG.defaultImages.squad4}>Hội thao việt dã vượt chướng ngại vật running👮‍♂️</option>
                            </select>
                          </div>

                          <div>
                            <label className="block text-[10px] font-bold text-slate-600 mb-1.5 flex items-center gap-1">
                              <Camera className="w-3.5 h-3.5 text-custom-primary" /> Hoặc tải lên ảnh chụp từ thiết bị
                            </label>
                            <input 
                              type="file" 
                              accept="image/*" 
                              onChange={handleFileChange}
                              className="text-xs text-slate-500 block w-full file:mr-3 file:py-1.5 file:px-3 file:rounded-xl file:border-0 file:text-[10px] file:font-semibold file:bg-green-100 file:text-green-800 hover:file:bg-green-200 cursor-pointer"
                            />
                            {customImageFile && (
                              <p className="text-[9px] text-emerald-600 mt-1">✓ Đã nạp file: {customImageFile.name}</p>
                            )}
                          </div>
                        </div>

                        {/* Văn bản Nhận xét */}
                        <div>
                          <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1.5">Nội dung nhận xét dã chiến chi tiết</label>
                          <textarea
                            rows="3"
                            placeholder="Nhập cụ thể biểu hiện của bé hôm nay (ví dụ: Cháu hăng hái tham gia dọn dẹp vệ sinh phòng sinh hoạt chung, vượt rào thể lực xuất sắc)..."
                            className="w-full p-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium text-slate-800"
                            value={newComment}
                            onChange={(e) => setNewComment(e.target.value)}
                          ></textarea>
                        </div>

                        {/* Các nút Tác vụ */}
                        <div className="flex gap-3">
                          <button
                            type="submit"
                            className="flex-1 bg-custom-primary hover:bg-custom-primary-light text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 text-xs"
                          >
                            <CheckCircle className="w-4 h-4" />
                            <span>{editingReportId ? 'Lưu Cập Nhật' : 'Thêm Nhận Xét Mới'}</span>
                          </button>
                          <button
                            type="button"
                            onClick={() => {
                              setSelectedStudent(null);
                              setNewActivity('');
                              setNewComment('');
                              setEditingReportId(null);
                            }}
                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 rounded-xl text-xs font-semibold border border-slate-300 transition-colors"
                          >
                            Hủy bỏ {editingReportId ? 'sửa' : ''}
                          </button>
                        </div>

                      </form>
                    ) : (
                      <div className="bg-white rounded-2xl p-12 text-center border-2 border-dashed border-slate-300 shadow-inner flex flex-col items-center justify-center space-y-4">
                        <div className="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center text-3xl">
                          👮‍♂️
                        </div>
                        <div>
                          <h3 className="font-extrabold text-slate-700 text-sm">Chưa lựa chọn Học sinh của Tiểu Đội</h3>
                          <p className="text-xs text-slate-400 max-w-sm mt-1 leading-relaxed">
                            Hãy nhấp vào tên một chiến sĩ bất kỳ trong tiểu đội của bạn ở danh sách bên trái để tiến hành thêm nhận xét rèn luyện dã chiến cho cháu.
                          </p>
                        </div>
                      </div>
                    )}
                  </div>

                </div>

                {/* DANH SÁCH NHẬT KÝ ĐÃ GHI CỦA TIỂU ĐỘI - CHO PHÉP CHỈNH SỬA VÀ XÓA TẠI CHỖ */}
                <div className="bg-white rounded-2xl shadow p-5 border border-slate-100 space-y-4 mt-6">
                  <h3 className="text-sm font-black text-slate-800 flex items-center gap-1.5 uppercase">
                    <ImageIcon className="w-5 h-5 text-custom-primary" />
                    <span>Lịch Sử Nhật Ký Hoạt Động Tiểu Đội {loggedInSquad} ({reports.filter(r => r.squad === loggedInSquad).length} báo cáo)</span>
                  </h3>
                  
                  {reports.filter(r => r.squad === loggedInSquad).length === 0 ? (
                    <div className="p-8 text-center text-slate-400 border border-dashed border-slate-200 rounded-xl space-y-1">
                      <div className="text-3xl">📭</div>
                      <p className="text-xs">Tiểu đội của bạn hiện tại chưa có báo cáo hoạt động nào.</p>
                    </div>
                  ) : (
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                      {reports.filter(r => r.squad === loggedInSquad).map(report => {
                        const student = students.find(s => s.id === report.studentId);
                        return (
                          <div key={report.id} className="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-3 flex flex-col justify-between hover:shadow-md transition-shadow">
                            <div className="space-y-2">
                              <div className="flex justify-between items-center border-b border-slate-200/50 pb-2">
                                <span className="font-extrabold text-xs text-emerald-950">
                                  {student ? student.name : 'Chiến sĩ dã chiến'}
                                </span>
                                <span className="text-[10px] text-slate-400 font-mono">ID: {report.studentId}</span>
                              </div>
                              <div className="text-[11px] font-bold text-slate-700">📌 Chuyên đề: {report.activity}</div>
                              <p className="text-[11px] text-slate-500 line-clamp-3 italic font-medium">"{report.comment}"</p>
                            </div>

                            {report.image && (
                              <div className="relative group overflow-hidden rounded-lg border border-slate-200">
                                <img 
                                  src={report.image} 
                                  alt="Review" 
                                  className="w-full h-24 object-cover cursor-zoom-in hover:opacity-90 transition-all" 
                                  onClick={() => setZoomedImage({
                                    url: report.image,
                                    title: `${student ? student.name : 'Chiến sĩ'} - Hoạt động: ${report.activity} (${report.date})`
                                  })}
                                />
                              </div>
                            )}

                            <div className="space-y-2 pt-2 border-t border-slate-200/50">
                              <div className="flex justify-between items-center text-[9px]">
                                <span className="text-slate-400 font-semibold">{report.date}</span>
                                <div className="flex gap-1">
                                  <span className="bg-green-100 text-green-800 px-1.5 py-0.5 rounded">Tác phong: {report.behaviorRating}</span>
                                  <span className="bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded">Thể chất: {report.physicalRating}</span>
                                </div>
                              </div>

                              <div className="flex gap-2 pt-1.5 border-t border-slate-200/30">
                                <button
                                  type="button"
                                  onClick={() => handleStartEditReport(report)}
                                  className="flex-1 bg-amber-50 hover:bg-amber-100 text-amber-800 font-bold py-1.5 px-2 rounded-lg text-[10px] border border-amber-200 transition-colors flex items-center justify-center gap-1 shadow-sm"
                                >
                                  ✏️ Chỉnh Sửa
                                </button>
                                <button
                                  type="button"
                                  onClick={() => {
                                    setConfirmModal({
                                      isOpen: true,
                                      type: 'report',
                                      id: report.id,
                                      message: `Bạn có chắc chắn muốn xóa vĩnh viễn báo cáo hoạt động ngày ${report.date} (Chuyên đề: ${report.activity}) của bé ${student ? student.name : 'Chiến sĩ'} khỏi hệ thống?`
                                    });
                                  }}
                                  className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-1.5 px-2 rounded-lg text-[10px] border border-red-200 transition-colors flex items-center justify-center gap-1 shadow-sm"
                                >
                                  🗑️ Xóa Bỏ
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* ===================== 4. GIAO DIỆN CHỈ HUY TỔNG (GENERAL SUPERIOR VIEW) ===================== */}
            {currentView === 'general_dashboard' && (
              <div className="space-y-6 animate-fadeIn">
                
                {/* Header Tổng quan */}
                <div className="bg-gradient-to-r from-green-950 to-green-900 rounded-2xl p-6 text-white shadow-md border-b-4 border-custom-accent flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <div>
                    <span className="text-[10px] bg-custom-accent text-green-950 font-black px-2.5 py-1 rounded uppercase tracking-wider">
                      Cơ Quan Chỉ Huy Tối Cao (BCH Tổng)
                    </span>
                    <h2 className="text-2xl font-black mt-1 text-custom-accent">
                      Bảng Điều Hành Toàn Khóa Huấn Luyện
                    </h2>
                    <p className="text-xs text-emerald-200 mt-1 font-medium">
                      Xem danh sách toàn bộ học viên, thêm học viên mới, chỉ định tiểu đội tác chiến và giám sát toàn bộ báo cáo rèn luyện dã ngoại.
                    </p>
                  </div>

                  <div className="flex gap-2 flex-wrap">
                    <span className="bg-black/30 px-3.5 py-2 rounded-xl text-xs border border-white/5">
                      Tổng số: <strong className="text-custom-accent">{students.length} Học viên</strong>
                    </span>
                    <span className="bg-black/30 px-3.5 py-2 rounded-xl text-xs border border-white/5">
                      Báo cáo: <strong className="text-custom-accent">{reports.length} Nhật ký</strong>
                    </span>
                    <span className="bg-black/30 px-3.5 py-2 rounded-xl text-xs border border-white/5">
                      Quy mô: <strong className="text-custom-accent">{squadCount} Tiểu đội</strong>
                    </span>
                  </div>
                </div>

                {/* KHU VỰC THIẾT LẬP SỐ LƯỢNG TIỂU ĐỘI CHO BCH TỔNG KHI HỌC VIÊN ĐÔNG */}
                <div className="bg-white rounded-2xl p-5 shadow border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                  <div className="space-y-1 text-center md:text-left">
                    <span className="inline-block bg-green-100 text-green-800 text-[9px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider">
                      Đặc quyền BCH Tổng
                    </span>
                    <h3 className="text-sm font-black text-slate-800">Cấu hình Quy mô Đơn vị Huấn luyện</h3>
                    <p className="text-xs text-slate-400">Bạn có thể điều chỉnh linh hoạt số lượng tiểu đội tùy thuộc vào lượng học viên nhập ngũ thực tế hằng năm.</p>
                  </div>

                  <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-200">
                    <span className="text-xs font-bold text-slate-600 px-2">Số Tiểu Đội Biên Chế:</span>
                    <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-xl p-1 shadow-inner">
                      <button 
                        type="button" 
                        onClick={() => setSquadCount(prev => Math.max(1, prev - 1))}
                        className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-800 font-extrabold text-xs transition-colors flex items-center justify-center"
                      >
                        -
                      </button>
                      <span className="w-10 text-center font-black text-sm text-custom-primary-dark">
                        {squadCount}
                      </span>
                      <button 
                        type="button" 
                        onClick={() => setSquadCount(prev => prev + 1)}
                        className="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-800 font-extrabold text-xs transition-colors flex items-center justify-center"
                      >
                        +
                      </button>
                    </div>
                  </div>
                </div>

                {/* Grid dã chiến */}
                <div className="grid lg:grid-cols-12 gap-6">
                  
                  {/* BIỂU MẪU THÊM MỚI CHIẾN SĨ VÀ CHỈ ĐỊNH TIỂU ĐỘI */}
                  <div className="lg:col-span-4">
                    <form onSubmit={handleAddStudentByGeneral} className="bg-white rounded-2xl shadow p-5 border border-slate-100 space-y-4">
                      <div className="border-b border-slate-100 pb-3">
                        <span className="text-[10px] text-green-700 font-black uppercase tracking-wider block">Thao Tác Nghiệp Vụ</span>
                        <h3 className="text-sm font-black text-slate-800">Thêm & Chỉ Định Học Viên</h3>
                      </div>

                      {/* Họ Tên học viên */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase tracking-wide mb-1">Họ và Tên Chiến Sĩ Nhí</label>
                        <input
                          type="text"
                          required
                          placeholder="Ví dụ: Nguyễn Hữu Đạt..."
                          value={newStudentName}
                          onChange={(e) => setNewStudentName(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                        />
                      </div>

                      <div className="grid grid-cols-2 gap-3">
                        {/* Chọn Avatar quân hàm */}
                        <div>
                          <label className="block text-[10px] font-bold text-slate-600 uppercase tracking-wide mb-1">Ảnh đại diện nhí</label>
                          <select
                            value={newStudentAvatar}
                            onChange={(e) => setNewStudentAvatar(e.target.value)}
                            className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                          >
                            <option value="👶">👶 Binh Nhì Quân</option>
                            <option value="👧">👧 Binh Nhì Thư</option>
                            <option value="👦">👦 Binh Nhì Bách</option>
                            <option value="👮‍♂️">👮‍♂️ Sĩ Quan Nhỏ</option>
                          </select>
                        </div>

                        {/* Chỉ định tiểu đội rèn luyện - Động dựa trên quy mô số lượng tiểu đội */}
                        <div>
                          <label className="block text-[10px] font-bold text-slate-600 uppercase tracking-wide mb-1">Tiểu Đội Chỉ Định</label>
                          <select
                            value={newStudentSquad}
                            onChange={(e) => setNewStudentSquad(parseInt(e.target.value))}
                            className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                          >
                            {Array.from({ length: squadCount }, (_, i) => i + 1).map((num) => (
                              <option key={num} value={num}>Tiểu Đội {num} ({squadCodes[num] || `TD-${num}`})</option>
                            ))}
                          </select>
                        </div>
                      </div>

                      {/* SĐT Phụ Huynh để đăng nhập */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase tracking-wide mb-1">Số điện thoại Phụ huynh</label>
                        <input
                          type="text"
                          required
                          placeholder="Ví dụ: 0987654321..."
                          value={newStudentPhone}
                          onChange={(e) => setNewStudentPhone(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                        />
                      </div>

                      {/* Email Phụ Huynh */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase tracking-wide mb-1">Email Phụ huynh</label>
                        <input
                          type="email"
                          required
                          placeholder="Ví dụ: phuhuynh@gmail.com..."
                          value={newStudentEmail}
                          onChange={(e) => setNewStudentEmail(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                        />
                      </div>

                      <button
                        type="submit"
                        className="w-full bg-custom-primary hover:bg-custom-primary-light text-white font-black py-3 px-4 rounded-xl text-xs uppercase tracking-wider shadow transition-all flex items-center justify-center gap-1.5"
                      >
                        <Plus />
                        <span>Thêm Chiến Sĩ Mới</span>
                      </button>

                    </form>
                  </div>

                  {/* DANH SÁCH HỌC VIÊN TOÀN KHÓA HỌC */}
                  <div className="lg:col-span-8">
                    <div className="bg-white rounded-2xl shadow p-5 border border-slate-100 space-y-4">
                      <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                        <h3 className="text-xs font-black text-slate-700 tracking-wider uppercase">Danh Sách Học Viên Toàn Hệ Thống</h3>
                        <span className="text-[10px] text-slate-400 font-bold">Chỉ BCH Tổng mới có thẩm quyền xóa học viên</span>
                      </div>

                      <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse text-xs">
                          <thead>
                            <tr className="bg-slate-50 border-b border-slate-100 text-[10px] text-slate-400 font-black uppercase">
                              <th className="p-3">Học viên</th>
                              <th className="p-3">Mã số quân bài</th>
                              <th className="p-3">Tiểu Đội</th>
                              <th className="p-3">Liên hệ Phụ Huynh</th>
                              <th className="p-3 text-center">Xóa bỏ</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 font-semibold text-slate-700">
                            {students.map((student) => (
                              <tr key={student.id} className="hover:bg-slate-50/50">
                                <td className="p-3 flex items-center gap-2">
                                  <span className="text-xl bg-slate-100 p-1 rounded-full">{student.avatar}</span>
                                  <span className="font-extrabold text-slate-800">{student.name}</span>
                                </td>
                                <td className="p-3 font-mono font-bold text-slate-400">{student.id}</td>
                                <td className="p-3">
                                  <span className="bg-yellow-100 text-yellow-900 font-bold px-2 py-0.5 rounded-full text-[9px]">
                                    Tiểu Đội {student.squad}
                                  </span>
                                </td>
                                <td className="p-3 text-[10px] text-slate-500">
                                  <div>📞 {student.parentPhone}</div>
                                  <div className="text-slate-400 mt-0.5">📧 {student.parentEmail}</div>
                                </td>
                                <td className="p-3 text-center">
                                  <button
                                    onClick={() => handleDeleteStudent(student.id)}
                                    className="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded-xl transition-colors border border-red-200/50 inline-flex items-center justify-center"
                                    title="Xóa học viên vĩnh viễn"
                                  >
                                    <Trash />
                                  </button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>

                </div>

                {/* GIÁM SÁT TOÀN BỘ BÁO CÁO CỦA CÁC TIỂU ĐỘI */}
                <div className="bg-white rounded-2xl shadow p-5 border border-slate-100 space-y-4">
                  <div className="border-b border-slate-100 pb-3 flex justify-between items-center">
                    <h3 className="text-xs font-black text-slate-700 tracking-wider uppercase flex items-center gap-1.5">
                      <ImageIcon className="text-custom-primary" />
                      <span>Giám Sát Báo Cáo Của Toàn Bộ {squadCount} Tiểu Đội</span>
                    </h3>
                    <span className="text-[10px] font-bold text-custom-primary">Giám sát, sửa đổi hoặc xóa mọi báo cáo dã chiến</span>
                  </div>

                  {reports.length === 0 ? (
                    <div className="p-8 text-center text-slate-400 font-semibold italic">
                      Hệ thống trống! Chưa có báo cáo nào được ghi nhận hôm nay.
                    </div>
                  ) : (
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                      {reports.map((report) => {
                        const student = students.find(s => s.id === report.studentId);
                        return (
                          <div key={report.id} className="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-3 flex flex-col justify-between">
                            <div className="space-y-2">
                              <div className="flex justify-between items-center border-b border-slate-200 pb-1.5">
                                <span className="font-extrabold text-xs text-custom-primary">
                                  {student ? student.name : 'Chiến sĩ bí mật'}
                                </span>
                                <span className="text-[9px] bg-custom-accent text-green-950 font-black px-1.5 py-0.5 rounded-md uppercase tracking-wider">
                                  TĐ {report.squad}
                                </span>
                              </div>
                              <div className="text-[10px] font-bold text-slate-700">📌 Chuyên đề: {report.activity}</div>
                              <p className="text-[10px] text-slate-500 font-medium line-clamp-3">"{report.comment}"</p>
                            </div>

                            {report.image && (
                              <img src={report.image} alt="Báo cáo" className="w-full h-24 object-cover rounded-lg border border-slate-300 cursor-zoom-in animate-fadeIn" onClick={() => setZoomedImage({ url: report.image, title: `Báo cáo giám sát TĐ ${report.squad}` })} />
                            )}

                            <div className="pt-2 border-t border-slate-200/50 flex justify-between items-center text-[9px] font-bold">
                              <span className="text-slate-400">{report.date}</span>
                              <div className="flex gap-1.5">
                                <button
                                  onClick={() => handleStartEditReport(report)}
                                  className="text-amber-800 bg-amber-50 hover:bg-amber-100 border border-amber-200 px-2 py-1 rounded"
                                >
                                  ✏️ Sửa
                                </button>
                                <button
                                  onClick={() => {
                                    setConfirmModal({
                                      isOpen: true,
                                      type: 'report',
                                      id: report.id,
                                      message: `Bạn có chắc chắn muốn xóa báo cáo ngày ${report.date} (Hoạt động: ${report.activity}) của cháu ${student ? student.name : 'Chiến sĩ'}?`
                                    });
                                  }}
                                  className="text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 px-2 py-1 rounded"
                                >
                                  🗑️ Xóa
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

          </main>

          {/* ===================== CHÂN TRANG THƯƠNG HIỆU ===================== */}
          <footer className="bg-slate-900 text-slate-400 text-xs py-8 mt-16 border-t-4 border-custom-primary-dark">
            <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-8">
              <div className="space-y-3">
                <div className="flex items-center gap-2 text-white font-black">
                  <Shield />
                  <span className="font-black uppercase tracking-wider">Chương Trình Công An Nhí 2026</span>
                </div>
                <p className="leading-relaxed text-slate-500 font-semibold text-[11px]">
                  Chương trình phối hợp giáo dục thực tế quốc phòng, kỹ năng sống và kỷ luật quân đội nhân dân dành riêng cho học sinh từ 9 đến 15 tuổi, bồi dưỡng lòng yêu Tổ quốc và sống tự lập.
                </p>
              </div>
              <div className="space-y-2 text-[11px] font-semibold">
                <h4 className="text-white font-bold text-sm uppercase tracking-wide">Đường Dây Nóng Hỗ Trợ</h4>
                <div className="space-y-1 text-slate-500">
                  <p>📞 Số điện thoại liên hệ: 091 109 9798 (Hoài Nam)</p>
                  <p>📧 Email liên hệ: contact@dhcsnd.bocongan.gov.vn</p>
                  <p>📍 Địa điểm: 36 Nguyễn Hữu Thọ, Phường Tân Hưng, TP.HCM, Việt Nam</p>
                </div>
              </div>
              <div className="space-y-2 text-[11px] font-semibold">
                <h4 className="text-white font-bold text-sm uppercase tracking-wide">Cam Kết Chất Lượng</h4>
                <p className="text-slate-500 leading-relaxed">
                  Thông tin nhận xét hằng ngày cập nhật chính xác trước 21h30 bởi Tiểu đội trưởng trực tiếp huấn luyện. Đảm bảo phản ánh đúng thực tế rèn luyện của bé.
                </p>
              </div>
            </div>
            <div className="max-w-7xl mx-auto px-4 mt-8 pt-6 border-t border-slate-800 text-center text-slate-600 font-bold">
              <p>© 2026 Chương Trình Chiến Sĩ Công An Nhí. Phát triển vì sự trưởng thành toàn diện của trẻ em Việt Nam.</p>
            </div>
          </footer>

          {/* ===================== DIALOG XÁC NHẬN AN TOÀN TRƯỚC KHI XÓA ===================== */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4 animate-fadeIn">
              <div className="absolute inset-0 cursor-zoom-out" onClick={() => setConfirmModal({ isOpen: false, type: '', id: '', message: '' })}></div>
              
              <div className="relative bg-white rounded-2xl p-6 max-w-sm w-full space-y-4 shadow-2xl border border-slate-200 z-10 animate-scaleIn">
                <div className="flex items-center gap-2.5 text-red-600 border-b border-slate-100 pb-3">
                  <Shield />
                  <h4 className="font-extrabold text-sm uppercase tracking-wider">Cảnh Báo Hệ Thống</h4>
                </div>
                
                <p className="text-xs text-slate-600 leading-relaxed font-semibold py-1">
                  {confirmModal.message}
                </p>
                
                <div className="flex gap-2.5 pt-2 border-t border-slate-100">
                  <button
                    onClick={() => {
                      if (confirmModal.type === 'student') {
                        executeDeleteStudent(confirmModal.id);
                      } else if (confirmModal.type === 'report') {
                        executeDeleteReport(confirmModal.id);
                      }
                      setConfirmModal({ isOpen: false, type: '', id: '', message: '' });
                    }}
                    className="flex-1 bg-red-600 hover:bg-red-700 text-white font-extrabold py-2 px-4 rounded-xl text-xs transition-colors shadow"
                  >
                    Xác Nhận Xóa
                  </button>
                  <button
                    onClick={() => setConfirmModal({ isOpen: false, type: '', id: '', message: '' })}
                    className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-4 rounded-xl text-xs border border-slate-300 transition-colors"
                  >
                    Hủy Bỏ
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ===================== MODAL PHÓNG TO VÀ DOWNLOAD TẢI ẢNH ===================== */}
          {zoomedImage && (
            <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/90 p-4 animate-fadeIn">
              <div className="absolute inset-0 cursor-zoom-out" onClick={() => setZoomedImage(null)}></div>
              
              <div className="relative max-w-3xl w-full flex flex-col items-center space-y-4 z-10 animate-scaleIn">
                
                {/* Khung chứa ảnh lớn */}
                <div className="bg-slate-900 rounded-2xl overflow-hidden shadow-2xl max-h-[75vh] border border-white/10 flex items-center justify-center">
                  <img 
                    src={zoomedImage.url} 
                    alt="Phóng to ảnh dã ngoại" 
                    className="max-h-[75vh] w-auto max-w-full object-contain"
                  />
                </div>

                {/* Thanh điều khiển tải ảnh bên dưới */}
                <div className="bg-slate-900/90 text-white p-4 rounded-2xl border border-white/10 w-full flex flex-col sm:flex-row justify-between items-center gap-3 backdrop-blur-md">
                  <div className="text-left">
                    <span className="text-[9px] bg-custom-accent text-green-950 px-2 py-0.5 rounded font-black uppercase">Ảnh dã ngoại thực tế</span>
                    <p className="text-xs font-semibold text-slate-200 mt-1 leading-relaxed">
                      {zoomedImage.title}
                    </p>
                  </div>

                  <div className="flex gap-2 flex-shrink-0">
                    <a 
                      href={zoomedImage.url} 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="bg-custom-primary hover:bg-custom-primary-light text-white px-4 py-2 rounded-xl text-xs font-extrabold flex items-center gap-1.5 transition-colors shadow-lg"
                    >
                      <Camera className="w-3.5 h-3.5 text-custom-accent" />
                      <span>Tải ảnh gốc</span>
                    </a>
                    <button
                      onClick={() => setZoomedImage(null)}
                      className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-xl text-xs font-extrabold transition-colors border border-slate-700"
                    >
                      Đóng lại
                    </button>
                  </div>
                </div>

                <p className="text-[10px] text-slate-500 font-medium">
                  💡 *Mẹo: Phụ huynh sử dụng điện thoại di động có thể chạm và giữ ảnh khoảng 2 giây để lưu nhanh về máy.*
                </p>

              </div>
            </div>
          )}

        </div>
      );
    }

    // Khởi chạy ứng dụng React
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

  </script>
</body>
</html>
