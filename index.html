      --card-bg: #ffffff;          /* Màu nền của các khung, thẻ thông tin */
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-body);
      -webkit-tap-highlight-color: transparent;
    }

    /* ĐỊNH NGHĨA CÁC CLASS TIỆN ÍCH DỰA TRÊN BẢNG MÀU TỰ DESIGN */
    .bg-custom-primary { background-color: var(--primary); }
    .bg-custom-primary-dark { background-color: var(--primary-dark); }
    .bg-custom-primary-light { background-color: var(--primary-light); }
    .bg-custom-accent { background-color: var(--accent); }
    .bg-custom-accent-hover:hover { background-color: var(--accent-hover); }
    .bg-custom-secondary { background-color: var(--secondary); }
    .bg-custom-secondary-hover:hover { background-color: var(--secondary-hover); }
    .text-custom-primary { color: var(--primary); }
    .text-custom-primary-dark { color: var(--primary-dark); }
    .text-custom-accent { color: var(--accent); }
    .border-custom-primary { border-color: var(--primary); }
    .border-custom-accent { border-color: var(--accent); }

    /* Hiệu ứng chuyển động mượt mà */
    .animate-fadeIn {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-scaleIn {
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    
    /* Thiết kế thanh cuộn cao cấp */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Giao diện nút nhấn cảm giác thật khi chạm */
    .active-scale:active {
      transform: scale(0.96);
    }

          const matchPath = trimmedUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
          if (matchPath && matchPath[1]) {
            fileId = matchPath[1];
          } else {
            const matchQuery = trimmedUrl.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (matchQuery && matchQuery[1]) {
              fileId = matchQuery[1];
            }
          }
          if (fileId) {
            return `https://drive.google.com/thumbnail?id=${fileId}&sz=w2000`;
          }
        }
        return trimmedUrl;

      const fetchImageAsBlob = async (url) => {
        try {
          const response = await fetch(url);

        } catch (e) {
          console.warn("Tải trực tiếp thất bại do lỗi CORS, kích hoạt CORS Proxy chuyên dụng cho url:", url);

        try {

          if (response.ok) return await response.blob();
        } catch (e) {

        try {

        const targetSquad = selectedStudent.id === 'GLOBAL_COMMON' ? 'ALL' : (role === 'commander' ? loggedInSquad : selectedStudent.squad);

        if (role === 'commander' && selectedStudent.id !== 'COMMON' && selectedStudent.squad !== loggedInSquad) {
          showToast('Bạn không có thẩm quyền đối với học viên tiểu đội khác!', 'error');
          return;
        }

        const basePath = `artifacts/${appId}/public/data`;
        const reportsCol = getCollectionName('reports');

        try {
          if (editingReportId) {
            const reportRef = fb.doc(db, basePath, reportsCol, editingReportId);
            await fb.setDoc(reportRef, {
              date: newReportDate,
              activity: newActivity,
              behaviorRating: newBehaviorRating,
              physicalRating: newPhysicalRating,
              comment: newComment,
              image: processedImageUrl
            }, { merge: true });

            showToast(`Đã đồng bộ cập nhật thành công!`);
            setEditingReportId(null);
            
            // Xóa state để đóng modal nếu là BCH Tổng
            if (role === 'general') {
              setSelectedStudent(null);
              setNewActivity('');
              setNewComment('');
            }
            
          } else {
            const newId = `r-${Date.now()}`;
            const reportRef = fb.doc(db, basePath, reportsCol, newId);
            await fb.setDoc(reportRef, {
              id: newId,
              studentId: selectedStudent.id, // Lưu trữ: 'COMMON', 'GLOBAL_COMMON' hoặc 'CSxxx'
              date: newReportDate,
              activity: newActivity,
              squad: targetSquad,
              behaviorRating: newBehaviorRating,
              physicalRating: newPhysicalRating,
              comment: newComment,
              image: processedImageUrl
            });

            showToast(`Đã gửi đánh giá/thông báo thành công lên hệ thống!`);
            
            setNewActivity('');
            setNewComment('');
            setNewImage('');
            setCustomImageFile(null);
            setSelectedStudent(null);
          }

        } catch (error) {
          showToast('Lỗi khi đồng bộ lên dữ liệu đám mây!', 'error');
          console.error(error);
        }
      };

      // ----------------------------------------------------------------------
      // BCH TỔNG THAO TÁC CẬP NHẬT TRỰC TIẾP SQUAD (DƯỚI DANH SÁCH BẢNG)
      // ----------------------------------------------------------------------
      const handleUpdateStudentSquad = async (studentId, newSquadValue) => {
        if (!db || !fb || !activeCourse) return;
        const newSquadNum = parseInt(newSquadValue);
        try {
          const basePath = `artifacts/${appId}/public/data`;
          const studentsCol = getCollectionName('students');
          const studentRef = fb.doc(db, basePath, studentsCol, studentId);
          await fb.setDoc(studentRef, {
            squad: newSquadNum
          }, { merge: true });
          
          showToast(`Đã chuyển chiến sĩ sang ${newSquadNum === 0 ? 'Chờ phân đội' : `Tiểu Đội ${newSquadNum}`} thành công!`);
        } catch (error) {
          showToast('Lỗi cập nhật tiểu đội lên Cloud!', 'error');
          console.error(error);
        }
      };

      // ----------------------------------------------------------------------
      // CHUYỂN SANG TRẠNG THÁI SỬA THÔNG TIN CHI TIẾT HỌC VIÊN
      // ----------------------------------------------------------------------
      const handleStartEditStudent = (student) => {
        setEditingStudentId(student.id);
        setNewStudentName(student.name);
        setNewStudentPhone(student.parentPhone || '');
        setNewStudentEmail(student.parentEmail || '');
        setNewStudentAvatar(student.avatar || 'nam.png');
        
        // Cải thiện Auto-scroll mượt mà trên Mobile & PC
        setTimeout(() => document.getElementById('student-form')?.scrollIntoView({ behavior: 'smooth' }), 100);
        showToast(`Đã nạp thông tin để sửa học viên: ${student.name}`);
      };

      // ----------------------------------------------------------------------
      // HUY BO EDIT HOC VIEN
      // ----------------------------------------------------------------------
      const handleCancelEditStudent = () => {
        setEditingStudentId(null);
        setNewStudentName('');
        setNewStudentPhone('');
        setNewStudentEmail('');
        setNewStudentAvatar('nam.png');
      };

      const handleAddStudentByGeneral = async (e) => {
        e.preventDefault();
        if (!newStudentName.trim() || !activeCourse) {
          showToast('Vui lòng điền Họ và tên chiến sĩ nhí!', 'error');
          return;
        }

        const phoneInput = newStudentPhoneState.trim();
        const emailInput = newStudentEmail.trim().toLowerCase();

        // CHỈNH SỬA: Chỉ yêu cầu nhập ít nhất SĐT hoặc Email
        if (!phoneInput && !emailInput) {
          showToast('Vui lòng điền ít nhất Số điện thoại hoặc Email phụ huynh!', 'error');
          return;
        }

        const basePath = `artifacts/${appId}/public/data`;
        const studentsCol = getCollectionName('students');

        if (editingStudentId) {
          // THAO TÁC CẬP NHẬT THÔNG TIN HỌC VIÊN ĐÃ CÓ
          try {
            const studentRef = fb.doc(db, basePath, studentsCol, editingStudentId);
            
            // Tìm kiếm tài khoản anh/chị/em khác loại trừ chính học sinh này để đồng nhất password dùng chung
            const existingSibling = students.find(s => s.id !== editingStudentId && (
              (phoneInput && s.parentPhone && s.parentPhone === phoneInput) ||
              (emailInput && s.parentEmail && s.parentEmail.toLowerCase() === emailInput)
            ));

            // Cập nhật: Thay đổi SĐT thì mật khẩu cũng phải thay đổi tương ứng thống nhất
            const finalPassword = existingSibling && existingSibling.parentPassword
              ? existingSibling.parentPassword
              : createParentPasswordByLogic(phoneInput || '1234', editingStudentId);

            await fb.setDoc(studentRef, {
              name: newStudentName.trim(),
              avatar: newStudentAvatar,
              parentPhone: phoneInput,
              parentEmail: emailInput,
              parentPassword: finalPassword
            }, { merge: true });

            showToast(`Đã lưu thay đổi thông tin học viên ${newStudentName.trim()} thành công!`);
            handleCancelEditStudent();
          } catch (error) {
            showToast('Lỗi khi cập nhật thông tin học viên!', 'error');
            console.error(error);
          }
        } else {
          // THAO TÁC THÊM MỚI HỌC VIÊN (MẶC ĐỊNH LÀ SQUAD 0 - CHỜ PHÂN CHIA SAU)
          const newId = `CS${Math.floor(100 + Math.random() * 900)}`;

          // LOGIC CẬP NHẬT: Tìm kiếm anh/chị/em chỉ dựa trên trường thông tin có dữ liệu
          const existingSibling = students.find(s => {
            const matchPhone = phoneInput && s.parentPhone && s.parentPhone === phoneInput;
            const matchEmail = emailInput && s.parentEmail && s.parentEmail.toLowerCase() === emailInput;
            return matchPhone || matchEmail;
          });

          // Nếu có học sinh anh/chị em, dùng lại mật khẩu của người đó. Nếu không thì tạo mới.
          const finalPassword = existingSibling && existingSibling.parentPassword
            ? existingSibling.parentPassword
            : createParentPasswordByLogic(phoneInput || '1234', newId);

          const newStudentObj = {
            id: newId,
            name: newStudentName.trim(),
            squad: 0, // MẶC ĐỊNH LÀ 0 - CHỜ PHÂN CHIA SAU
            avatar: newStudentAvatar,
            parentPhone: phoneInput, 
            parentEmail: emailInput,   
            parentPassword: finalPassword
          };

          try {
            const studentRef = fb.doc(db, basePath, studentsCol, newId);
            await fb.setDoc(studentRef, newStudentObj);

            if (existingSibling) {
              showToast(`Đã lưu ${newStudentObj.name} và tự động DÙNG CHUNG mật khẩu với chiến sĩ nhí ${existingSibling.name}!`);
            } else {
              showToast(`Đã thêm học sinh ${newStudentObj.name} (Mật khẩu: ${finalPassword}) - Trạng thái: Chờ phân tiểu đội!`);
            }

            setNewStudentName('');
            setNewStudentPhone('');
            setNewStudentEmail('');
            setNewStudentAvatar('nam.png');
          } catch (error) {
            showToast('Lỗi khi lưu học viên!', 'error');
            console.error(error);
          }
        }
      };

      const handleDeleteStudent = (id) => {
        const student = students.find(s => s.id === id);
        setConfirmModal({
          isOpen: true,
          type: 'student',
          id: id,
          message: `Bạn có chắc chắn muốn xóa vĩnh viễn chiến sĩ nhí ${student ? student.name : ''} (Mã: ${id}) khỏi hệ thống? Mọi nhật ký rèn luyện liên quan cũng sẽ bị xóa.`
        });
      };

      const executeDeleteStudent = async (id) => {
        if (!activeCourse) return;
        try {
          const basePath = `artifacts/${appId}/public/data`;
          const studentsCol = getCollectionName('students');
          const reportsCol = getCollectionName('reports');

          await fb.deleteDoc(fb.doc(db, basePath, studentsCol, id));
          
          const relatedReports = reports.filter(r => r.studentId === id);
          relatedReports.forEach(async (r) => {
            await fb.deleteDoc(fb.doc(db, basePath, reportsCol, r.id));
          });

          showToast('Đã xóa vĩnh viễn học viên và nhật ký liên quan.');
          if (editingStudentId === id) {
            handleCancelEditStudent();
          }
        } catch (error) {
          showToast('Lỗi khi thực hiện xóa học viên!', 'error');
        }
      };

      const executeDeleteReport = async (id) => {
        if (!activeCourse) return;
        try {
          const basePath = `artifacts/${appId}/public/data`;
          const reportsCol = getCollectionName('reports');

          await fb.deleteDoc(fb.doc(db, basePath, reportsCol, id));

          if (editingReportId === id) {
            setEditingReportId(null);
            setNewActivity('');
            setNewComment('');
            setSelectedStudent(null);
          }
          showToast('Đã xóa vĩnh viễn dữ liệu báo cáo.');
        } catch (error) {
          showToast('Lỗi khi thực hiện xóa nhật ký!', 'error');
        }
      };

      const handleStartEditReport = (report) => {
        let student = null;
        if (report.studentId === 'GLOBAL_COMMON') {
          student = { id: 'GLOBAL_COMMON', name: 'Nhận xét Chung Tất Cả Tiểu Đội', squad: 'ALL' };
        } else if (report.studentId === 'COMMON') {
          student = { id: 'COMMON', name: `Nhận xét Chung Toàn Tiểu Đội ${report.squad}`, squad: report.squad };
        } else {
          student = students.find(s => s.id === report.studentId) || { id: report.studentId, name: `Chiến sĩ (${report.studentId})`, squad: report.squad };
        }
        
        setSelectedStudent(student);
        setEditingReportId(report.id);
        setNewReportDate(report.date);
        setNewActivity(report.activity);
        setNewComment(report.comment);
        setNewBehaviorRating(report.behaviorRating || 'Tốt');
        setNewPhysicalRating(report.physicalRating || 'Tốt');
        setNewImage(report.image);
        setCustomImageFile(null);
        
        // Auto-scroll mượt mà trên Mobile & PC
        if (role !== 'general') {
            setTimeout(() => document.getElementById('report-form')?.scrollIntoView({ behavior: 'smooth' }), 100);
        }
        showToast(`Đã nạp dữ liệu sửa chữa cho: ${student ? student.name : ''}`);
      };

      const handleLogout = () => {
        setRole(null);
        setCurrentView('landing');
        setParentInput('');
        setParentPasswordInput('');
        setSquadPasswordInput('');
        setLoggedInParentStudents([]);
        setSelectedChild(null);
        setLoggedInSquad(null);
        setSelectedStudent(null);
        setEditingReportId(null);
        setNewActivity('');
        setNewComment('');
        setViewingStudent(null);
        setIsSettingsUnlocked(false);
        setMasterPassInput('');
        handleCancelEditStudent();
        showToast('Đã đăng xuất tài khoản an toàn.');
      };

      if (isInitializingData) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100">
             <div className="text-center space-y-4">
                <div className="w-14 h-14 border-4 border-green-700 border-t-transparent rounded-full animate-spin mx-auto"></div>
                <p className="text-green-800 font-extrabold tracking-wider animate-pulse text-sm">ĐANG KẾT NỐI MÁY CHỦ CLOUD FIRESTORE...</p>
             </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col justify-between">
          
          {/* TOAST THÔNG BÁO NỔI CHẠY KHẮP ỨNG DỤNG */}
          {toast && (
            <div className={`fixed top-4 right-4 z-50 p-4 rounded-2xl shadow-xl text-xs font-bold animate-fadeIn transition-all flex items-center gap-2.5 ${
              toast.type === 'error' ? 'bg-red-600 text-white shadow-red-200' : 'bg-slate-900 text-yellow-300 shadow-slate-300'
            }`}>
              <span className="text-lg">📢</span>
              <span>{toast.message}</span>
            </div>
          )}

          {/* ===================== THANH ĐẦU TRANG CẢNH SÁT NHÂN DÂN NGUYÊN BẢN ===================== */}
          <header className="bg-custom-primary-dark text-white border-b-4 border-custom-accent sticky top-0 z-40 shadow-md">
            <div className="max-w-7xl mx-auto px-4 py-3 md:py-4 flex flex-wrap justify-between items-center gap-3">
              
              <div className="flex items-center gap-2.5">
                <Shield />
                <div>
                  <h1 className="font-extrabold text-xs md:text-base tracking-wider uppercase leading-tight">
                    Sổ Liên Lạc Điện Tử "Học Làm Chiến Sĩ Công An"
                  </h1>
                  <span className="text-[8px] md:text-[10px] font-semibold tracking-widest text-custom-accent block uppercase mt-0.5">
                    {activeCourse ? activeCourse.name : 'Trường Đại Học Cảnh sát nhân dân'}
                  </span>
                </div>
              </div>

              {/* Tác vụ tài khoản */}
              <div className="flex items-center gap-2">
                {activeCourse && (
                   <button 
                      onClick={handleSwitchCourse}
                      className="bg-yellow-500/20 hover:bg-yellow-500/40 text-yellow-300 border border-yellow-500/50 px-2.5 py-1.5 rounded-lg text-[10px] md:text-xs font-bold transition-colors shadow-sm active-scale mr-1"
                    >
                      🔄 Đổi Khóa
                   </button>
                )}
                {role && (
                  <div className="flex items-center gap-2 bg-black/40 px-2.5 py-1.5 md:px-3 md:py-2 rounded-xl border border-green-800 text-[10px] md:text-xs shadow-sm">
                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse hidden sm:inline-block"></span>
                    <span className="font-medium text-slate-100">
                      Vai trò: <strong className="text-custom-accent">{role === 'parent' ? 'Phụ Huynh' : role === 'general' ? 'BCH Tổng ⭐️' : `Tiểu Đội ${loggedInSquad}`}</strong>
                    </span>
                    <button 
                      onClick={handleLogout}
                      className="ml-1 hover:bg-red-700 text-white transition-all bg-red-600/30 hover:scale-105 px-2 py-1 rounded-lg flex items-center gap-1 border border-red-500/20 active-scale"
                    >
                      <LogOut />
                      <span className="hidden xs:inline">Thoát</span>
                    </button>
                  </div>
                )}
                {!role && !activeCourse && (
                  <span className="text-[8px] md:text-[10px] font-black uppercase tracking-wider bg-black/25 text-emerald-300 px-2.5 py-1.5 rounded-lg border border-green-800 hidden sm:block">
                    Học Kỹ Năng Sống • Rèn Bản Lĩnh
                  </span>
                )}
              </div>

            </div>
          </header>

          <main className="max-w-7xl mx-auto px-2 sm:px-4 py-4 md:py-8 flex-1 w-full">
            
            {/* ===================== 0. TRANG CHỌN KHÓA HỌC (MULTI-COURSE) ===================== */}
            {currentView === 'select_course' && (
               <div className="space-y-6 md:space-y-8 animate-fadeIn max-w-4xl mx-auto">
                 <div className="text-center space-y-2">
                    <h2 className="text-2xl md:text-3xl font-black text-custom-primary-dark">LỰA CHỌN KHÓA HUẤN LUYỆN</h2>
                    <p className="text-slate-500 text-xs md:text-sm font-medium">Hệ thống lưu trữ độc lập theo từng khóa. Vui lòng chọn đúng khóa học của con em bạn.</p>
                 </div>

                 <div className="grid sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-5">
                    {courses.map(course => (
                       <button
                          key={course.id}
                          onClick={() => {
                             setActiveCourse(course);
                             setCurrentView('landing');
                          }}
                          className="bg-white rounded-2xl p-5 border-2 border-slate-200 hover:border-custom-primary shadow-sm hover:shadow-lg transition-all duration-300 text-left group active-scale flex flex-col justify-between min-h-[140px]"
                       >
                          <div>
                            <div className="w-12 h-12 bg-emerald-50 text-custom-primary rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform border border-emerald-100">
                               <Shield />
                            </div>
                            <h3 className="font-extrabold text-slate-800 text-base group-hover:text-custom-primary">{course.name}</h3>
                          </div>
                          <div className="flex items-center justify-between mt-4 border-t border-slate-100 pt-3">
                             <span className="text-[10px] text-slate-400 font-medium">Nhấn để truy cập</span>
                             <ChevronRight className="w-4 h-4 text-slate-300 group-hover:text-custom-primary group-hover:translate-x-1 transition-transform" />
                          </div>
                       </button>
                    ))}
                 </div>
               </div>
            )}

            {/* ===================== 1. TRANG CHỦ ĐĂNG NHẬP RESPONSIVE CAO CẤP ===================== */}
            {}
            {currentView === 'landing' && activeCourse && (
              <div className="space-y-6 md:space-y-8 animate-fadeIn">
                
                {/* Banner oai nghiêm */}
                <div className="relative overflow-hidden bg-gradient-to-br from-green-950 via-green-900 to-green-800 text-white rounded-2xl md:rounded-3xl p-5 md:p-8 shadow-xl border border-green-700/80">
                  <div className="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 bg-yellow-400/5 rounded-full blur-3xl pointer-events-none"></div>
                  <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 bg-green-400/10 rounded-full blur-3xl pointer-events-none"></div>
                  
                  <div className="relative z-10 max-w-2xl space-y-3.5">
                    <span className="inline-flex bg-custom-accent text-green-950 font-black text-[9px] tracking-widest px-2.5 py-1.5 rounded-full uppercase shadow-md items-center gap-1">
                      <span className="w-1.5 h-1.5 bg-green-950 rounded-full animate-ping"></span> 
                      Sổ Liên Lạc: {activeCourse.name}
                    </span>
                    <h2 className="text-2xl md:text-4xl font-extrabold tracking-tight leading-tight text-custom-accent">
                      Rèn Đức Luyện Tài - Sẵn Sàng Học Tập!
                    </h2>
                    <p className="text-xs md:text-sm text-emerald-100/90 leading-relaxed font-medium">
                      Chào mừng quý phụ huynh và các đồng chí. Đây là hệ thống sổ liên lạc điện tử của chương trình trải nghiệm "Học Làm Chiến Sĩ Công An" tại Trường Đại học Cảnh sát nhân dân.
                    </p>
                  </div>
                </div>

                {/* THIẾT KẾ TAB ĐĂNG NHẬP TRÊN MOBILE & GRID TRÊN DESKTOP */}
                <div className="space-y-4">
                  {/* Thanh chuyển Tab trên Mobile */}
                  <div className="flex md:hidden bg-slate-200/80 p-1 rounded-xl border border-slate-300/50">
                    <button
                      type="button"
                      onClick={() => setLoginTab('parent')}
                      className={`flex-1 py-3 text-xs font-black rounded-lg transition-all flex items-center justify-center gap-1.5 ${
                        loginTab === 'parent' ? 'bg-custom-primary text-white shadow-md' : 'text-slate-600'
                      }`}
                    >
                      <Users />
                      <span>Phụ Huynh</span>
                    </button>
                    <button
                      type="button"
                      onClick={() => setLoginTab('commander')}
                      className={`flex-1 py-3 text-xs font-black rounded-lg transition-all flex items-center justify-center gap-1.5 ${
                        loginTab === 'commander' ? 'bg-custom-secondary text-white shadow-md' : 'text-slate-600'
                      }`}
                    >
                      <Lock />
                      <span>Ban Chỉ Huy</span>
                    </button>
                  </div>

                  {/* VÙNG ĐĂNG NHẬP */}
                  <div className="grid md:grid-cols-2 gap-4 lg:gap-6">
                    
                    {/* CỔNG PHỤ HUYNH */}
                    <div className={`bg-white rounded-2xl md:rounded-3xl p-5 md:p-6 shadow-md border-t-8 border-custom-primary flex flex-col justify-between hover:shadow-lg transition-shadow duration-300 ${
                      loginTab === 'parent' ? 'block' : 'hidden md:flex'
                    }`}>
                      <div className="space-y-4">
                        <div className="flex items-center gap-3">
                          <div className="bg-emerald-50 text-custom-primary p-3 rounded-xl border border-emerald-100 shadow-inner">
                            <Users />
                          </div>
                          <div>
                            <h3 className="text-base md:text-lg font-extrabold text-slate-800">Cổng Phụ Huynh Học Viên</h3>
                            <p className="text-[11px] md:text-xs text-slate-400 font-medium">Theo dõi rèn luyện, nền nếp và tác phong sinh hoạt hằng ngày.</p>
                          </div>
                        </div>
                        <hr className="border-slate-100" />
                        
                        <form onSubmit={handleParentLogin} className="space-y-3.5">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-600 uppercase tracking-wider mb-1">Số điện thoại hoặc Email</label>
                            <div className="relative">
                              <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <User />
                              </span>
                              <input
                                type="text"
                                value={parentInput}
                                onChange={(e) => setParentInput(e.target.value)}
                                placeholder="Nhập SĐT hoặc Email"
                                className="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600 focus:bg-white text-xs font-semibold text-slate-800 transition-all"
                              />
                            </div>
                          </div>

                          <div>
                            <label className="block text-[10px] font-bold text-slate-600 uppercase tracking-wider mb-1">Mật khẩu phụ huynh</label>
                            <div className="relative">
                              <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <Lock />
                              </span>
                              <input
                                type="password"
                                value={parentPasswordInput}
                                onChange={(e) => setParentPasswordInput(e.target.value)}
                                placeholder="Mật Khẩu"
