  <style>
    /* =========================================================================
       HƯỚNG DẪN DESIGN LẠI MÀU SẮC (THEME COLOR DESIGN)
       Bạn chỉ cần thay đổi các mã màu HEX (#...) dưới đây để đổi toàn bộ website:
       ========================================================================= */
    :root {
      --primary: #1b5e20;          /* Xanh lá cây Cảnh sát nhân dân chủ đạo */
      --primary-dark: #124116;     /* Xanh lá đậm (Header, Trạng thái oai nghiêm) */
      --primary-light: #2e7d32;    /* Xanh lá tươi (Nút lưu, trạng thái Tốt) */
      --accent: #ffeb3b;           /* Màu vàng viền quân hàm đặc trưng */
      --accent-hover: #fbc02d;     /* Màu vàng đậm hơn khi di chuột qua */
      --secondary: #e65100;        /* Màu cam phụ (Dành cho Chỉ huy / Tác chiến dã ngoại) */
      --secondary-hover: #f57c00;  /* Màu cam tươi hơn khi di chuột qua */
      --bg-body: #f8fafc;          /* Màu nền chính của toàn bộ trang web (Xám nhạt dịu mắt) */
      --card-bg: #ffffff;          /* Màu nền của các khung, thẻ thông tin (Trắng tinh khiết) */
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-body);
    }

    /* ĐỊNH NGHĨA CÁC CLASS TIỆN ÍCH DỰA TRÊN BẢNG MÀU TỰ DESIGN */
    .bg-custom-primary { background-color: var(--primary); }
    .bg-custom-primary-dark { background-color: var(--primary-dark); }
    .bg-custom-primary-light { background-color: var(--primary-light); }
    .bg-custom-accent { background-color: var(--accent); }
    .bg-custom-accent-hover:hover { background-color: var(--accent-hover); }
    .bg-custom-secondary { background-color: var(--secondary); }
    .bg-custom-secondary-hover:hover { background-color: var(--secondary-hover); }
    .text-custom-primary { color: var(--primary); }
    .text-custom-primary-dark { color: var(--primary-dark); }
    .text-custom-accent { color: var(--accent); }
    .border-custom-primary { border-color: var(--primary); }
    .border-custom-accent { border-color: var(--accent); }

    /* Hiệu ứng chuyển động mượt mà */
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
    .animate-scaleIn {
      animation: scaleIn 0.2s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    /* Thiết kế thanh cuộn cao cấp */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
  </style>
</head>

        comment: 'Chiến sĩ Bách hăng hái phát biểu trong giờ học chuyên đề phòng chống ma túy. Tinh thần đồng đội rất cao.',

    function App() {
      // ĐỒNG BỘ DỮ LIỆU VỚI LOCAL STORAGE ĐỂ TRÁNH MẤT MÁT DỮ LIỆU
      const [students, setStudents] = useState(() => {
        const local = localStorage.getItem('ca_students');
        return local ? JSON.parse(local) : DEFAULT_STUDENTS;
      });

      const [reports, setReports] = useState(() => {
        const local = localStorage.getItem('ca_reports');
        return local ? JSON.parse(local) : DEFAULT_REPORTS;
      });

      // QUẢN LÝ SỐ LƯỢNG TIỂU ĐỘI (MẶC ĐỊNH LÀ 5)
      const [squadCount, setSquadCount] = useState(() => {
        const local = localStorage.getItem('ca_squad_count');
        return local ? parseInt(local) : 5;
      });

      useEffect(() => {
        localStorage.setItem('ca_students', JSON.stringify(students));
      }, [students]);

      useEffect(() => {
        localStorage.setItem('ca_reports', JSON.stringify(reports));
      }, [reports]);

      useEffect(() => {
        localStorage.setItem('ca_squad_count', squadCount.toString());
      }, [squadCount]);

      // Trạng thái điều hướng giao diện chính
      const [role, setRole] = useState(null); 
      const [currentView, setCurrentView] = useState('landing'); 
      const [toast, setToast] = useState(null);

      // Quản lý việc Chỉnh sửa & Xóa nhật ký hoạt động rèn luyện
      const [editingReportId, setEditingReportId] = useState(null);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, type: '', id: '', message: '' });

      // Trạng thái Zoom phóng to và tải tệp ảnh
      const [zoomedImage, setZoomedImage] = useState(null);

      // Đăng nhập Phụ Huynh
      const [parentInput, setParentInput] = useState('');
      const [loggedInParentStudents, setLoggedInParentStudents] = useState([]);
      const [selectedChild, setSelectedChild] = useState(null);

      // Đăng nhập Ban Chỉ Huy
      const [squadCode, setSquadCode] = useState('');
      const [loggedInSquad, setLoggedInSquad] = useState(null);

      // Biểu mẫu viết nhận xét, đánh giá rèn luyện
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [newReportDate, setNewReportDate] = useState(new Date().toISOString().split('T')[0]);
      const [newActivity, setNewActivity] = useState('');
      const [newBehaviorRating, setNewBehaviorRating] = useState('Tốt');
      const [newPhysicalRating, setNewPhysicalRating] = useState('Tốt');
      const [newComment, setNewComment] = useState('');
      const [newImage, setNewImage] = useState('');
      const [customImageFile, setCustomImageFile] = useState(null);

      // Biểu mẫu BCH Tổng thêm học viên mới
      const [newStudentName, setNewStudentName] = useState('');
      const [newStudentPhone, setNewStudentPhone] = useState('');
      const [newStudentEmail, setNewStudentEmail] = useState('');
      const [newStudentSquad, setNewStudentSquad] = useState(1);
      const [newStudentAvatar, setNewStudentAvatar] = useState('👶');

      // Tự động tạo mã cho các tiểu đội tùy theo số lượng cấu hình hiện có
      const getSquadCodes = () => {
        const codes = {};
        for (let i = 1; i <= squadCount; i++) {
          codes[i] = `TD${String(i).padStart(2, '0')}`;
        }
        return codes;
      };

      const squadCodes = getSquadCodes();

      // Hiện hộp thoại thông báo nổi nhanh (Toast)
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3500);
      };

      // XỬ LÝ ĐĂNG NHẬP PHỤ HUYNH
      const handleParentLogin = (e) => {
        e.preventDefault();
        const input = parentInput.trim();
        if (!input) {
          showToast('Vui lòng điền Số điện thoại hoặc Email để tiếp tục!', 'error');
          return;
        }

        const foundChildren = students.filter(
          s => s.parentPhone === input || s.parentEmail.toLowerCase() === input.toLowerCase()
        );

        if (foundChildren.length > 0) {
          setLoggedInParentStudents(foundChildren);
          setSelectedChild(foundChildren[0]);
          setRole('parent');
          setCurrentView('parent_dashboard');
          showToast(`Chào mừng phụ huynh! Đã liên kết thành công ${foundChildren.length} con em.`);
        } else {
          showToast('Không tìm thấy thông tin học viên khớp với SĐT hoặc Email của bạn!', 'error');
        }
      };

      // XỬ LÝ ĐĂNG NHẬP BAN CHỈ HUY (TIỂU ĐỘI HOẶC TỔNG)
      const handleCommanderLogin = (e) => {
        e.preventDefault();
        const code = squadCode.trim().toUpperCase();
        if (!code) {
          showToast('Vui lòng điền mật mã tác chiến tiểu đội!', 'error');
          return;
        }

        // Quyền tối cao: Trưởng Ban Chỉ Huy Tổng
        if (code === APP_CONFIG.generalCode) {
          setRole('general');
          setLoggedInSquad(null);
          setCurrentView('general_dashboard');
          showToast('Đăng nhập thành công! Quyền hạn: BAN CHỈ HUY TỔNG.');
          return;
        }

        // Quyền hạn: Chỉ Huy Tiểu Đội dã chiến
        const squadNum = Object.keys(squadCodes).find(key => squadCodes[key] === code);
        if (squadNum) {
          setLoggedInSquad(parseInt(squadNum));
          setRole('commander');
          setCurrentView('commander_dashboard');
          showToast(`Đăng nhập thành công! Quyền hạn: CHỈ HUY TIỂU ĐỘI ${squadNum}`);
        } else {
          showToast('Mật mã không đúng hoặc Tiểu đội này chưa được kích hoạt!', 'error');
        }
      };

      // HÀM ĐỌC ẢNH TẢI LÊN TỪ ĐIỆN THOẠI/MÁY TÍNH
      const handleFileChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          setCustomImageFile(e.target.files[0]);
          showToast('Đã ghi nhận ảnh tải lên từ thiết bị của bạn thành công!');
        }
      };

      // THÊM HOẶC CẬP NHẬT NHẬN XẾT MỚI VÀO SỔ NHẬT KÝ
      const handleAddNewReport = (e) => {
        e.preventDefault();
        if (!selectedStudent) {
          showToast('Vui lòng chọn một chiến sĩ nhí để ghi nhật ký!', 'error');
          return;
        }
        if (!newActivity.trim()) {
          showToast('Vui lòng điền Tên hoạt động ngày hôm nay!', 'error');
          return;
        }
        if (!newComment.trim()) {
          showToast('Nội dung nhận xét chi tiết không được bỏ trống!', 'error');
          return;
        }

        let finalImageUrl = newImage || APP_CONFIG.defaultImages.squad1;
        if (customImageFile) {
          finalImageUrl = URL.createObjectURL(customImageFile);
        }

        const currentSquadOfStudent = selectedStudent.squad;

        if (role === 'commander' && currentSquadOfStudent !== loggedInSquad) {
          showToast('Bạn không có thẩm quyền nhận xét học viên tiểu đội khác!', 'error');
          return;
        }

        if (editingReportId) {
          const updatedReports = reports.map(r => {
            if (r.id === editingReportId) {
              return {
                ...r,
                date: newReportDate,
                activity: newActivity,
                behaviorRating: newBehaviorRating,
                physicalRating: newPhysicalRating,
                comment: newComment,
                image: finalImageUrl
              };
            }
            return r;
          });
          setReports(updatedReports);
          showToast(`Đã cập nhật thành công nhật ký hoạt động của bé: ${selectedStudent.name}`);
          setEditingReportId(null);
        } else {
          const newReport = {
            id: `r-${Date.now()}`,
            studentId: selectedStudent.id,
            date: newReportDate,
            activity: newActivity,
            squad: currentSquadOfStudent,
            behaviorRating: newBehaviorRating,
            physicalRating: newPhysicalRating,
            comment: newComment,
            image: finalImageUrl
          };

          setReports([newReport, ...reports]);
          showToast(`Đã thêm nhận xét mới vào lịch sử của bé: ${selectedStudent.name}`);
        }

        setNewActivity('');
        setNewComment('');
        setNewImage('');
        setCustomImageFile(null);
        setSelectedStudent(null);
      };

      // BCH TỔNG THÊM MỚI HỌC VIÊN & CHỈ ĐỊNH TIỂU ĐỘI TÁC CHIẾN
      const handleAddStudentByGeneral = (e) => {
        e.preventDefault();
        if (!newStudentName.trim() || !newStudentPhone.trim() || !newStudentEmail.trim()) {
          showToast('Vui lòng điền đầy đủ các trường thông tin học viên nhí!', 'error');
          return;
        }

        const newId = `CS-${Math.floor(100 + Math.random() * 900)}`;
        const newStudentObj = {
          id: newId,
          name: newStudentName.trim(),
          squad: parseInt(newStudentSquad),
          avatar: newStudentAvatar,
          parentPhone: newStudentPhone.trim(),
          parentEmail: newStudentEmail.trim().toLowerCase()
        };

        setStudents([...students, newStudentObj]);
        showToast(`Đã thêm thành công Chiến sĩ nhí ${newStudentObj.name} vào Tiểu đội ${newStudentObj.squad}!`);

        setNewStudentName('');
        setNewStudentPhone('');
        setNewStudentEmail('');
        setNewStudentAvatar('👶');
      };

      // XÓA HỌC VIÊN
      const handleDeleteStudent = (id) => {
        const student = students.find(s => s.id === id);
        setConfirmModal({
          isOpen: true,
          type: 'student',
          id: id,
          message: `Bạn có chắc chắn muốn xóa vĩnh viễn chiến sĩ nhí ${student ? student.name : ''} (Mã: ${id}) khỏi hệ thống? Mọi nhật ký rèn luyện và lịch sử liên quan cũng sẽ bị xóa bỏ hoàn toàn.`
        });
      };

      const executeDeleteStudent = (id) => {
        setStudents(students.filter(s => s.id !== id));
        setReports(reports.filter(r => r.studentId !== id));
        showToast('Đã xóa dữ liệu chiến sĩ thành công.');
      };

      const executeDeleteReport = (id) => {
        setReports(reports.filter(r => r.id !== id));
        if (editingReportId === id) {
          setEditingReportId(null);
          setNewActivity('');
          setNewComment('');
          setSelectedStudent(null);
        }
        showToast('Đã xóa nhật ký rèn luyện thành công khỏi lịch sử.');
      };

      // SỬA NHẬT KÝ
      const handleStartEditReport = (report) => {
        const student = students.find(s => s.id === report.studentId);
        setSelectedStudent(student);
        setEditingReportId(report.id);
        setNewReportDate(report.date);
        setNewActivity(report.activity);
        setNewComment(report.comment);
        setNewBehaviorRating(report.behaviorRating);
        setNewPhysicalRating(report.physicalRating);
        setNewImage(report.image);
        setCustomImageFile(null);
        
        window.scrollTo({ top: 250, behavior: 'smooth' });
        showToast(`Đã nạp dữ liệu chỉnh sửa của chiến sĩ ${student ? student.name : ''}`);
      };

      // ĐĂNG XUẤT
      const handleLogout = () => {
        setRole(null);
        setCurrentView('landing');
        setParentInput('');
        setSquadCode('');
        setLoggedInParentStudents([]);
        setSelectedChild(null);
        setLoggedInSquad(null);
        setSelectedStudent(null);
        setEditingReportId(null);
        setNewActivity('');
        setNewComment('');
        showToast('Đã đăng xuất tài khoản an toàn.');
      };

      return (
        <div className="min-h-screen flex flex-col justify-between">
          
          {/* TOAST THÔNG BÁO NỔI CHẠY KHẮP ỨNG DỤNG */}
          {toast && (
            <div className={`fixed top-5 right-5 z-50 p-4 rounded-xl shadow-2xl text-xs font-bold animate-fadeIn transition-all flex items-center gap-2 ${
              toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-yellow-300'
            }`}>
              <Shield />
              <span>{toast.message}</span>
            </div>
          )}

          {/* ===================== THANH ĐẦU TRANG CẢNH SÁT NHÂN DÂN ===================== */}
          <header className="bg-custom-primary-dark text-white border-b-4 border-custom-accent sticky top-0 z-40 shadow-lg">
            <div className="max-w-7xl mx-auto px-4 py-3.5 flex flex-wrap justify-between items-center gap-4">
              
              <div className="flex items-center gap-3">
                <div className="bg-custom-accent p-2 rounded-full text-custom-primary-dark shadow-inner">
                  <Shield />
                </div>
                <div>
                  <h1 className="font-black text-sm md:text-lg tracking-wider uppercase flex items-center gap-1.5">
                    Sổ Liên Lạc Công An Nhí
                  </h1>
                  <span className="text-[9px] font-black tracking-widest text-custom-accent block uppercase">
                    Cổng Tra Cứu Hoạt Động Rèn Luyện Trực Tuyến
                  </span>
                </div>
              </div>

              {/* Tác vụ tài khoản */}
              <div className="flex items-center gap-3">
                {role && (
                  <div className="flex items-center gap-2 bg-black/35 px-3.5 py-2 rounded-xl border border-green-700 text-xs shadow-sm">
                    <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span className="font-semibold text-slate-100 text-[11px]">
                      Vai trò: <strong className="text-custom-accent">{role === 'parent' ? 'Phụ Huynh' : role === 'general' ? 'BCH Tổng ⭐️' : `BCH Tiểu Đội ${loggedInSquad}`}</strong>
                    </span>
                    <button 
                      onClick={handleLogout}
                      className="ml-2 hover:bg-red-700 text-white transition-all bg-red-600/30 hover:scale-105 px-2.5 py-1 rounded-lg flex items-center gap-1 border border-red-500/20 text-[10px]"
                    >
                      <LogOut />
                      <span>Thoát</span>
                    </button>
                  </div>
                )}
                {!role && (
                  <span className="text-[10px] font-black uppercase tracking-wider bg-black/20 text-emerald-300 px-3 py-1.5 rounded-lg border border-green-800">
                    Độc Lập • Tự Do • Hạnh Phúc
                  </span>
                )}
              </div>

            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6 md:py-8 flex-1 w-full">
            
            {/* ===================== 1. TRANG CHỦ ĐĂNG NHẬP (LANDING VIEW) ===================== */}
            {currentView === 'landing' && (
              <div className="space-y-8 animate-fadeIn">
                
                {/* Banner oai nghiêm */}
                <div className="relative overflow-hidden bg-gradient-to-br from-green-950 via-green-900 to-green-800 text-white rounded-3xl p-6 md:p-10 shadow-xl border border-green-700">
                  <div className="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 bg-yellow-400/10 rounded-full blur-3xl pointer-events-none"></div>
                  <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 bg-green-400/20 rounded-full blur-3xl pointer-events-none"></div>
                  
                  <div className="relative z-10 max-w-2xl space-y-4">
                    <span className="inline-block bg-custom-accent text-green-950 font-black text-[10px] tracking-widest px-3 py-1.5 rounded-full uppercase shadow-md">
                      Chương Trình Công An Nhí - Khóa Hè 2026
                    </span>
                    <h2 className="text-3xl md:text-4xl font-extrabold tracking-tight leading-none text-custom-accent">
                      Rèn Đức Luyện Tài - Sẵn Sàng Bảo Vệ Tổ Quốc!
                    </h2>
                    <p className="text-xs md:text-sm text-emerald-100 leading-relaxed font-medium">
                      Chào mừng quý phụ huynh và các đồng chí. Sổ liên lạc giúp cập nhật tiến độ huấn luyện, nếp ăn nếp ở, rèn luyện kỹ năng của các chiến sĩ công an nhí hằng ngày nhanh chóng và minh bạch nhất.
                    </p>
                  </div>

                  <div className="mt-8 bg-black/35 backdrop-blur-md p-4 rounded-2xl border border-white/10 max-w-sm space-y-2">
                    <div className="text-xs text-custom-accent font-bold uppercase tracking-wider">Mẹo thử nghiệm nhanh hệ thống (Demo):</div>
                    <ul className="text-[11px] text-slate-200 font-medium space-y-1 font-mono">
                      <li>• SĐT phụ huynh (Quản lý 3 con): <strong className="text-white">0987654321</strong></li>
                      <li>• Email phụ huynh (Quản lý 3 con): <strong className="text-white">phuhuynh@gmail.com</strong></li>
                      <li>• Mật mã các Tiểu Đội: {Object.keys(squadCodes).map(num => <span key={num} className="mr-1"><strong className="text-white">{squadCodes[num]}</strong> ({num})</span>)}</li>
                      <li>• Mật mã Chỉ Huy Tổng: <strong className="text-white">BCHTONG</strong></li>
                    </ul>
                  </div>
                </div>

                {/* Phân chia cổng đăng nhập */}
                <div className="grid md:grid-cols-2 gap-6">
                  
                  {/* CỔNG PHỤ HUYNH */}
                  <div className="bg-white rounded-3xl p-6 shadow-md border-t-8 border-custom-primary flex flex-col justify-between hover:shadow-lg transition-shadow">
                    <div className="space-y-4">
                      <div className="flex items-center gap-3">
                        <div className="bg-emerald-50 text-custom-primary p-3.5 rounded-2xl border border-emerald-100 shadow-inner">
                          <Users />
                        </div>
                        <div>
                          <h3 className="text-lg font-black text-slate-800">Cổng Thông Tin Phụ Huynh</h3>
                          <p className="text-xs text-slate-400 font-medium">Theo dõi học bạ rèn luyện, đánh giá điểm số, tải ảnh hoạt động dã ngoại của con.</p>
                        </div>
                      </div>
                      <hr className="border-slate-100" />
                      
                      <form onSubmit={handleParentLogin} className="space-y-4">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">Số điện thoại hoặc Email</label>
                          <div className="relative">
                            <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                              <User />
                            </span>
                            <input
                              type="text"
                              value={parentInput}
                              onChange={(e) => setParentInput(e.target.value)}
                              placeholder="Nhập SĐT hoặc Email"
                              className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600 focus:bg-white text-xs font-semibold text-slate-800 transition-all"
                            />
                          </div>
                        </div>
                        <button
                          type="submit"
                          className="w-full bg-custom-primary hover:bg-custom-primary-light text-white font-extrabold py-3.5 px-4 rounded-xl shadow-md flex items-center justify-center gap-2 text-xs uppercase tracking-wider transition-all hover:scale-[1.02]"
                        >
                          <span>Mở Sổ Liên Lạc Điện Tử</span>
                          <ChevronRight />
                        </button>
                      </form>
                    </div>

                    <div className="mt-6 bg-emerald-50/50 p-3.5 rounded-xl border border-emerald-100 text-[10px] text-emerald-800 leading-relaxed font-semibold">
                      💡 Mẹo: Hệ thống tự động đồng bộ. Nếu phụ huynh đăng ký từ 2, 3 con trở lên học cùng một khóa học, chỉ cần đăng nhập bằng một SĐT/Email là quản lý được tất cả các con.
                    </div>
                  </div>

                  {/* CỔNG BAN CHỈ HUY */}
                  <div className="bg-white rounded-3xl p-6 shadow-md border-t-8 border-custom-accent flex flex-col justify-between hover:shadow-lg transition-shadow">
                    <div className="space-y-4">
                      <div className="flex items-center gap-3">
                        <div className="bg-yellow-50 text-yellow-600 p-3.5 rounded-2xl border border-yellow-100 shadow-inner">
                          <Lock />
                        </div>
                        <div>
                          <h3 className="text-lg font-black text-slate-800">Cổng Ban Chỉ Huy & Phụ Trách</h3>
                          <p className="text-xs text-slate-400 font-medium">Báo cáo tình hình rèn luyện dã ngoại, tải ảnh dã chiến và ghi nhận xét ngày.</p>
                        </div>
                      </div>
                      <hr className="border-slate-100" />
                      
                      <form onSubmit={handleCommanderLogin} className="space-y-4">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">Mã Bảo Mật Đăng Nhập</label>
                          <div className="relative">
                            <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                              <Lock />
                            </span>
                            <input
                              type="password"
                              value={squadCode}
                              onChange={(e) => setSquadCode(e.target.value)}
                              placeholder="Mã đăng nhập"
                              className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:bg-white text-xs font-semibold text-slate-800 tracking-widest font-mono transition-all"
                            />
                          </div>
                        </div>
                        <button
                          type="submit"
                          className="w-full bg-custom-secondary hover:bg-custom-secondary-hover text-white font-extrabold py-3.5 px-4 rounded-xl shadow-md flex items-center justify-center gap-2 text-xs uppercase tracking-wider transition-all hover:scale-[1.02]"
                        >
                          <span>Mở Phòng Điều Hành</span>
                          <ChevronRight />
                        </button>
                      </form>
                    </div>

                    <div className="mt-6 bg-yellow-50/50 p-3.5 rounded-xl border border-yellow-100 text-[10px] text-amber-800 leading-relaxed font-semibold">
                      🛡️ Chỉ huy tiểu đội sử dụng mã bảo mật riêng của mình để truy cập.
                    </div>
                  </div>

                </div>

              </div>
            )}

            {/* ===================== 2. GIAO DIỆN PHỤ HUYNH ĐA CON (PARENT VIEW) ===================== */}
            {currentView === 'parent_dashboard' && selectedChild && (
              <div className="space-y-6 animate-fadeIn">
                
                {/* Thanh quản lý nhiều con cùng lúc */}
                <div className="bg-white rounded-3xl p-6 shadow-md border-l-8 border-custom-primary space-y-4">
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                      <h2 className="text-xl font-black text-slate-800">Cổng Thông Tin Nhật Ký Rèn Luyện</h2>
                      <p className="text-xs text-slate-400 font-medium mt-1">
                        Hệ thống phát hiện tài khoản của bạn đang liên kết với <strong className="text-custom-primary font-black">{loggedInParentStudents.length} chiến sĩ nhí</strong> dưới đây. Hãy chọn bé để xem học bạ rèn luyện:
                      </p>
                    </div>
                    <div className="bg-slate-100 px-3.5 py-1.5 rounded-xl text-[10px] font-mono font-bold text-slate-500 border border-slate-200 flex items-center gap-1.5">
                      Liên kết: {parentInput}
                    </div>
                  </div>

                  {/* Chọn nhanh con em mượt mà */}
                  <div className="flex flex-wrap gap-2 pt-2">
                    {loggedInParentStudents.map((child) => {
                      const isSelected = selectedChild.id === child.id;
                      return (
                        <button
                          key={child.id}
                          onClick={() => setSelectedChild(child)}
                          className={`flex items-center gap-3 px-5 py-3 rounded-2xl border text-xs font-bold tracking-wide transition-all shadow-sm ${
                            isSelected 
                              ? 'bg-gradient-to-r from-green-800 to-green-700 text-white border-transparent scale-105 shadow-green-100' 
                              : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                          }`}
                        >
                          <span className="text-2xl bg-white/20 p-1.5 rounded-xl">{child.avatar}</span>
                          <div className="text-left">
                            <div className="font-extrabold">{child.name}</div>
                            <div className={`text-[9px] font-bold ${isSelected ? 'text-custom-accent' : 'text-slate-400'}`}>
                              Mã: {child.id} • Tiểu Đội {child.squad}
                            </div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Học bạ chi tiết của cháu được chọn */}
                <div className="grid lg:grid-cols-12 gap-6">
                  
                  {/* Cột trái: Thẻ ID dã chiến của bé */}
                  <div className="lg:col-span-4">
                    <div className="bg-gradient-to-b from-green-900 to-green-950 text-white rounded-3xl p-6 shadow-lg border-b-4 border-custom-accent relative overflow-hidden flex flex-col justify-between h-full min-h-[300px]">
                      <div className="absolute top-0 right-0 -mr-12 -mt-12 w-40 h-40 bg-white/5 rounded-full pointer-events-none"></div>
                      
                      <div className="space-y-6 relative z-10">
                        <div className="flex justify-between items-center">
                          <span className="bg-custom-accent text-green-950 text-[9px] font-black px-2.5 py-1 rounded-md uppercase tracking-wider shadow">
                            Chiến Sĩ Học Viên
                          </span>
                          <Shield />
                        </div>

                        <div className="flex items-center gap-4 py-2">
                          <span className="text-4xl bg-white/15 p-3 rounded-2xl border border-white/20 shadow-inner">{selectedChild.avatar}</span>
                          <div>
                            <h3 className="text-lg font-black tracking-tight">{selectedChild.name}</h3>
                            <p className="text-[10px] text-custom-accent font-mono font-bold uppercase mt-0.5">Quân số: {selectedChild.id}</p>
                          </div>
                        </div>

                        <hr className="border-green-800" />

                        <div className="space-y-3 text-xs font-semibold">
                          <div className="flex justify-between border-b border-white/5 pb-1.5">
                            <span className="text-green-200">Đơn vị quản lý:</span>
                            <span className="text-custom-accent font-extrabold">Tiểu Đội {selectedChild.squad}</span>
                          </div>
                          <div className="flex justify-between border-b border-white/5 pb-1.5">
                            <span className="text-green-200">Trạng thái rèn luyện:</span>
                            <span className="bg-green-800 text-emerald-300 text-[10px] px-2 py-0.5 rounded border border-green-700">Đang học hè</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-green-200">Kênh tiểu đội bảo mật:</span>
                            <span className="text-slate-300 font-mono">{squadCodes[selectedChild.squad] || `TD-${selectedChild.squad}`}</span>
                          </div>
                        </div>
                      </div>

                      <div className="mt-8 bg-black/20 p-4 rounded-2xl border border-white/5 text-[10px] text-emerald-200 italic font-medium leading-relaxed text-center">
                        "Vì danh dự, nghĩa vụ quốc gia. Quyết tâm học tập rèn luyện tốt, không ngại gian khó!"
                      </div>
                    </div>
                  </div>

                  {/* Cột phải: Dòng thời gian lịch sử hoạt động ngày */}
                  <div className="lg:col-span-8 space-y-4">
                    <h3 className="text-sm font-black text-slate-700 tracking-widest uppercase flex items-center gap-2">
                      <BookOpen />
                      <span>Nhật Ký Học Học Tập ({reports.filter(r => r.studentId === selectedChild.id).length} ngày huấn luyện)</span>
                    </h3>

                    {reports.filter(r => r.studentId === selectedChild.id).length === 0 ? (
                      <div className="bg-white rounded-3xl p-12 shadow text-center border border-slate-100 space-y-4">
                        <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-3xl mx-auto">📭</div>
                        <div>
                          <h4 className="font-extrabold text-slate-800">Chưa có nhận xét ngày nào!</h4>
                          <p className="text-xs text-slate-400 mt-1 max-w-sm mx-auto leading-relaxed">
                            Hiện ban chỉ huy chưa lưu nhận xét hoạt động ngày hôm nay cho chiến sĩ {selectedChild.name}. Phụ huynh vui lòng kiểm tra lại vào cuối ngày rèn luyện (trước 21h30).
                          </p>
                        </div>
                      </div>
                    ) : (
                      <div className="space-y-4">
                        {reports.filter(r => r.studentId === selectedChild.id).map((report) => (
                          <div key={report.id} className="bg-white rounded-3xl overflow-hidden shadow border border-slate-100 flex flex-col md:flex-row hover:shadow-md transition-shadow">
                            
                            {/* Khối hình ảnh hoạt động dã ngoại thực tế */}
                            {report.image && (
                              <div className="w-full md:w-56 h-48 md:h-auto relative bg-slate-100 flex-shrink-0 group overflow-hidden">
                                <img 
                                  src={report.image} 
                                  alt="Ảnh rèn luyện chiến sĩ" 
                                  className="w-full h-full object-cover cursor-zoom-in group-hover:scale-105 transition-all"
                                  onClick={() => setZoomedImage({
                                    url: report.image,
                                    title: `${selectedChild.name} - Hoạt động: ${report.activity} (${report.date})`
                                  })}
                                />
                                <div className="absolute bottom-3 left-3 bg-black/60 text-white text-[9px] font-bold px-2 py-1 rounded backdrop-blur-sm flex items-center gap-1 shadow">
                                  <Camera className="w-3 h-3 text-yellow-300" /> Nhấn để tải về / phóng to
                                </div>
                              </div>
                            )}

                            {/* Khối nhận xét đánh giá chi tiết */}
                            <div className="p-5 flex-1 flex flex-col justify-between space-y-4">
                              <div className="space-y-2">
                                <div className="flex flex-wrap justify-between items-start gap-2">
                                  <span className="bg-green-100 text-green-950 font-extrabold text-[10px] px-2.5 py-1 rounded-lg flex items-center gap-1.5 border border-green-200">
                                    <Calendar />
                                    <span>Ngày: {report.date}</span>
                                  </span>

                                  <div className="flex gap-1.5">
                                    <span className="bg-emerald-100 text-emerald-800 text-[9px] font-black px-2.5 py-0.5 rounded uppercase tracking-wide border border-emerald-200">
                                      Nền nếp: {report.behaviorRating}
                                    </span>
                                    <span className="bg-blue-100 text-blue-800 text-[9px] font-black px-2.5 py-0.5 rounded uppercase tracking-wide border border-blue-200">
                                      Thể lực: {report.physicalRating}
                                    </span>
                                  </div>
                                </div>

                                <div className="text-xs font-bold text-slate-800 flex items-center gap-1 pt-1.5">
                                  📌 Chuyên đề: <span className="text-custom-primary">{report.activity}</span>
                                </div>

                                <p className="text-xs text-slate-600 leading-relaxed font-semibold italic">
                                  " {report.comment} "
                                </p>
                              </div>

                              <div className="flex justify-between items-center pt-3 border-t border-slate-100 text-[10px] font-bold text-slate-400">
                                <span>Phụ trách ghi nhận: <strong className="text-custom-primary-dark">Tiểu Đội Trưởng {report.squad}</strong></span>
                                <span className="flex items-center gap-1 text-red-500 bg-red-50 px-2 py-0.5 rounded-full">
                                  <Heart />
                                  <span>Đồng hành</span>
                                </span>
                              </div>
                            </div>

                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                </div>

              </div>
            )}

            {/* ===================== 3. GIAO DIỆN CHỈ HUY TIỂU ĐỘI (COMMANDER VIEW) ===================== */}
            {currentView === 'commander_dashboard' && loggedInSquad && (
              <div className="space-y-6 animate-fadeIn">
                
                {/* Header dã chiến */}
                <div className="bg-white rounded-2xl p-6 shadow-md border-l-8 border-custom-accent flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <div>
                    <div className="flex items-center gap-2">
                      <span className="text-[10px] font-bold uppercase tracking-widest bg-custom-primary text-custom-accent px-2.5 py-1 rounded-md">
                        Chỉ Huy Tác Chiến Tiểu Đội
                      </span>
                      <span className="text-xs text-slate-400 font-mono font-bold">Mã bảo mật: {squadCodes[loggedInSquad]}</span>
                    </div>
                    <h2 className="text-2xl font-black text-slate-800 mt-1">
                      Bảng Điều Hành Tiểu Đội {loggedInSquad}
                    </h2>
                    <p className="text-xs text-slate-500 mt-1">
                      Bạn có đặc quyền xem danh sách, viết nhận xét dã chiến và tải ảnh sinh hoạt cho các học viên chính thức thuộc Tiểu Đội {loggedInSquad}.
                    </p>
                  </div>

                  <div className="bg-emerald-50 px-4 py-2.5 rounded-xl border border-emerald-100 text-xs">
                    Sĩ số tiểu đội: <strong className="text-emerald-800 text-sm">{students.filter(s => s.squad === loggedInSquad).length} chiến sĩ nhí</strong>
                  </div>
                </div>

                {/* Phân chia khu vực nhập liệu */}
                <div className="grid lg:grid-cols-12 gap-6">
                  
                  {/* Danh sách chiến sĩ thuộc tiểu đội quản lý */}
                  <div className="lg:col-span-5 space-y-4">
                    <div className="bg-white rounded-2xl shadow p-5 space-y-4">
                      <h3 className="text-xs font-black text-slate-700 tracking-wider uppercase flex justify-between items-center">
                        <span>Danh sách Tiểu Đội {loggedInSquad}</span>
                        <span className="text-[10px] text-slate-400 normal-case font-normal">(Bấm chọn bé để ghi nhận xét mới)</span>
                      </h3>
                      
                      <div className="divide-y divide-slate-100 max-h-[400px] overflow-y-auto pr-2">
                        {students.filter(s => s.squad === loggedInSquad).map((student) => {
                          const isSelected = selectedStudent?.id === student.id;
                          const hasReportToday = reports.some(r => r.studentId === student.id && r.date === newReportDate);
                          
                          return (
                            <button
                              key={student.id}
                              onClick={() => {
                                setSelectedStudent(student);
                                setNewActivity('');
                                setNewComment('');
                                setEditingReportId(null);
                              }}
                              className={`w-full text-left p-3.5 my-1 rounded-xl transition-all flex items-center justify-between border ${
                                isSelected 
                                  ? 'bg-emerald-50 border-emerald-500 shadow-sm' 
                                  : 'bg-white border-transparent hover:bg-slate-50'
                              }`}
                            >
                              <div className="flex items-center gap-3">
                                <span className="text-2xl bg-slate-100 p-2 rounded-full">{student.avatar}</span>
                                <div>
                                  <h4 className="font-bold text-slate-800 text-xs">{student.name}</h4>
                                  <p className="text-[10px] text-slate-400">Mã: {student.id} • ĐT: {student.parentPhone}</p>
                                </div>
                              </div>

                              <div>
                                {hasReportToday ? (
                                  <span className="bg-emerald-100 text-emerald-800 text-[8px] font-black px-2 py-0.5 rounded-full uppercase border border-emerald-200">
                                    Đã ghi nhận ngày
                                  </span>
                                ) : (
                                  <span className="bg-slate-100 text-slate-500 text-[8px] font-medium px-2 py-0.5 rounded-full border border-slate-200">
                                    Trống báo cáo
                                  </span>
                                )}
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  {/* BIỂU MẪU VIẾT NHẬN XẾT HOẠT ĐỘNG MỚI */}
                  <div className="lg:col-span-7">
                    {selectedStudent ? (
                      <form onSubmit={handleAddNewReport} className="bg-white rounded-2xl shadow p-6 border border-slate-100 space-y-5 animate-fadeIn">
                        
                        <div className="flex justify-between items-center pb-3 border-b border-slate-100">
                          <div>
                            <span className="text-[10px] text-emerald-600 uppercase tracking-widest font-black block">
                              {editingReportId ? 'ĐANG CHỈNH SỬA NHẬT KÝ RÈN LUYỆN' : 'TIẾN HÀNH THÊM NHẬN XẾT MỚI'}
                            </span>
                            <h3 className="text-base font-black text-slate-800">
                              {editingReportId ? `Sửa báo cáo ngày của bé: ${selectedStudent.name}` : `Đang viết cho bé: ${selectedStudent.name}`}
                            </h3>
                          </div>
                          <span className="bg-yellow-100 text-yellow-900 font-bold text-xs px-2.5 py-1 rounded-lg">
                            Mã: {selectedStudent.id}
                          </span>
                        </div>

                        <div className="grid md:grid-cols-2 gap-4">
                          {/* Chọn Ngày hoạt động */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1.5">Ngày Đánh Giá</label>
                            <input
                              type="date"
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium"
                              value={newReportDate}
                              onChange={(e) => setNewReportDate(e.target.value)}
                            />
                          </div>

                          {/* Nhập Tên chuyên đề */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1.5">Chuyên đề / Hoạt động huấn luyện</label>
                            <input
                              type="text"
                              placeholder="Ví dụ: Huấn luyện vượt rào, dọn dẹp nội vụ..."
