  <style>
    :root {
      --primary: #1b5e20;          /* Xanh lá cây Cảnh sát nhân dân chủ đạo */
      --primary-dark: #124116;     /* Xanh lá đậm (Header, Trạng thái oai nghiêm) */
      --primary-light: #2e7d32;    /* Xanh lá tươi (Nút lưu, trạng thái Tốt) */
      --accent: #ffeb3b;           /* Màu vàng viền quân hàm đặc trưng */
      --accent-hover: #fbc02d;     /* Màu vàng đậm hơn khi di chuột qua */
      --secondary: #e65100;        /* Màu cam phụ (Dành cho Chỉ huy / Tác chiến dã ngoại) */
      --secondary-hover: #f57c00;  /* Màu cam tươi hơn khi di chuột qua */
      --bg-body: #f1f5f9;          /* Màu nền chính của toàn bộ trang web (Xám nhạt dịu mắt) */
      --card-bg: #ffffff;          /* Màu nền của các khung, thẻ thông tin (Trắng tinh khiết) */
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-body);
      -webkit-tap-highlight-color: transparent;
    }

    /* ĐỊNH NGHĨA CÁC CLASS TIỆN ÍCH DỰA TRÊN BẢNG MÀU TỰ DESIGN */
    .bg-custom-primary { background-color: var(--primary); }
    .bg-custom-primary-dark { background-color: var(--primary-dark); }
    .bg-custom-primary-light { background-color: var(--primary-light); }
    .bg-custom-accent { background-color: var(--accent); }
    .bg-custom-accent-hover:hover { background-color: var(--accent-hover); }
    .bg-custom-secondary { background-color: var(--secondary); }
    .bg-custom-secondary-hover:hover { background-color: var(--secondary-hover); }
    .text-custom-primary { color: var(--primary); }
    .text-custom-primary-dark { color: var(--primary-dark); }
    .text-custom-accent { color: var(--accent); }
    .border-custom-primary { border-color: var(--primary); }
    .border-custom-accent { border-color: var(--accent); }

    /* Hiệu ứng chuyển động mượt mà */
    .animate-fadeIn {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-scaleIn {
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    
    /* Thiết kế thanh cuộn cao cấp */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Giao diện nút nhấn cảm giác thật khi chạm */
    .active-scale:active {
      transform: scale(0.96);
    }
  </style>

              </svg>
            ) : (
              // Minh họa nam chiến sĩ nhí
              <svg className="w-4/5 h-4/5 text-custom-primary-dark" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C8.7 2 6 4.7 6 8C6 11.3 8.7 14 12 14C15.3 14 18 11.3 18 8C18 4.7 15.3 2 12 2ZM12 4C14.2 4 16 5.8 16 8C16 10.2 14.2 12 12 12C9.8 12 8 10.2 8 8C8 5.8 9.8 4 12 4ZM6 21C6 17.7 9.3 15 13 15C16.7 15 20 17.7 20 21C20 21.6 19.6 22 19 22H7C6.4 22 6 21.6 6 21ZM8.1 20C8.7 18.2 10.7 17 13 17C15.3 17 17.3 18.2 17.9 20H8.1Z"/>

            )}

      return (
        <img
          src={avatar}
          alt="Avatar"
          className={`${className} object-cover`}

      // ----------------------------------------------------------------------
      const parseAndConvertDriveUrl = (url) => {
        if (!url) return '';
        const trimmedUrl = url.trim();

        if (trimmedUrl.includes('drive.google.com')) {
          let fileId = '';
          const matchPath = trimmedUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
          if (matchPath && matchPath[1]) {
            fileId = matchPath[1];
          } else {
            const matchQuery = trimmedUrl.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (matchQuery && matchQuery[1]) {
              fileId = matchQuery[1];
            }
          }
          if (fileId) {
            return `https://drive.google.com/thumbnail?id=${fileId}&sz=w2000`;
          }
        }
        return trimmedUrl;
      };

            });

            const data = snap.docs.map(doc => {

                item.parentPassword = createParentPasswordByLogic(item.parentPhone, item.id);

        const unSubReports = fb.onSnapshot(reportsRef, (snap) => {

      const handleFileChangeAndUpload = async (e) => {
        if (!e.target.files || !e.target.files[0]) return;
        const file = e.target.files[0];

        if (!driveScriptUrl) {
          showToast('Chưa cấu hình Cổng tải ảnh Google Drive.', 'error');
          return;
        }

        setIsUploadingToDrive(true);
        showToast('Đang tải ảnh trực tiếp lên Google Drive...');

        try {
          const reader = new FileReader();
          reader.onload = async (event) => {
            const base64String = event.target.result.split(',')[1];
            const response = await fetch(driveScriptUrl, {
              method: 'POST',
              mode: 'cors',
              headers: {
                'Content-Type': 'text/plain',
              },
              body: JSON.stringify({
                base64: base64String,
                fileName: `CSNHI_${Date.now()}_${file.name}`,
                mimeType: file.type
              })
            });

            const result = await response.json();
            
            if (result.success) {
              setNewImage(result.url); 
              setCustomImageFile(null); 
              showToast('Đã tải ảnh lên Drive và liên kết thành công!');
            } else {
              showToast(`Lỗi tải lên Drive: ${result.error}`, 'error');
            }
            setIsUploadingToDrive(false);
          };

          reader.readAsDataURL(file);
        } catch (error) {
          showToast('Lỗi kết nối tới hệ thống Google Drive!', 'error');

                          </div>

                      <div className="mt-5 bg-emerald-50/70 p-3 rounded-xl border border-emerald-100 text-[10px] text-emerald-800 leading-relaxed font-semibold">

                      </div>

                    }`}>

                                      <Heart />
                                      <span>Đồng hành</span>
                                    </span>
                                  </div>
                                </div>

                              </div>

                </div>

                {/* Chọn nhanh học sinh hoặc Nhận xét chung trên mobile bằng hộp Select Dropdown */}
                <div className="block lg:hidden bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                  <label className="block text-[10px] font-extrabold text-slate-600 uppercase mb-1.5">Chọn đối tượng viết nhận xét:</label>
                  <select
                    className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                    value={selectedStudent ? selectedStudent.id : ''}
                    onChange={(e) => {
                      if (e.target.value === 'COMMON') {
                        setSelectedStudent({ id: 'COMMON', name: 'Nhận xét Chung Toàn Tiểu Đội', squad: loggedInSquad });
                      } else {
                        const student = students.find(s => s.id === e.target.value);
                        setSelectedStudent(student || null);
                      }
                      setNewActivity('');
                      setNewComment('');
                      setEditingReportId(null);
                    }}
                  >
                    <option value="">-- Bấm để chọn chiến sĩ / Hoạt động chung --</option>
                    <option value="COMMON" className="font-extrabold text-amber-600">⭐️ NHẬN XẾT CHUNG CHO TOÀN TIỂU ĐỘI ⭐️</option>
                    {students.filter(s => s.squad === loggedInSquad).map(student => (
                      <option key={student.id} value={student.id}>
                        {student.name} ({student.id})
                      </option>
                    ))}
                  </select>
                </div>

                {/* Phân chia khu vực nhập liệu */}
                <div className="grid lg:grid-cols-12 gap-5 md:gap-6">
                  
                  {/* Danh sách chiến sĩ & Mục Nhận Xét Chung thuộc tiểu đội quản lý - TRÊN PC */}
                  <div className="hidden lg:block lg:col-span-5 space-y-4">
                    <div className="bg-white rounded-2xl shadow p-5 space-y-4">
                      <h3 className="text-xs font-black text-slate-700 tracking-wider uppercase flex justify-between items-center">
                        <span>Danh sách đối tượng</span>
                        <span className="text-[10px] text-slate-400 normal-case font-normal">(Chọn để viết hoặc đăng ảnh chung)</span>
                      </h3>
                      
                      <div className="divide-y divide-slate-100 max-h-[450px] overflow-y-auto pr-1">
                        
                        {/* NÚT CHỌN ĐĂNG TIN / NHẬN XẾT CHUNG CHO CẢ TIỂU ĐỘI */}
                        <button
                          type="button"
                          onClick={() => {
                            setSelectedStudent({ id: 'COMMON', name: 'Nhận xét Chung Toàn Tiểu Đội', squad: loggedInSquad });
                            setNewActivity('');
                            setNewComment('');
                            setEditingReportId(null);
                          }}
                          className={`w-full text-left p-3.5 my-1 rounded-xl transition-all duration-200 flex items-center justify-between border active-scale ${
                            selectedStudent?.id === 'COMMON'
                              ? 'bg-amber-50 border-amber-400 shadow-sm ring-2 ring-amber-100' 
                              : 'bg-gradient-to-r from-amber-50/50 to-orange-50/50 border-dashed border-amber-300 hover:bg-slate-50'
                          }`}
                        >
                          <div className="flex items-center gap-2.5">
                            <span className="w-10 h-10 rounded-full bg-amber-400 flex items-center justify-center text-white text-lg shrink-0 shadow">
                              📢
                            </span>
                            <div>
                              <h4 className="font-extrabold text-amber-800 text-xs uppercase tracking-wide">Nhận Xét Chung Tiểu Đội</h4>
                              <p className="text-[10px] text-slate-500 font-medium">Hiện với tất cả Phụ Huynh Tiểu Đội {loggedInSquad}</p>
                            </div>
                          </div>
                          <span className="bg-amber-100 text-amber-800 text-[8px] font-bold px-2 py-0.5 rounded-full border border-amber-200 uppercase">
                            Chung
                          </span>
                        </button>

                        {/* DANH SÁCH CHIẾN SĨ CÁ NHÂN */}
                        {students.filter(s => s.squad === loggedInSquad).map((student) => {
                          const isSelected = selectedStudent?.id === student.id;
                          const hasReportToday = reports.some(r => r.studentId === student.id && r.date === newReportDate);
                          
                          return (
                            <button
                              key={student.id}
                              type="button"
                              onClick={() => {
                                setSelectedStudent(student);
                                setNewActivity('');
                                setNewComment('');
                                setEditingReportId(null);
                              }}
                              className={`w-full text-left p-3 my-1 rounded-xl transition-all duration-200 flex items-center justify-between border active-scale ${
                                isSelected 
                                  ? 'bg-emerald-50 border-emerald-500 shadow-sm' 
                                  : 'bg-white border-transparent hover:bg-slate-50'
                              }`}
                            >
                              <div className="flex items-center gap-2.5">
                                <span className="w-10 h-10 rounded-full overflow-hidden bg-slate-100 shrink-0">
                                  <RenderAvatar avatar={student.avatar} className="w-full h-full object-cover" />
                                </span>
                                <div>
                                  <h4 className="font-bold text-slate-800 text-xs">{student.name}</h4>
                                  <p className="text-[10px] text-slate-400">Mã: {student.id}</p>
                                </div>
                              </div>

                              <div>
                                {hasReportToday ? (
                                  <span className="bg-emerald-100 text-emerald-800 text-[8px] font-bold px-2 py-0.5 rounded-full uppercase border border-emerald-200">
                                    Đã ghi ngày
                                  </span>
                                ) : (
                                  <span className="bg-slate-100 text-slate-500 text-[8px] font-medium px-2 py-0.5 rounded-full border border-slate-200">
                                    Trống
                                  </span>
                                )}
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  {/* BIỂU MẪU VIẾT NHẬN XẾT HOẠT ĐỘNG MỚI (Gộp cá nhân & Chung) */}
                  <div className="lg:col-span-7">
                    {selectedStudent ? (
                      <form onSubmit={handleAddNewReport} className="bg-white rounded-2xl shadow p-5 md:p-6 border border-slate-100 space-y-4 animate-fadeIn">
                        
                        <div className="flex justify-between items-center pb-3 border-b border-slate-100">
                          <div>
                            <span className="text-[8px] md:text-[10px] text-emerald-600 uppercase tracking-widest font-black block">
                              {editingReportId ? 'CHỈNH SỬA DỮ LIỆU ĐĂNG TẢI' : 'GHI NHẬT KÝ MỚI'}
                            </span>
                            <h3 className="text-sm md:text-base font-black text-slate-800 flex items-center gap-1.5">
                              {selectedStudent.id === 'COMMON' ? (
                                <span className="text-amber-600 flex items-center gap-1">
                                  📢 Nhận xét Chung toàn Tiểu Đội {loggedInSquad}
                                </span>
                              ) : (
                                <span>Chiến sĩ: {selectedStudent.name}</span>
                              )}
                            </h3>
                          </div>
                          <span className={`font-bold text-[10px] px-2.5 py-1 rounded-lg ${
                            selectedStudent.id === 'COMMON' ? 'bg-amber-100 text-amber-800' : 'bg-yellow-100 text-yellow-950'
                          }`}>
                            Mã: {selectedStudent.id}
                          </span>
                        </div>

                        {/* Hướng dẫn hiển thị */}
                        {selectedStudent.id === 'COMMON' && (
                          <div className="bg-amber-50 border border-amber-200 p-3 rounded-xl text-[10px] text-amber-800 font-semibold leading-relaxed">
                            💡 <strong>Tin đăng chung:</strong> Mọi phụ huynh có con em thuộc <strong>Tiểu Đội {loggedInSquad}</strong> đều sẽ nhìn thấy nội dung nhận xét và hình ảnh dã dã chiến này trên học bạ của con họ. Rất thích hợp để chia sẻ ảnh chụp tập thể!
                          </div>
                        )}

                        <div className="grid sm:grid-cols-2 gap-3.5">
                          {/* Chọn Ngày hoạt động */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Ngày Đánh Giá</label>
                            <input
                              type="date"
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium bg-slate-50"
                              value={newReportDate}
                              onChange={(e) => setNewReportDate(e.target.value)}
                            />
                          </div>

                          {/* Nhập Tên chuyên đề */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Hoạt động / Chuyên đề huấn luyện</label>
                            <input
                              type="text"
                              required
                              placeholder="Ví dụ: Huấn luyện điều lệnh đội ngũ, vượt rào..."
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium"
                              value={newActivity}
                              onChange={(e) => setNewActivity(e.target.value)}
                            />
                          </div>
                        </div>

                        {/* Không cần đánh giá điểm số nếu là tin nhắn chung */}
                        {selectedStudent.id !== 'COMMON' && (
                          <div className="grid sm:grid-cols-2 gap-3.5">
                            {/* Đánh giá Nền nếp tác phong */}
                            <div>
                              <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Nền nếp tác phong</label>
                              <select
                                className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium bg-slate-50"
                                value={newBehaviorRating}
                                onChange={(e) => setNewBehaviorRating(e.target.value)}
                              >
                                <option value="Xuất Sắc">Xuất Sắc 🎖️</option>
                                <option value="Tốt">Tốt 👍</option>
                                <option value="Khá">Khá 👌</option>
                                <option value="Đạt">Trung bình / Đạt</option>
                              </select>
                            </div>

                            {/* Đánh giá Thể chất sức khỏe */}
                            <div>
                              <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Sức khỏe & Thể chất</label>
                              <select
                                className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium bg-slate-50"
                                value={newPhysicalRating}
                                onChange={(e) => setNewPhysicalRating(e.target.value)}
                              >
                                <option value="Xuất Sắc">Xuất Sắc 🎖️</option>
                                <option value="Tốt">Tốt 👍</option>
                                <option value="Khá">Khá 👌</option>
                                <option value="Đạt">Trung bình / Đạt</option>
                              </select>
                            </div>
                          </div>
                        )}

                        {/* Tải tệp ảnh hoặc chọn link mẫu nhanh */}
                        <div className="grid sm:grid-cols-2 gap-3.5">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">Chọn nhanh từ kho mẫu ảnh</label>
                            <select
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium bg-slate-50"
                              value={newImage}
                              onChange={(e) => {
                                setNewImage(e.target.value);
                                setCustomImageFile(null);
                              }}
                            >
                              <option value="">Chọn một ảnh dã ngoại có sẵn...</option>
                              <option value={APP_CONFIG.defaultImages.squad1}>Huấn luyện điều lệnh đội ngũ 👮‍♂️</option>
                              <option value={APP_CONFIG.defaultImages.squad2}>Tập huấn kỹ năng dã ngoại sơ cứu 🩹</option>
                              <option value={APP_CONFIG.defaultImages.squad3}>Lớp học chuyên đề an ninh xã hội 🏫</option>
                              <option value={APP_CONFIG.defaultImages.squad4}>Hội thao việt dã vượt chướng ngại vật 🏃‍♂️</option>
                            </select>
                          </div>

                          <div>
                            <label className="block text-[10px] font-bold text-slate-600 mb-1 flex items-center gap-1">
                              <Camera className="w-3.5 h-3.5 text-custom-primary" /> Tải ảnh lên Google Drive
                            </label>
                            <input 
                              type="text"
                              value={newImage}
                              onChange={(e) => setNewImage(e.target.value)}
                              placeholder="Dán đường dẫn ảnh Google Drive công khai"
                              className="w-full p-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-medium"
                            />
                            {isUploadingToDrive && (
                              <div className="flex items-center gap-1.5 mt-1 text-[9px] text-green-700 font-extrabold animate-pulse">
                                 <span className="w-1.5 h-1.5 rounded-full bg-green-600 animate-ping"></span>
                                 <span>Đang lưu trữ Google Drive tự động...</span>
                              </div>
                            )}
                          </div>
                        </div>

                        {/* DÁN LINK GOOGLE DRIVE THUẬN TIỆN */}
                        <div className="bg-slate-50 p-3.5 rounded-xl border border-slate-200 space-y-1.5">
                          <label className="block text-[10px] font-black text-custom-primary uppercase flex items-center gap-1">
                            <span>🔗 Đường dẫn ảnh hiển thị trực tiếp</span>
                            <span className="bg-yellow-400 text-slate-900 text-[8px] font-extrabold px-1.5 py-0.5 rounded uppercase">Mạng đám mây</span>
                          </label>
                          <input
                            type="text"
                            placeholder="Nhập thủ công hoặc liên kết tự phát sinh sau khi tải lên"
                            className="w-full p-2 bg-white border border-slate-200 rounded-lg text-[11px] font-semibold text-slate-700"
                            value={newImage}
                            onChange={(e) => {
                              setNewImage(e.target.value);
                              setCustomImageFile(null);
                            }}
                          />
                        </div>

                        {/* Văn bản Nhận xét */}
                        <div>
                          <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wide mb-1">
                            {selectedStudent.id === 'COMMON' ? 'Nội dung thông báo chung' : 'Nội dung nhận xét chi tiết của bé'}
                          </label>
                          <textarea
                            rows="3"
                            placeholder={selectedStudent.id === 'COMMON' 
                              ? 'Ví dụ: Hôm nay toàn Tiểu Đội 1 đã hoàn thành xuất sắc bài huấn luyện cứu hộ, cứu nạn tại rừng dã chiến...'
                              : 'Nhập biểu hiện, tác phong rèn luyện cụ thể của cháu...'
                            }
                            className="w-full p-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 text-xs font-semibold text-slate-800"
                            value={newComment}
                            onChange={(e) => setNewComment(e.target.value)}
                          ></textarea>
                        </div>

                        {/* Các nút Tác vụ */}
                        <div className="flex gap-2 pt-2">
                          <button
                            type="submit"
                            disabled={isUploadingToDrive}
                            className="flex-1 bg-custom-primary hover:bg-custom-primary-light text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all text-xs disabled:opacity-50 flex items-center justify-center gap-1.5 active-scale"
                          >
                            <CheckCircle className="w-4 h-4" />
                            <span>{editingReportId ? 'Lưu cập nhật' : 'Gửi nhận xét'}</span>
                          </button>
                          <button
                            type="button"
                            onClick={() => {
                              setSelectedStudent(null);
                              setNewActivity('');
                              setNewComment('');
                              setEditingReportId(null);
                            }}
                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 rounded-xl text-xs font-semibold border border-slate-300 transition-colors active-scale"
                          >
                            Hủy
                          </button>
                        </div>

                      </form>
                    ) : (
                      <div className="bg-white rounded-2xl p-8 md:p-12 text-center border-2 border-dashed border-slate-200 shadow-inner flex flex-col items-center justify-center space-y-3.5">
                        <div className="w-14 h-14 rounded-full bg-slate-50 flex items-center justify-center text-3xl shadow">
                          👮‍♂️
                        </div>
                        <div>
                          <h3 className="font-bold text-slate-700 text-xs md:text-sm">Chưa lựa chọn đối tượng nhận xét</h3>
                          <p className="text-[11px] text-slate-400 max-w-xs mt-1 leading-relaxed">
                            Hãy chọn tên học sinh bất kỳ hoặc bấm nút <strong>"Nhận Xét Chung Tiểu Đội"</strong> ở danh sách bên trái để tiến hành đăng tin.
                          </p>
                        </div>
                      </div>
                    )}
                  </div>

                </div>

                {/* DANH SÁCH NHẬT KÝ ĐÃ GHI CỦA TIỂU ĐỘI - CHO PHÉP CHỈNH SỬA VÀ XÓA TẠI CHỖ */}
                <div className="bg-white rounded-2xl shadow p-4 md:p-5 border border-slate-100 space-y-4 mt-6">
                  <h3 className="text-xs md:text-sm font-black text-slate-800 flex items-center gap-1.5 uppercase">
                    <ImageIcon className="w-5 h-5 text-custom-primary" />
                    <span>Lịch sử hoạt động của Tiểu Đội {loggedInSquad} ({reports.filter(r => r.squad === loggedInSquad).length} ngày)</span>
                  </h3>
                  
                  {reports.filter(r => r.squad === loggedInSquad).length === 0 ? (
                    <div className="p-8 text-center text-slate-400 border border-dashed border-slate-200 rounded-xl space-y-1">
                      <div className="text-2xl">📭</div>
                      <p className="text-xs">Tiểu đội của bạn chưa lưu nhật ký hoạt động nào.</p>
                    </div>
                  ) : (
                    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                      {reports.filter(r => r.squad === loggedInSquad).map(report => {
                        const isCommon = report.studentId === 'COMMON';
                        const student = isCommon ? { name: 'Nhận xét Chung Toàn Tiểu Đội' } : students.find(s => s.id === report.studentId);
                        
                        return (
                          <div 
                            key={report.id} 
                            className={`rounded-xl p-4 border space-y-3 flex flex-col justify-between hover:shadow-sm transition-all duration-300 ${
                              isCommon ? 'bg-amber-50 border-amber-300' : 'bg-slate-50 border-slate-200'
                            }`}
                          >
                            <div className="space-y-2">
                              <div className="flex justify-between items-center border-b border-slate-200/50 pb-2">
                                <span className={`font-extrabold text-xs ${isCommon ? 'text-amber-800' : 'text-emerald-950'}`}>
                                  {student ? student.name : 'Chiến sĩ dã chiến'}
                                </span>
                                <span className="text-[10px] text-slate-400 font-mono">
                                  {isCommon ? 'CHUNG' : `ID: ${report.studentId}`}
                                </span>
                              </div>
                              <div className="text-[11px] font-bold text-slate-700">📌 Chuyên đề: {report.activity}</div>
                              <p className="text-[11px] text-slate-500 line-clamp-3 italic font-medium">"{report.comment}"</p>
                            </div>

                            {report.image && (
                              <div className="relative group overflow-hidden rounded-lg border border-slate-200 h-24">
                                <img 
                                  src={report.image} 
                                  alt="Review" 
                                  className="w-full h-full object-cover cursor-zoom-in hover:opacity-90 transition-all" 
                                  onClick={() => setZoomedImage({
                                    url: report.image,
                                    title: isCommon
                                      ? `[HÌNH CHUNG TIỂU ĐỘI ${report.squad}] - Hoạt động: ${report.activity} (${report.date})`
                                      : `${student ? student.name : 'Chiến sĩ'} - Hoạt động: ${report.activity} (${report.date})`
                                  })}
                                />
                              </div>
                            )}

                            <div className="space-y-2 pt-2 border-t border-slate-200/50">
                              <div className="flex justify-between items-center text-[9px]">
                                <span className="text-slate-400 font-semibold">{report.date}</span>
                                {!isCommon && (
                                  <div className="flex gap-1">
                                    <span className="bg-green-100 text-green-800 px-1 py-0.5 rounded text-[8px] font-bold">Tác phong: {report.behaviorRating}</span>
                                    <span className="bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-[8px] font-bold">Thể chất: {report.physicalRating}</span>
                                  </div>
                                )}
                              </div>

                              <div className="flex gap-2 pt-1.5 border-t border-slate-200/30">
                                <button
                                  type="button"
                                  onClick={() => handleStartEditReport(report)}
                                  className="flex-1 bg-amber-50 hover:bg-amber-100 text-amber-800 font-bold py-1.5 px-2 rounded-lg text-[10px] border border-amber-200 transition-colors flex items-center justify-center gap-1 active-scale shadow-sm"
                                >
                                  ✏️ Sửa
                                </button>
                                <button
                                  type="button"
                                  onClick={() => {
                                    setConfirmModal({
                                      isOpen: true,
                                      type: 'report',
                                      id: report.id,
                                      message: `Bạn có chắc muốn xóa báo cáo ngày ${report.date} này của ${isCommon ? 'tiểu đội' : 'học sinh'} khỏi đám mây?`
                                    });
                                  }}
                                  className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-1.5 px-2 rounded-lg text-[10px] border border-red-200 transition-colors flex items-center justify-center gap-1 active-scale shadow-sm"
                                >
                                  🗑️ Xóa
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* ===================== 4. GIAO DIỆN CHỈ HUY TỔNG RESPONSIVE ===================== */}
            {currentView === 'general_dashboard' && (
              <div className="space-y-5 md:space-y-6 animate-fadeIn">
                
                {/* Header Tổng quan */}
                <div className="bg-gradient-to-r from-green-950 to-green-900 rounded-2xl p-5 md:p-6 text-white shadow-md border-b-4 border-custom-accent flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <div>
                    <span className="text-[10px] bg-custom-accent text-green-950 font-black px-2.5 py-1 rounded uppercase tracking-wider">
                      Cơ Quan Chỉ Huy Tối Cao (BCH Tổng)
                    </span>
                    <h2 className="text-xl md:text-2xl font-black mt-1 text-custom-accent">
                      Bảng Điều Hành Toàn Khóa Huấn Luyện
                    </h2>
                    <p className="text-xs text-emerald-200 mt-1 font-medium leading-relaxed">
                      Quản lý danh sách học viên, thêm mới, chỉ định biên chế Tiểu đội và đồng bộ giám sát toàn khoá học.
                    </p>
                  </div>

                  <div className="flex gap-2 flex-wrap w-full md:w-auto">
                    <span className="bg-black/30 px-3 py-2 rounded-xl text-[10px] md:text-xs border border-white/5 font-semibold">
                      Tổng số: <strong className="text-custom-accent">{students.length} Bé</strong>
                    </span>
                    <span className="bg-black/30 px-3 py-2 rounded-xl text-[10px] md:text-xs border border-white/5 font-semibold">
                      Báo cáo: <strong className="text-custom-accent">{reports.length} Nhật ký</strong>
                    </span>
                    <span className="bg-black/30 px-3 py-2 rounded-xl text-[10px] md:text-xs border border-white/5 font-semibold">
                      Quy mô: <strong className="text-custom-accent">{squadCount} Đơn vị</strong>
                    </span>
                  </div>
                </div>

                {/* BẢNG CẤU HÌNH LIÊN KẾT GOOGLE DRIVE DÀNH CHO BCH TỔNG */}
                <div className="bg-white rounded-2xl p-4 md:p-5 shadow border border-slate-100">
                  <form onSubmit={handleSaveDriveConfig} className="space-y-3.5">
                    <div className="flex items-center gap-2 border-b pb-2">
                      <span className="text-xl">⚙️</span>
                      <div>
                        <h3 className="text-xs md:text-sm font-black text-slate-800">Cấu hình kết nối Google Drive (BCH Tổng)</h3>
                        <p className="text-[10px] text-slate-400">Thiết lập "Cầu nối" để các tiểu đội tải ảnh lên đám mây trực tiếp.</p>
                      </div>
                    </div>
                    
                    <div className="flex flex-col md:flex-row gap-3 items-end">
                      <div className="flex-1 w-full">
                        <label className="block text-[10px] font-bold text-slate-600 mb-1">Đường dẫn Google Apps Script Web App URL của bạn</label>
                        <input
                          type="text"
                          required
                          placeholder="Ví dụ: https://script.google.com/macros/s/AKfycb.../exec"
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-600 bg-slate-50"
                          value={inputScriptUrl}
                          onChange={(e) => setInputScriptUrl(e.target.value)}
                        />
                      </div>
                      <button
                        type="submit"
                        className="w-full md:w-auto bg-custom-primary hover:bg-custom-primary-light text-white font-extrabold text-xs py-3.5 px-5 rounded-xl transition-all shadow-md shrink-0 flex items-center justify-center gap-2 active-scale"
                      >
                        <span>🔄 Đồng bộ cổng lưu trữ</span>
                      </button>
                    </div>

                    {driveScriptUrl ? (
                      <div className="p-3 bg-emerald-50 rounded-xl border border-emerald-200 text-[10px] text-emerald-800 font-semibold">
                         ✅ Cổng kết nối đang hoạt động. Các tiểu đội có thể tải ảnh lên tự động thành công!
                      </div>
                    ) : (
                      <div className="p-3 bg-amber-50 rounded-xl border border-amber-200 text-[10px] text-amber-800 font-semibold leading-relaxed">
                         ⚠️ Hiện tại bạn chưa thiết lập cổng lưu trữ Google Drive dã ngoại.
                      </div>
                    )}
                  </form>
                </div>

                {/* THIẾT LẬP MẬT KHẨU THỦ CÔNG CHO CÁC TIỂU ĐỘI */}
                <div className="bg-white rounded-2xl p-4 md:p-5 shadow border border-slate-100 space-y-4">
                  <div className="flex items-center gap-2 border-b pb-2">
                    <span className="text-xl">🔑</span>
                    <div>
                      <h3 className="text-xs md:text-sm font-black text-slate-800">Quản Lý Mật Khẩu Đăng Nhập Của Các Tiểu Đội</h3>
                      <p className="text-[10px] text-slate-400">Thiết lập mật khẩu riêng cho từng đơn vị phụ trách viết nhật ký rèn luyện.</p>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
                    {Array.from({ length: squadCount }, (_, i) => i + 1).map((num) => {
                      const code = `TD${String(num).padStart(2, '0')}`;
                      const currentPass = squadPasswords[code] || '123456';
                      return (
                        <div key={num} className="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-1.5 flex flex-col justify-between">
                          <div className="text-[10px] font-bold text-slate-700">Tiểu Đội {num} ({code})</div>
                          <input 
                            type="text" 
                            defaultValue={currentPass}
                            onBlur={(e) => handleSaveSquadPasswords(code, e.target.value)}
                            placeholder="Mật khẩu"
                            className="w-full p-2 bg-white border border-slate-300 rounded-lg text-xs font-mono font-bold text-center"
                          />
                          <div className="text-[7px] text-slate-400 text-center uppercase tracking-wider font-extrabold">Nhấn ra ngoài để tự lưu</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* KHU VỰC THIẾT LẬP SỐ LƯỢNG TIỂU ĐỘI CHO BCH TỔNG */}
                <div className="bg-white rounded-2xl p-4 md:p-5 shadow border border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-3">
                  <div className="space-y-0.5 text-center sm:text-left">
                    <span className="inline-block bg-green-100 text-green-800 text-[8px] md:text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider">
                      Đặc quyền BCH Tổng
                    </span>
                    <h3 className="text-xs md:text-sm font-black text-slate-800">Cấu hình Quy mô Đơn vị Huấn luyện</h3>
                    <p className="text-[10px] text-slate-400">Bạn có thể tự tăng giảm số lượng tiểu đội theo quân số thực tế.</p>
                  </div>

                  <div className="flex items-center gap-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                    <span className="text-[11px] font-bold text-slate-600 px-1.5">Số Tiểu Đội:</span>
                    <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-lg p-0.5 shadow-inner">
                      <button 
                        type="button" 
                        onClick={() => setSquadCount(prev => Math.max(1, prev - 1))}
                        className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 text-slate-800 font-extrabold text-xs transition-colors flex items-center justify-center active-scale"
                      >
                        -
                      </button>
                      <span className="w-8 text-center font-black text-xs text-custom-primary-dark">
                        {squadCount}
                      </span>
                      <button 
                        type="button" 
                        onClick={() => setSquadCount(prev => prev + 1)}
                        className="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 text-slate-800 font-extrabold text-xs transition-colors flex items-center justify-center active-scale"
                      >
                        +
                      </button>
                    </div>
                  </div>
                </div>

                {/* Grid dã chiến */}
                <div className="grid lg:grid-cols-12 gap-5 md:gap-6">
                  
                  {/* BIỂU MẪU THÊM MỚI CHIẾN SĨ VÀ CHỈ ĐỊNH TIỂU ĐỘI */}
                  <div className="lg:col-span-4">
                    <form onSubmit={handleAddStudentByGeneral} className="bg-white rounded-2xl shadow p-4 md:p-5 border border-slate-100 space-y-3.5">
                      <div className="border-b border-slate-100 pb-2">
                        <span className="text-[9px] text-green-700 font-black uppercase tracking-wider block">Thao Tác Nghiệp Vụ</span>
                        <h3 className="text-xs md:text-sm font-black text-slate-800">Thêm & Chỉ Định Học Viên</h3>
                      </div>

                      {/* Họ Tên học viên */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Họ và Tên Chiến Sĩ Nhí</label>
                        <input
                          type="text"
                          required
                          placeholder="Ví dụ: Nguyễn Hữu Đạt..."
                          value={newStudentName}
                          onChange={(e) => setNewStudentName(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                        />
                      </div>

                      <div className="grid grid-cols-2 gap-3">
                        {/* Chọn Giới Tính */}
                        <div>
                          <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Giới tính</label>
                          <select
                            value={newStudentAvatar}
                            onChange={(e) => setNewStudentAvatar(e.target.value)}
                            className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                          >
                            <option value="nam.png">Nam (nam.png)</option>
                            <option value="nu.png">Nữ (nu.png)</option>
                          </select>
                        </div>

                        {/* Chỉ định tiểu đội rèn luyện */}
                        <div>
                          <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Tiểu Đội biên chế</label>
                          <select
                            value={newStudentSquad}
                            onChange={(e) => setNewStudentSquad(parseInt(e.target.value))}
                            className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                          >
                            {Array.from({ length: squadCount }, (_, i) => i + 1).map((num) => (
                              <option key={num} value={num}>Tiểu Đội {num}</option>
                            ))}
                          </select>
                        </div>
                      </div>

                      {/* SĐT Phụ Huynh để đăng nhập */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Số điện thoại Phụ huynh</label>
                        <input
                          type="text"
                          required
                          placeholder="Ví dụ: 0987654321..."
                          value={newStudentPhoneState}
                          onChange={(e) => setNewStudentPhone(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                        />
                      </div>

                      {/* Email Phụ Huynh */}
                      <div>
                        <label className="block text-[10px] font-bold text-slate-600 uppercase mb-1">Email Phụ huynh</label>
                        <input
                          type="email"
                          required
                          placeholder="Ví dụ: phuhuynh@gmail.com..."
                          value={newStudentEmail}
                          onChange={(e) => setNewStudentEmail(e.target.value)}
                          className="w-full p-2.5 rounded-xl border border-slate-300 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-green-500 text-slate-800"
                        />
                      </div>

                      <div className="bg-emerald-50 p-2.5 rounded-xl border border-emerald-200 text-[9px] text-emerald-800 font-semibold space-y-1">
                        <div>🔒 <strong>Mật khẩu đăng nhập phụ huynh:</strong></div>
                        <div className="font-mono bg-white p-1 rounded text-center border font-extrabold text-custom-primary text-[10px]">
                          {(() => {
                            const currentPhone = newStudentPhoneState.trim();
                            const currentEmail = newStudentEmail.trim().toLowerCase();
                            
                            const sibling = students.find(
                              s => s.parentPhone === currentPhone && s.parentEmail.toLowerCase() === currentEmail
                            );

                            if (sibling && sibling.parentPassword) {
                              return `${sibling.parentPassword} (Dùng chung với bé ${sibling.name})`;
                            }
                            
                            return currentPhone ? createParentPasswordByLogic(currentPhone, '(Mã số ID)') : 'Nhập SĐT để xem thử';
                          })()}
                        </div>
                      </div>

                      <button
                        type="submit"
                        className="w-full bg-custom-primary hover:bg-custom-primary-light text-white font-black py-3 px-4 rounded-xl text-xs uppercase tracking-wider shadow transition-all flex items-center justify-center gap-1.5 active-scale"
                      >
                        <Plus />
                        <span>Đồng Bộ Học Viên Mới</span>
                      </button>

                    </form>
                  </div>

                  {/* DANH SÁCH HỌC VIÊN TOÀN KHÓA HỌC */}
                  <div className="lg:col-span-8">
                    <div className="bg-white rounded-2xl shadow p-4 md:p-5 border border-slate-100 space-y-4">
                      <div className="flex justify-between items-center border-b border-slate-100 pb-2">
                        <h3 className="text-xs font-black text-slate-700 tracking-wider uppercase">Danh Sách Học Viên Toàn Khóa</h3>
                        <span className="text-[10px] text-slate-400 font-bold hidden sm:inline">Quản lý trực tiếp trên Đám Mây</span>
                      </div>

                      <div className="overflow-x-auto -mx-4 sm:mx-0">
                        <div className="inline-block min-w-full align-middle px-4 sm:px-0">
                          <table className="min-w-full divide-y divide-slate-100 text-xs">
                            <thead>
                              <tr className="bg-slate-50 text-[9px] md:text-[10px] text-slate-400 font-black uppercase text-left">
                                <th className="p-3">Học viên</th>
                                <th className="p-3">Mã số</th>
                                <th className="p-3">Tiểu Đội</th>
                                <th className="p-3">Đăng nhập Phụ Huynh</th>
                                <th className="p-3 text-center">Tác vụ</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 font-semibold text-slate-700">
                              {students.map((student) => (
                                <tr key={student.id} className="hover:bg-slate-50/50">
                                  <td className="p-3 flex items-center gap-2">
                                    <span className="w-10 h-10 rounded-full overflow-hidden bg-slate-100 shrink-0">
                                      <RenderAvatar avatar={student.avatar} className="w-full h-full object-cover" />
                                    </span>
                                    <span className="font-extrabold text-slate-800 text-[11px] sm:text-xs">{student.name}</span>
                                  </td>
                                  <td className="p-3 font-mono font-bold text-slate-400">{student.id}</td>
                                  <td className="p-3">
                                    <span className="bg-yellow-100 text-yellow-950 font-bold px-2 py-0.5 rounded-full text-[8px] md:text-[9px]">
                                      Tiểu Đội {student.squad}
                                    </span>
                                  </td>
                                  <td className="p-3 text-[10px] text-slate-500 space-y-0.5">
                                    <div>📞 {student.parentPhone}</div>
                                    <div className="text-slate-400 break-all">{student.parentEmail}</div>
                                    <div className="mt-1 font-mono font-bold text-custom-primary bg-emerald-50/70 px-1.5 py-0.5 rounded w-max border border-emerald-100 text-[8px] md:text-[9px]">
                                      🔑 MK: {student.parentPassword || createParentPasswordByLogic(student.parentPhone, student.id)}
                                    </div>
                                  </td>
                                  <td className="p-3 text-center">
                                    <button
                                      onClick={() => handleDeleteStudent(student.id)}
                                      className="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded-xl transition-colors border border-red-200/50 inline-flex items-center justify-center active-scale"
                                      title="Xóa học viên vĩnh viễn"
                                    >
                                      <Trash />
                                    </button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  </div>

                </div>

                {/* GIÁM SÁT TOÀN BỘ BÁO CÁO CỦA CÁC TIỂU ĐỘI (Bao gồm báo cáo cá nhân và chung) */}
                <div className="bg-white rounded-2xl shadow p-4 md:p-5 border border-slate-100 space-y-4">
                  <div className="border-b border-slate-100 pb-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1.5">
                    <h3 className="text-xs md:text-sm font-black text-slate-700 tracking-wider uppercase flex items-center gap-1.5">
                      <ImageIcon className="text-custom-primary" />
                      <span>Giám Sát Báo Cáo Của Toàn Bộ Các Tiểu Đội (Giám Sát Tổng)</span>
                    </h3>
                    <span className="text-[10px] font-bold text-custom-primary uppercase">Cập nhật thời gian thực</span>
                  </div>

                  {reports.length === 0 ? (
                    <div className="p-8 text-center text-slate-400 font-semibold italic text-xs">
                      Hệ thống trống! Chưa ghi nhận nhận xét nào ngày hôm nay.
                    </div>
                  ) : (
                    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                      {reports.map((report) => {
                        const isCommon = report.studentId === 'COMMON';
                        const student = isCommon ? { name: 'Nhận xét Chung Toàn Tiểu Đội' } : students.find(s => s.id === report.studentId);
                        return (
                          <div 
                            key={report.id} 
                            className={`rounded-xl p-4 border space-y-3 flex flex-col justify-between hover:shadow-sm ${
                              isCommon ? 'bg-amber-50 border-amber-300' : 'bg-slate-50 border-slate-200'
                            }`}
                          >
                            <div className="space-y-2">
                              <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                                <span className={`font-extrabold text-xs ${isCommon ? 'text-amber-800' : 'text-custom-primary'}`}>
                                  {student ? student.name : 'Chiến sĩ bí mật'}
                                </span>
                                <span className="text-[8px] bg-custom-accent text-green-950 font-black px-1.5 py-0.5 rounded-md uppercase tracking-wider">
                                  TĐ {report.squad}
                                </span>
                              </div>
                              <div className="text-[10px] font-bold text-slate-700">📌 Chuyên đề: {report.activity}</div>
                              <p className="text-[10px] text-slate-500 font-medium line-clamp-3">"{report.comment}"</p>
                            </div>

                            {report.image && (
                              <img src={report.image} alt="Báo cáo" className="w-full h-24 object-cover rounded-lg border border-slate-300 cursor-zoom-in" onClick={() => setZoomedImage({ url: report.image, title: `Báo cáo giám sát TĐ ${report.squad}` })} />
                            )}

                            <div className="pt-2 border-t border-slate-200/50 flex justify-between items-center text-[9px] font-bold">
                              <span className="text-slate-400">{report.date}</span>
                              <div className="flex gap-1.5">
                                <button
                                  onClick={() => handleStartEditReport(report)}
                                  className="text-amber-800 bg-amber-50 hover:bg-amber-100 border border-amber-200 px-2.5 py-1 rounded-lg active-scale"
                                >
                                  ✏️ Sửa
                                </button>
                                <button
                                  onClick={() => {
                                    setConfirmModal({
                                      isOpen: true,
                                      type: 'report',
                                      id: report.id,
                                      message: `Bạn có chắc muốn xóa báo cáo ngày ${report.date} này của ${isCommon ? 'tiểu đội' : 'học sinh'}?`
                                    });
                                  }}
                                  className="text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 px-2.5 py-1 rounded-lg active-scale"
                                >
                                  🗑️ Xóa
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

          </main>

          {/* ===================== CHÂN TRANG THƯƠNG HIỆU NGUYÊN BẢN 100% ===================== */}
          <footer className="bg-slate-900 text-slate-400 text-xs py-8 mt-16 border-t-4 border-custom-primary-dark">
            <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-6 md:gap-8">
              <div className="space-y-3">
                <div className="flex items-center gap-2 text-white font-black">
                  <Shield />
                  <span className="font-black uppercase tracking-wider text-[11px] md:text-sm">Chiến Sĩ Công An Nhí</span>
                </div>
                <p className="leading-relaxed text-slate-500 font-semibold text-[10px] md:text-[11px]">
                  Chương trình phối hợp giáo dục thực tế quốc phòng, kỹ năng sống và kỷ luật quân đội nhân dân dành riêng cho học sinh từ 9 đến 15 tuổi, bồi dưỡng lòng yêu Tổ quốc và sống tự lập.
                </p>
              </div>
              <div className="space-y-2 text-[10px] md:text-[11px] font-semibold">
                <h4 className="text-white font-bold uppercase tracking-wide">Đường Dây Nóng Hỗ Trợ</h4>
                <div className="space-y-1 text-slate-500">
                  <p>📞 Điện thoại hỗ trợ: 0911.099.798 ( đ/c Hoài Nam)</p>
                  <p>📧 Email liên hệ: contact@dhcsnd.bocongan.gov.vn</p>
                  <p>📍 Địa điểm: Trường Đại học CSND, 36 Nguyễn Hữu Thọ, Phường Tân Hưng, TP.HCM.</p>
                </div>
              </div>
              <div className="space-y-2 text-[10px] md:text-[11px] font-semibold">
                <h4 className="text-white font-bold uppercase tracking-wide">Cam Kết Chất Lượng</h4>
                <p className="text-slate-500 leading-relaxed">
                  Thông tin rèn luyện hằng ngày cập nhật chính xác trước 21h30 bởi Tiểu đội trưởng phụ trách. Phản ánh trung thực nếp sống dã chiến của học viên.
                </p>
              </div>
            </div>
            <div className="max-w-7xl mx-auto px-4 mt-8 pt-6 border-t border-slate-800 text-center text-slate-600 font-bold text-[9px] md:text-xs">
              <p>© 2026 Chương Trình Trải Nghiệm "Chiến Sĩ Công An Nhí". Được xây dựng bởi Đoàn Thanh niên Trường Đại học Cảnh sát Nhân dân.</p>
            </div>
          </footer>

          {/* ===================== DIALOG XÁC NHẬN AN TOÀN TRƯỚC KHI XÓA ===================== */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4 animate-fadeIn">
              <div className="absolute inset-0" onClick={() => setConfirmModal({ isOpen: false, type: '', id: '', message: '' })}></div>
              
              <div className="relative bg-white rounded-2xl p-6 max-w-sm w-full space-y-4 shadow-2xl border border-slate-200 z-10 animate-scaleIn">
                <div className="flex items-center gap-2 text-red-600 border-b border-slate-100 pb-3">
                  <span className="text-xl">⚠️</span>
                  <h4 className="font-extrabold text-xs md:text-sm uppercase tracking-wider">Cảnh Báo Hệ Thống</h4>
                </div>
                
                <p className="text-xs text-slate-600 leading-relaxed font-semibold py-1">
                  {confirmModal.message}
                </p>
                
                <div className="flex gap-2.5 pt-2 border-t border-slate-100">
                  <button
                    onClick={() => {
                      if (confirmModal.type === 'student') {
                        executeDeleteStudent(confirmModal.id);
                      } else if (confirmModal.type === 'report') {
                        executeDeleteReport(confirmModal.id);
                      }
                      setConfirmModal({ isOpen: false, type: '', id: '', message: '' });
                    }}
                    className="flex-1 bg-red-600 hover:bg-red-700 text-white font-extrabold py-2.5 px-4 rounded-xl text-xs transition-colors shadow active-scale"
                  >
                    Xác Nhận Xóa
                  </button>
                  <button
                    onClick={() => setConfirmModal({ isOpen: false, type: '', id: '', message: '' })}
                    className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 px-4 rounded-xl text-xs border border-slate-300 transition-colors active-scale"
                  >
                    Hủy Bỏ
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ===================== MODAL PHÓNG TO VÀ DOWNLOAD TẢI ẢNH ===================== */}
          {zoomedImage && (
            <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/95 p-3 animate-fadeIn">
              <div className="absolute inset-0 cursor-zoom-out" onClick={() => setZoomedImage(null)}></div>
              
              <div className="relative max-w-3xl w-full flex flex-col items-center space-y-3 z-10 animate-scaleIn">
                
                <div className="bg-slate-900 rounded-2xl overflow-hidden shadow-2xl max-h-[70vh] border border-white/10 flex items-center justify-center">
                  <img 
                    src={zoomedImage.url} 
                    alt="Phóng to ảnh dã ngoại" 
                    className="max-h-[70vh] w-auto max-w-full object-contain"
                  />
                </div>

                <div className="bg-slate-900/90 text-white p-4 rounded-2xl border border-white/10 w-full flex flex-col sm:flex-row justify-between items-center gap-3 backdrop-blur-md">
                  <div className="text-left">
                    <span className="text-[8px] bg-custom-accent text-green-950 px-2 py-0.5 rounded font-black uppercase">Ảnh thực tế</span>
                    <p className="text-[11px] font-semibold text-slate-200 mt-1 leading-relaxed">
                      {zoomedImage.title}
                    </p>
                  </div>

                  <div className="flex gap-2 flex-shrink-0 w-full sm:w-auto">
                    <a 
                      href={zoomedImage.url} 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="flex-1 sm:flex-initial bg-custom-primary hover:bg-custom-primary-light text-white px-4 py-2 rounded-xl text-xs font-extrabold flex items-center justify-center gap-1.5 transition-colors shadow-lg active-scale"
                    >
                      <Camera className="w-3.5 h-3.5 text-custom-accent" />
                      <span>Xem ảnh gốc</span>
                    </a>
                    <button
                      onClick={() => setZoomedImage(null)}
                      className="flex-1 sm:flex-initial bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-xl text-xs font-extrabold transition-colors border border-slate-700 active-scale"
                    >
                      Dóng
                    </button>
                  </div>
                </div>

                <p className="text-[9px] text-slate-500 font-medium">
                  💡 *Mẹo: Trên điện thoại, bạn có thể nhấn và giữ ảnh để lưu nhanh về thư viện.*
                </p>

              </div>
            </div>
          )}

        </div>
      );
    }

    // ============================================================================
    // BỘ NẠP MODULE FIREBASE (APP LOADER)
    // ============================================================================
    function AppLoader() {
      const [firebaseLoaded, setFirebaseLoaded] = React.useState(!!window.fb);
      const [loadError, setLoadError] = React.useState(null);

      React.useEffect(() => {
        const handleLoad = () => {
          setFirebaseLoaded(true);
        };

        if (window.fb) {
          handleLoad();
        } else {
          window.addEventListener('firebase-loaded', handleLoad);
          return () => window.removeEventListener('firebase-loaded', handleLoad);
        }
      }, []);

      if (loadError) return <div className="text-red-500 p-10 text-center font-bold">Lỗi tải hệ thống Firebase: {loadError}</div>;
      if (!firebaseLoaded) return (
        <div className="min-h-screen flex items-center justify-center bg-slate-50">
           <div className="text-center space-y-4">
              <div className="w-14 h-14 border-4 border-green-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
              <p className="text-green-800 font-extrabold tracking-wider animate-pulse text-sm">ĐANG KHỞI TẠO HỆ THỐNG TRUYỀN TẢI...</p>
           </div>
        </div>
      );

      return <App />;
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<AppLoader />);

  </script>
</body>
</html>
